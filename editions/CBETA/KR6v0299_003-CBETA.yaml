body:
  text: 開成五年四月廿八日廿八日至十六日記事重出而互有具略兩文相異以線示之入平谷西行卅里巳時到停點普通院前始望見中臺頂此即文殊師利所居清凉山五臺之中臺也伏地遙禮不覺雨淚遠望臺頂圓高不見樹木便入停點普通院禮文殊像見西亭壁上題名云日本國內供奉翻經大德靈仙元和十五年九月十五日到此蘭若午時入食堂齋見上僧座安置文殊像不見置賓頭盧座恠而問眾僧乃云此山諸畫如是矣齋後見數十僧遊南臺去一上以下至而來三十二字前文在廿九日記事中一上時晴天忽陰風雲鬬暗雹雨交零晚際見其歸來被雹打破笠子渾身濕而來自今月廿三日申時始入山至于今日每日入山谷行經六日始得到此五臺去二月十九日離赤山院直到此間行二千三百餘里除却歇日正在路行得卌四日也慙愧同行竝无病累廿九日院中有百僧齋亦同赴請又因台州國清寺僧巨堅巡臺歸本寺付二封書送圓載上人所五月一日天晴巡五臺去從停點普通西行十七許里向北過一高嶺行十五里到竹林寺斷中仍見諸州來求受戒沙彌數十人在寺候日齋後巡禮寺有般舟道場曾有法照和尚於此堂修念佛三昧有勅諡號大悟和尚遷化來近二年前文注參看今造影安置堂裏又畫佛陁波利儀鳳元年來到山門見老人之影花嚴院佛堂有金剛界曼㭟羅一鋪二日入貞元戒律院上樓禮國家功德七十二賢聖諸尊曼㭟羅綵畫精妙次開萬聖戒壇巡看純用白玉石作高三尺而八角以香泥築填壇底壇上敷一張五色綵絲毯亦八角造闊狹共壇恰齊押壇老宿法諱靈覺生年一百歲七十二夏貌骨非凡是登壇大德見客慇懃見說去年六月中天竺那蘭陀寺三藏三人來巡禮五臺見五色雲圓光攝身光歸天竺去此竹林寺有六院律院庫院花嚴院閣院佛殿院一寺都有四十來僧此寺不屬五臺五月五日有七百五十僧齋諸寺同設竝是齊州靈嚴嚴恐巖字寺供主所設矣晚際隨喜此間前文有竹林寺齋式之一項十四日夜惟正惟曉共數十人於白玉壇上受具足戒十六日早朝出竹林寺乘谷東行十里向東北行十餘里到大花嚴寺入庫院住齋後到涅般院見賢座主於高樓上講止觀講第四卷欲終有卅餘僧同聽便見志遠和上宋傳七在講下聽止觀其殿內外莊嚴精麗難名待下講禮拜志遠和上及講座主同聽眾僧等和上等慰問慇懃座座上前文有法堅二字主新從西京來文鑒座主久住山曾講止觀法花經數遍諸聽眾是遠和上門下不或有諸方來聽者志遠和上云貞元廿年見日本國㝡澄三藏入天台求法台州刺史陸公自出紙墨及書手寫數百卷與澄三藏三藏兼得印信却歸本國云云便問日本天台宗興盛之事因粗陳南岳大師生日本弘法之事遠和尚及大眾甚歡喜大花嚴寺十二二字前文作五院僧眾至多皆以遠和上為首座和上不受施利日唯一飡戒行清高六時禮懺不闕一時而常修法花三昧一心三觀以為心腑志超物外遍山諸寺老宿盡致欽敬者其深意一生欲得見普賢菩薩證法花三昧也喫㭟後入涅槃道場禮佛涅槃相於雙樹下右脇而臥一丈六尺之容摩耶夫人悶絕倒地之像四王八部龍神天人及諸聖眾或舉手悲哭之形或閉目觀念之貌一切依經相作次入般若院禮文鑒座主兼禮天台大師影鑒座主相喜不已乃云此寺開二座講弘傳天台教感見遠國僧求天台教來到此處甚有感應哉更見大鞋和上影曾在此山修行巡五臺五十遍又曾在中臺頂冬夏不下住頂三年遂得大聖加被著大鞋高一尺尺下前文有長一尺三字五寸大一量則廿五斤小一量則十斤量量即一足之義見在影前和上曾造一萬五千具衣帔施一萬五千僧設七萬五千供令置影於高閣上供養十七日將延曆寺未決三十條呈上志遠和上請決釋遠和上云見說天台山已決此疑不合更決不肯通矣晚際與數僧上菩薩堂院見持念和上年七十適見可卌來也人云年高色壯得持念之力開堂聖禮拜大文殊菩薩像容貌顒然端嚴无比騎師子像滿五間殿在其師子精靈生骨儼然有動步之勢口生潤氣良久視東本作觀傍注視之恰似運動矣老宿云初造此菩薩時作了便裂六遍柤作六遍頹裂其博士惆悵而云吾此一才天下共知而皆許孤秀矣一生來柤作佛像不曾見裂損之今時作此像齋戒至心盡自工巧之妙欲使天下人瞻禮特為發心之境今既六遍造六遍皆摧裂的應不稱大聖之心若實然者伏願大聖文殊菩薩為我親現真容親覩金顏即倣与而造纔發願了開眼見文殊菩薩騎金色師子現其人前良久乘五色雲騰空飛去博士得見真容歡喜悲泣方知先所作不是也便改本樣長短大小容貌髣髴髴東本無取所現之相第七遍柤作此像更不裂損每事易為所要者皆應矣其人造此像了安置此殿露光眼中注淚乃云大奇曾來未曾見者今得見也願劫劫生生常為文殊師利弟子言竟身亡向後此像時時放光頻現靈瑞每有相時具錄聞奏勅施袈裟今見披在菩薩體上者是其一也因此每年勅使送百領袈裟表賜山僧每年勅使別勅送香花寶蓋真珠幡蓋珮玉寶珠七寶寶冠金鏤香鑪大小明鏡花毯白㲲珍假花菓等積漸已多堂裏鋪列不盡之餘者惣在庫貯積見在自餘諸道州府官私施主每年送者不可勝數今五臺諸寺造文殊菩薩像皆此聖此聖東本倒置像之樣然皆百中只得一分也云云其堂內外七寶傘蓋當菩薩頂上懸之珍彩花幡奇異珠鬘等滿殿鋪列寶裝之鏡大小未知其數矣出到殿北望見北臺東臺圓頂高聳絕无樹木短草含彩遙望觀之夏中秋色却到堂前遙望南臺亦无樹木臺頂獨秀與碧天接連超然出於眾峯之外西臺隔中臺望不見也於菩薩堂前臨涯有三間亭子地上敷板四面高欄亭下便是千仞之岸嶮峻老宿云昔者日本國靈仙三藏於此亭子奉見一萬菩薩遍禮訖到閣院見玄亮座主從四月始講法花經兼天台疏聽眾卌餘人惣是遠和上門下朝座閣院講法花經晚座涅槃院講止觀兩院之眾互往來聽從諸院來聽者甚多當寺上座僧洪基共遠和上同議請二座主開此二講實可謂五臺山大華嚴寺是天台之流也共眾僧上閣禮拜功德閣之內外莊嚴所有寶物與菩薩堂相似也見辟支佛頂骨其色白黯色狀似本國輕石骨內堅實大二升梡許大見是額已上之骨上生白髮長五分許似剃來更生矣西國僧貞觀年中將來者也兼有梵夾法花經又佛舍利置之於瑠璃瓶裏金字法花小字法花精妙極也閣前有塔二層八角莊嚴珠麗底下安置阿育王塔埋藏地下不許人見是阿育王所造八萬四千塔之一數也次入善住閣院隨喜有禪僧五十餘人盡是毳衲錫杖各從諸方來巡者者下東本更有者字上者恐看也勅置鎮國道場有天台宗僧講四分律亦是遠和上門下十八日赴善住閣院主請到彼斷中仍見從台州國清寺將來書先於楚州付留學僧圓載上人送天台山延曆寺未決卅條國清寺修座主已通決之便請台州印信刺史押印已了修禪寺敬文座主具寫送臺山弘天台諸德兼日本國无行和上送天台書天台修座王通決已畢請州印信之書台州刺史批判與印信之詞具寫付來廿日始巡臺去從華嚴寺向西上坂行七里許到王子寺喫茶向西上坂行六七里至王花寺更向西上坂十餘里到中臺臺南面有求雨院從院上行半里許到臺頂頂上近南有三鐵塔竝無層級相輪等也其體一似覆鍾周圓四抱許中間一塔四角高一丈許在兩邊者團圓竝高八尺許武婆天子鎮五臺所建也武婆者則天皇是也鐵塔北邊有四間堂置文殊師利及佛像從此北一里半是臺頂中心有玉花池四方各四丈許名為龍池池中心小嶋上有小堂置文殊像時人呼之龍堂池水清澄深三尺來在岸透見底砂淨潔竝无塵草臺頂平坦周圍可百町餘超然而孤起猶如雙出臺形圓聳於此望見餘之四臺西臺北臺去中臺稍近下中臺向北上坂便是北臺之南崖崖東本作涯又下中臺臺東本作堂向西上坂便是西臺之東崖也三臺地勢近相連東臺南臺去中臺竝五十來里中臺東脚長嶺高低屈曲邐迤向南五十里地便與南臺西北脚連北臺東北脚嶺下而復上高低長嶺參差向東四十餘里便與東臺西脚連然五臺高顯出眾嶺之上五臺周圓五百里外便有高峯重重隔谷高起遶其五臺而成墻壁之勢其峰參差樹木欝茂唯五頂半腹向上竝无樹木然中臺臺東本作堂者四臺中心也遍臺水湧地上軟草長者一寸餘茸茸稠密覆地而生蹋之即伏舉脚還起步步水濕其冷如氷處處小窪皆水滿中矣遍臺砂石間錯石塔无數細軟之草間莓苔而蔓生雖地水濕而無滷泥緣莓苔軟草布根稠密故遂不令遊人汙其鞋脚奇花異色滿山西開從谷至頂四面皆花猶如鋪錦香氣芬馥薰人衣裳人云今此五月猶寒花開未盛六七月間花開更繁云云看其花色人間未有者也從臺頂東下坂半里許有菩薩寺夏有粥飯秪供巡臺僧俗從鐵塔前向西漸下路行十餘里下峻坂二里許更上坂向西半里許到西臺供養院於院後有三大巖峰嶮峻直秀三鋒竝起名曰香山昔天竺僧來見此三峰乃云我在西國久住香山今到此間再見香山早出現此乎從供養院向西上坂五六里到西臺頂臺頂平坦周圍十町許臺躰南北狹東西闊東西相望東狹西闊臺頂中心亦有龍池四方各可五丈許池之中心有四間龍堂置文殊像於池東南有則天䥫塔一基圓形无級高五尺許周二丈許莓苔軟草槃石石塔奇異花草不異於中臺地上水湧潛停於草下窪處水停三方崕崖東本作涯峻而東岸邐迤漸下與中臺脚根連從臺西下坂行五六里近谷有文殊與維摩對談處兩箇大巖相對高起一南一北高各三丈許巖上皆平皆有大石座相傳云文殊師利菩薩共維摩相見對談之處其兩座中間於下石上有師子蹄跡蹋入石面深一寸許巖前有六間樓面向東造南頭置文殊像騎雙師子東頭置維摩像坐四角座老人之白頂髮雙結慬僅或慬字色素白而向前覆如戴蓮荷著黃丹衣及白裙於衣上襲披皮裘毛色斑駮而赤白黑兩手不入皮袖右膝屈之著於座上竪其左膝而踏座上右肘在案案東本作𭢀几之上仰掌以申五指左手把麈尾以腕押左膝之上開口顯齒似語㗛之相近於座前西邊有一天女東邊有一菩薩手擎鉢滿盛飯而立又於此樓前更有六間樓相對矣人云見化現時之樣而造之矣樓東行百許步有八功德池水從大巖底湧巡看至夜却到供養院宿廿一日齋後却到中臺菩薩寺喫茶向東北遙望谷底深處數十町地見白銀之色人云是千年凍凌年年雪不消積為凍凌谷深而背陰被前巖遮日光不曾照著所以自古已來雪无一點消融之時矣谷之前嶺便是中臺之東脚也從菩薩寺向北傍中臺之東岸邐迤下坂十里來又更上坂行十餘里到北臺臺頂周圓六町許臺躰團圓臺頂頂下東本更有頂字南頭有龍堂堂內有池其水深黑滿堂澄潭分其一堂為三隔中間是龍王宮臨池水上置龍王像池上造橋過至龍王座前此乃五臺五百毒龍之王每臺各有一百毒龍皆以此龍王為君主此龍王及民被文殊降伏歸依不敢行惡云云龍宮左右隔板墻置文殊像於龍堂前有供養院見有一僧三年不飯日唯一食食泥土便齋發願三年不下臺頂有數箇弟子院前院俯臨深谷臺崕嵯峨而可千刃此谷是文殊曾化現金鍾寶樓之處今呼為鍾樓谷谷之西源是中臺東岸之底谷南便是高嶺嶺之北岸極嶮而深至谷底千年凍凌在幽底而皓暉又向東南望見大花嚴寺臺頭中心有則天鐵塔多有石塔圍遶軟草莓苔遍敷地上隔三四步皆有小井池無數名為龍池水涌沙底而清淺正北正東岸峻高臨深谷北谷名之宋宋池本作榮谷曾有一僧依天台智者法花三昧行法禮懺得見普賢菩薩及多寶塔之處南面雖嶮路而有路可攀躡西北岸漸下成帷終為深谷臺頂東頭有高垖名羅漢臺遍臺亦无樹木從羅漢臺向東南下路邊多有燋石滿地方圓有石墻之勢其中燋石積滿是化地獄之處昔者代州刺史性暴不信因果聞有地獄不信因遊賞巡臺觀望到此處忿然見猛火焚燒巖石黑烟衝天而起焚石火炭赫奕而成圍廊獄卒現前忿慟刺史驚怕歸命大聖文殊師利猛火即滅矣其迹今見在燋石壘為垣周五丈許中滿黑石廿二日粥後傍北臺東腹向東北邐迤下坂尋嶺東行廿里許到上米普通院在堂裏忽見五道光明直入堂中照忽然不現矣惟正惟曉等同在堂皆云不見物奇之不已齋後尋嶺向東漸上坂廿里來到東臺臺東頭有供養院入院喫茶向南上坂二里詐到臺頂有三間堂壘石為墻四方各五丈許高一丈許堂中安置文殊師利像近堂西北有則天鐵塔三基躰共諸臺者同也臺頂无龍池地上亦无水生草稍深臺頂周圓四方各可十丈許臺躰南北漸長東西狹北根長一里許臺南有嶺高低長連三里許然臺頂㝡高顯而无樹木從臺頂向東直下半里地於峻崖上有窟名為那羅延窟人云昔者那羅延佛於此窟行道後向西去窟內濕潤而水滴戶闊六尺窟內黑暗宜有龍潛藏矣日晚却到供養院宿時欲黃昏天色忽陰於東谷底白雲靉靆忽赤忽白而飛揚雷聲霹靂在深谷紛閾人在高頂頭而視風雨共雹亂墜夜深而息廿三日齋後下臺却到上米普通院便向南直下坂行十八里許入谷更向東南行三四里更向西谷行一里許到金剛窟窟在谷邊西國僧佛陁波利空手來到山門文殊現者者恐老字之誤上文一百記事之人身不許入山更教往西國取佛頂尊勝陀羅尼經其僧却到西天取經來到此山文殊接引同入此窟波利纔入窟門自合于今不開窟巖堅密帶黃色當窟戶有高樓崛門在樓下人不得見於樓東頭有供養院窟戶樓上有轉輪藏六角造之見于窟記窟內多有西天聖迹維衛佛時香山摩利大仙造三千種七寶樂器其佛滅後文殊師利將來取取或收字此窟中拘留秦佛時兜率天王造鍾盛一百廿石聞聲者或得四果或得初地等佛滅文殊師利將此鍾來置此窟中迦葉佛時造銀箜𥱌有八萬四千曲調八萬四千曲調各治一煩惱佛滅度後文殊師利將此箜𥱌來收入窟中星宿劫第二佛全身寶塔一千三百級文殊菩薩將此塔來收入此窟振旦國銀紙金書及百億四天下文字文殊菩薩收入此窟云云從窟上坂百步許有文殊堂普賢堂此乃大超和上見金色世界之處也日晚却到大花嚴綱維寺引涅槃院安置閣下一房此則講法花經座主玄亮上人房座主因講權居閣院遠和上及文鑒座主院天台教迹文書備足廿三日始寫天台文書日本國未有者六月六日勅使來寺中眾僧盡出迎候常例每年勅送衣鉢香花等使送到山表施十二大寺寺東本作事今依下文改之細帔五百領綿五百屯袈裟布一千端青色染之香一千兩茶一千斤手巾一千條兼勅供巡十二大寺設齋七日於此寺設勅齋齋後轉花嚴經一部晚際勅使共數十僧上菩薩堂求化現到涅般院禮拜遠和上八日勅使設齋供一千僧九日齋後勅使往金閣寺十一日今上德陽日勅於五臺諸寺設降誕齋諸寺一時鳴鍾㝡上座老宿五六人起座行香聞勅使在金閣寺行香歸京廿一日天色美晴空色青碧无一點翳共惟正惟曉院中數僧於院閣前庭中見色光雲光明暉曜其色殊麗炳然流空當于頂上良久而沒矣院中數十僧不出來者不得見爰有汾州頭陀僧五臺十二寺及諸普通蘭若十年供養主名義圓因送今年供來於同於同池本作於同案同於同莊子之語見光瑞注淚而云義圓發心十年已來每年送遍山供不闕未曾見一相今共外國三藏同見光雲誠知生處雖各在殊方而蒙大聖化同有緣哉從今已後同結結下東本更有結字緣長為文殊師利菩薩眷屬云云廿九日寫天台教迹畢作目錄呈遠和上令題法諱七月一日為往長安排比行李見人說從五臺往長安向西南行二千餘里得到長安也齋前拜遠老宿及講天台止觀文句二座主及大眾訖院主僧廣初設空飯送路齋後便發院內大眾相送到三門外捫淚執手別矣取竹林路從竹林寺前向西南踰一高嶺到保磨鎮國金閣寺堅固菩薩院宿遍臺供養主僧義圓亦歸汾州去今日從花嚴寺續後來同院宿院僧茶語云日本國靈仙三藏昔住此院二年其後移向七佛教誡院亡過彼三藏自剝手皮長四寸闊三寸畫佛像造金銅塔安置今見在當寺金閣下長年供養云云二日共義圓供主等及寺中數僧開金閣禮大聖文殊菩薩騎青毛師子聖像金色顏貌端嚴不可比喻又見靈仙聖人手皮佛像及金銅塔又見辟支佛牙佛肉身舍利當菩薩頂懸七寶傘蓋是勅施之物閣九間三層高百尺餘壁簷椽柱无處不畫內外莊嚴盡世珍異顒然獨出杉林之表白雲自在下而靉靆碧層超然而高顯次上第二層禮金剛頂瑜伽五佛像斯乃不空三藏為國所造依天竺那蘭陁寺樣作每佛各有二脇士竝於板壇上列置次登第三層禮頂輪王瑜伽會五佛金像每佛各一脇士菩薩二菩薩作合掌像在佛前面向南立佛菩薩手印容貌與第二層像各異粉壁內面畫諸尊曼茶羅填色未了是亦不空三藏為國所造瞻禮已畢下閣到普賢道場見經藏閣大藏經六千餘卷惣是紺碧紙金銀字白檀玉牙之軸看願主題云鄭道覺長安人也大曆十四年五月十四日巡五臺親見大聖一萬菩薩及金色世界遂發心寫金銀字大藏經六千卷云云亦有畫脚迹千輻輪相并書跡之根申云貞觀年中太宗皇帝送袈裟使到天竺見阿育王古寺石上有佛跡長一尺八寸闊六寸打得佛迹來今在京城轉畫來此安置云云次開持念曼㭟羅道場禮拜尊像此則不空三藏弟子含光為令李家昌運長遠奉勅持念修法之道壇面三肘以白檀汁和泥塗作每風吹時香氣遠聞金銅道具甚多惣著壇上次開普賢堂禮普賢菩薩像三馬竝立背上安置一菩薩像堂內外莊嚴綵畫鏤刻不可具言七寶經凾真珠繡佛以線串真珠繡著絹上功迹奇妙自餘諸物不暇具錄禮看畢却到院斷中齋後共供主頭陀僧義圓等數人同為一行向南臺去從金閣寺西去寺五里有清凉寺今管南臺此五臺山都號清凉山山中造寺此寺㝡初故號清凉寺寺中有清凉石云云被頭陁引向南臺去不得到彼寺出金閣寺三門尋嶺向南上坂行廿里到南臺西頭向東傍臺南岸行四五里到臺上竝无樹木臺東南側有供養院從院向北上坂三百步許方到臺頂於三間堂內安置文殊菩薩像白玉石造騎白玉師子軟草稠茂零凌香花遍臺芳馥臺躰西北及東南長嶺高低邐迤而漸遠東西北面峻涯臨于邃谷在頂向北遙見四臺歷然在眼前廻首遍觀五頂圓高超然秀於眾峯之上千峯百嶺松杉鬱茂參差間出五頂之下深谿邃谷不見其底幽泉澗水但聞流響異鳥級翔眾峰之上羽翼凌高而飛臺上頂者稀矣五頂之地五百里外四面皆有高峰張列闡擁五臺而可千里竝其鋒刃而有重壚周遶之勢峰谷重重不知幾重且從東入臺山入山谷行五百里上至巉巖之頂下到深谷之底動經七日方得到五臺山地其餘三方四維亦是遠涉山谷方到五臺誠知五臺山乃萬峰之中心也五百毒龍潛山而吐納風雲四時八節輟雷雹頻降矣天色急晴遊人不見長明之光景每晴明時觀于五臺是淺黃之色臺上忽見一點雲起俄爾之間重雲遍山入此山者自然起得平等之心山中設齋不論僧俗男女大小平等供養不看其尊卑大小於彼皆生文殊之想昔者大花嚴寺設大齋凡俗男女乞匃寒窮者盡來受供施主𢛡嫌云遠涉山坂到此設供意者只為供養山中眾僧然此塵俗乞索兒等盡來受食非我本意若供養此等乞乞東本無匃只令本處設齋何用遠來到此山僧勸令皆與飯食於乞匃中有一孕女懷姙在座備受自分飯食訖更索胎中姟子之分施主罵之不與其孕女再三云我胎中兒雖未產生而亦是人數何不與飯食施主曰儞愚癡也肚裏兒雖是一數而不出來索得飯食時與誰喫乎女人對曰我肚裏兒不得飯即我亦不合得喫便起出食堂纔出堂門變作文殊師利放光照曜滿堂赫奕皓玉之貌騎金毛師子萬菩薩圍遶騰空而去一會之眾數千之人一時走出茫茫東本忙今從池本然不覺倒地舉聲懺謝悲泣雨淚一時稱唱大聖文殊師利迄于聲竭喉涸終不蒙廻頋髣髴而不見矣大會之眾飡飯不味各自發願從今已後送供設齋不論僧俗男女大小尊卑貧富皆須平等供養山中風法因斯置平等之式自餘靈化頻現多瑞天下共知今見齋會於食堂內丈夫一列女人一列或抱姟兒兒亦得分童子一列沙彌一列大僧一列尼眾一列皆在床上受供養施主平等行食有人分外多索亦不恠之隨多小皆與之也山中多寒五六七月遍五臺五百里內奇異之花開敷如錦滿山遍谷香香氣薰馥每臺多有䓗韮生昔者孝文皇帝住此五臺遊賞文殊菩薩化為僧形從皇帝乞一座具地皇帝許之其僧見許已敷一座具滿五百里地皇帝恠云朕只許一座具地此僧敷一座具遍滿五臺大奇朕不要共住此處遂以䓗韮散五臺上便出山去其僧在後將零凌香子散䓗韮之上令无臰氣今見每臺遍生䓗韮惣不聞臰氣有零凌香滿臺生茂香氣氛氳相傳云五臺五百里敷一座具地矣今在南臺上共頭陁等數十人同求大聖化現及夜不見遂歸院宿初夜臺臺下東本更有臺字東隔一谷嶺上空中見有聖燈一盞眾人同見而禮拜其燈光初大如鉢許後漸大如小屋大眾至心高聲唱大聖號更有一盞燈近谷現亦初如笠向後漸大兩燈相去遠望十丈許熖光熖然直至半夜沒而不現矣三日齋後共頭陀等同為一行頭陀云相送直到汾州在路與作主人從臺頂向南下行十七里許於谷裏有一院屋舍破落無人名為名名字恐衍七佛教誡院院額題云八地超蘭若日本僧靈仙曾居此處身亡渤海僧貞素哭靈仙上人詩於板上書釘在壁上寫之如後哭日本國內供奉大德靈仙和尚詩并序渤海國僧貞素起余者謂之應公矣公仆而習之隨師至浮桑小而大之介立見乎緇林余亦身期降降東本作綘物負笈來宗霸業元和八年窮秋之景逆旅相逢一言道合論之以心素至於周鹽小子非其可乎居諸未幾早向鴿原鶺鴿之至足痛乃心此仙大師是我應公之師父也妙理先契示于元元長慶慶東本作廣二年入室五臺每以身厭青瘀之器不將心聽白猿之啼長慶五年日本大王遠賜百金達至長安小子轉領金書送到鐵懃仙大師領金訖將一萬粒舍利新經兩部造勑五通等屬附小子請到日本答謝國恩小子便許一諾之言豈憚萬里重波得遂鍾无外緣期乎遠大此句有疑无池本作元臨廻之日又附百金以大和二年四月七日却到靈境寺求訪仙大師已已或亡誤來日久位位或泣誤我之血崩我之痛便泛四重溟渤視死若歸連五同行李如食之頃者則應公之原交所致焉吾信始而復終願靈凡兮兮或分字表悉悉或志字空留澗水嗚咽千秋之聲仍以雲松惆悵萬里之行四月蓂落如一如一恐一如首途望京之耳不即那字超傳多用此字塵心淚自涓情因法眼奄幽泉明朝儻問滄波客的說遺鞋白足還大和二年四月十四日書於小窟中安置七佛像當窟戶有一堂堂南邊有一小菴室於堂下有二屋竝破落庭地芒蕪而无人昔於此窟前七佛現矣南行三里許到大曆靈境寺向老宿問靈仙三藏亡處乃云靈仙三藏先曾多在䥫懃蘭若及七佛教誡院後來此寺住浴室院被人藥𭣦中毒而亡過弟子等埋殯未知何處云云於寺三門兩邊有聖金剛菩薩像昔者於太原幽鄭等三三下池本有州字節度府皆現金剛身自云我是樓至佛身作神護佛法埋在地中積年成塵再出現今在臺山靈境寺三門內三州節度使驚恠具錄相貌各遣使令訪有二金剛在寺門左右其形貌躰氣一似本州所現體色同其使却到本道報之遂三州發使來特修舊像多有靈驗具如碑文寫之在別近三門側𠃵角有山榆樹根底空豁成窟名曰聖鍾窟窟中時時發鐘響響發之時山峯振動相傳云斯是大聖文殊所化也相傳呼為聖鍾谷寺之正東去寺十來里有高峯號為寶石山窟中多有小石每石現圓光攝身光五色雲此亦聖人化現所致也四日齋後向西南入谷踰嶺行十五里到大曆法花寺重閣於峻崖上建立四方涯面盡是花樓寶殿任地高低堂舍比櫛經像寶物絕妙難言巡觀諸院次入法花院見神道和尚影此和上在生依天台法花三昧行法修行長念法花經四十三年不出院感得六根清淨遷化數年矣其影及所持法花經及三昧行法并證得三昧坐處大椅子並今見在從法花寺西北十五里有佛光寺五日齋後西南行二里到上房普通院宿六日早發向西南行五里許向南遙望高嶺巖頂巉巘中心有一大孔透見那畔之空其孔遠見如笠子許大斯乃孝文帝射箭透過之處向西南行七里許到思陽嶺昔儀鳳元年西天梵僧佛陁波利來到此處雨淚遙禮臺山感得大聖化為老人約約池本作初令却廻天竺取佛頂之處今見建寶幢幢上篆佛頂陀羅尼及序便題波利遇老人之事從思陽嶺西南行十三里到大賢嶺於普通院斷中路從嶺上過當嶺頭有重山門樓此乃五臺南山門也齋後向西南行五里許到代州所管五臺縣向西南行卅里過胡陁河到建安寺宿八日齋後向西南行卅里到忻州定襄縣七巖寺宿九日早發西南行卅里許到胡村普通院斷中歇十日早發行卅卅東本改廿里許到宋村普通院斷中行卅五里到名嶺鎮南關頭普通院宿十一日早發行廿里許到大干普通院斷中行廿五里至蹋地店宿十二日五更發行卅五里到白楊普通院斷中更行十五里到三交驛歇次入定覺寺庄見水碾名為三交碾更行十五里到古城普通院宿十三日平明發行十五里到太原府屬河東道此則北京去西京二千來里北門入到華嚴下寺住見南天竺僧法達從臺山先在自云我是鳩摩羅什三藏第三代苗裔五臺山大莊嚴寺僧下山來者皆此寺下故名華嚴下寺彼供養主義圓頭陁引到此寺頭陁自從臺山為同行一路已來勾當粥飯茶无所關少十五日赴四眾寺主請共頭陁等到彼寺齋齋後入度脫寺巡禮盂蘭瓫會及入州見龍泉次入崇福寺巡禮佛殿閣下諸院皆鋪設張列光彩映人供陳珍妙傾城人盡來巡禮黃昏自恣十六日入開元寺上閣觀望閣內有彌勒佛像以䥫鑄造上金色佛身三丈餘坐寶座上諸寺布設各選其勝十七日赴節度同十將胡家請共供主僧義圓到彼宅齋諸寺盂蘭瓫會十五日起首十七日罷十八日南天竺三藏法達邊寫取五臺山諸靈化傳碑等十八日欲向長安發去頭陀僧義圓見雇博士自出帔子一領畫五臺山化現圖擬付傳日本國為待畫畢不得發去十九日隨頭陁赴女弟子真如性請到宅斷中因同巡臺來今為主人廿二日共頭陁赴尼真如心宅齋亦是同巡五臺者也廿三日共頭陁赴大業寺律大德院齋尼大德三人亦共頭陁同巡臺來廿六日畫化現圖畢頭陁云喜遇日本國三藏同巡臺同見大聖化現今畫化現圖一鋪奉上請將歸日本供養令觀禮者發心有緣者同結緣同生文殊大會中也齋後辭別院中眾僧始向長安去頭陀云余本心欲送和上直到汾州在路作主人今到此間勾當事未了不免停住十數日間不遂本請云云同巡臺僧令雅云余欲得送和上向長安去頭陁囑云替余勤勾當行行下東本有里字李努力侍奉莫令遠客在路寂寞便為同行發頭陁云相送同出城共巡禮西山去便同出城西門向西行三四里到石山名為晉山遍山有石炭近遠諸州人盡來取來取池本作取來燒修理飯食極有火勢見乃巖石燋化為炭人云天火所燒也竊惟未必然矣此乃眾生果報所感矣山門有小寺名為石門寺寺中有一僧長念法花經已多年近日感得舍利見傾城人盡來供養僧俗滿寺不知其數得舍利之初源者念經僧夜於夜於東本作於夜房中坐念經有三道光明來照滿房暉明而遍照寺尋光來處從寺西巖底出來每夜照室及寺院其僧數日之後尋光到巖所掘地深一丈餘得三瓶佛舍利青瑠璃瓶裏有七粒舍利白瑠璃瓶中有五粒舍利金瓶之中有三粒舍利擎來安置佛殿中供養大原城及諸村貴賤男女及府官上下盡來頂禮禮東國二本無供養皆云是和上持法花經不可思議力所感得也從城至山來往人滿路稠密觀禮奇之從石門寺向西上坂行二里許到童子寺慈恩臺法師避新羅僧玄測法師從長安來始講唯識之處也於兩重樓殿滿殿有大佛像見碑文云昔冀州禮禪師來此山住忽見五色光明雲從地上空而遍照其光明雲中有四童子坐青蓮座遊戲響動大地巖巘頹落岸上崩處有彌陀佛像出現三晉盡來致禮多有靈異禪師具錄申送請建寺遂造此寺因本瑞號為童子寺敬以鐫造彌陁佛像出現顏容顒顒下恐脫然字皓玉端麗趺座之體高十七丈闊百尺觀音大勢各十二丈云云廿七日粥後發於此與供養主義圓頭陁別矣共同巡臺僧令雅同為一行共往西京從童子寺南踰一嶺到雨花寺斷中從雨花寺向西