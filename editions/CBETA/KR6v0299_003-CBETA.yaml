作一狀合合恐令字知事由如左日本國僧圓仁弟子僧惟正惟曉行者丁雄萬右圓仁等去開成三年四月隨本國朝貢使上船過海到七月二日到揚州海陵縣白湖湖上文作潮鎮八月內到揚州寄住開元寺過一冬開成四年二月離揚州到楚州寄在開元寺至七月到登州文登縣赤山院住過一冬至今年二月離登州三月到青州權住龍興寺十日已來遂於節度使壽尚書邊請得公驗五月一日到五臺山巡禮聖跡七月一日從五臺來今三月廿三日到城今請權寄住城中寺舍尋師聽學却歸本國謹具如前伏請處分牒件狀如前謹帖開成五年八月廿四日日本國求法僧圓仁帖緣開府不出不得進狀案頭何判官送到內護國天王寺安置寺在左神策軍毬場北寺與大內隔墻即皇城內城東北隅也常置二七僧令轉念眾僧見客周匝廿五日齋後從使院有使喚僧等隨使入使衙得功德使牒偁權寄住資聖寺仰綱維供給者知巡侍御准使帖轉帖資聖寺便差巡官送到寺且在庫西亭安置廿六日雨下暮際綱維安排房院於淨土院安置院主僧師安有道心見客僧慰問慇懃每向諸僧尋問持念知法人未得的實九月五日夜繫念毘沙門誓願乞示知法人聞揚州節度使繫繫恐衍李德裕有勑令入京九月三日入內任宰相六日早朝當院僧懷慶持念為業將佛舍利五粒來令禮拜語曰如要持祕法余能知一城內解大法人青龍寺潤和尚案惠果弟子法潤但解胎藏深得一業城中皆許好手彼寺雖有西國僧未多解語持念之業不多苦解大興善寺文悟闍梨解金剛界城中好手青龍寺義真和尚惠果弟子兼兩部大興善寺有元政和尚深解金剛界事理相解彼寺雖有西國難陁三藏不多解唐語大安國寺有元簡闍梨解金剛界好手兼解悉曇解畫解書梵字玄法寺法全和尚深解三部大法新天子新造一寺在宣陽坊未賜寺額是元和上太后所建也今上與太后別勑新造勑城中諸寺簡擇五十餘僧配入此寺七日齋時左街功德使知巡押衙趙鍊入當寺來簡取七僧從八月廿六日至九月十日霖雨不霽十四日作狀起居知巡侍御如左季秋漸冷伏惟侍御尊體動止萬福即此圓仁蒙恩限以客事不獲詣展勤竭勤竭池本作覲謁似是之誠在物難喻圓仁先因小事甚為奉煩乍得房院欲擬參謝緣數十日陰雨不晴未由遂情伏深悚伏請莫賜恠責覲謁在近但增增字東本無馳結謹遣弟子僧惟正奉狀起居不宣謹狀開成五年九月十四日日本國求法僧圓仁狀上知巡侍御閣下謹空侍御答書在別更得侍御傳語云客中乍到如何寺裏無堂飯飯食應不如法和尚自作一狀將來余進開府安置有堂飯寺云云十八日作狀奉呈侍御日本國求法僧圓仁右圓仁先日伏蒙雅旨殊賜安存下情无任歡荷之誠然圓仁等乍到已蒙使司仁造權置此寺感慶伏深更無所望如請移住有堂飯寺伏恐惱亂大官今請住資聖寺往來諸寺尋師聽學任意求法夜歸本寺伏乞侍御恩造特賜允許謹具如前伏請處分牒件狀如前謹牒開成五年九月十八日日本國求法僧圓仁牒侍御傳語云任和尚意更有所要即報來與和尚取穩便十月十三日差惟正共懷慶闍梨遣青龍寺令見知法人於東塔院有義真和尚解胎藏日本國行闍梨圓行於此學法更有法潤和尚解金剛界年七十三風疾老耄十六日遣大興善寺令簡擇知法人翻經院有元政阿闍梨解金剛界持念文書備足天竺難陀三藏不多解唐語文語闍梨不及於政阿闍梨十七日遣狀起居政阿闍梨兼借請念誦法門久藉芳猷未因接展欽仰之誠難以喻言昨辱榮問殊慰愚情孟冬漸寒伏惟和尚道體動止萬福圓仁遠辭本緣訪尋佛教遊到城中未有服勤伏承和尚德尊道高究暢法藏開演真教圓仁雖未頂謁殊仰道風伏以客事不獲專詣勤慕空積奉顏未間但增馳結謹遣弟子僧惟正奉狀代身不宣謹狀開成五年十月十七日日本國僧圓仁狀上興善寺政和尚法前謹空於赤山寺夢見買得秤一具其賣秤人云此是秤定三千大千世界輕重之秤也聞語奇歡云云借得念誦法門十八日始寫廿九日往大興善寺入勑翻經院參見元政和尚始受金剛界大法入勑置灌頂道場禮諸大曼茶羅設供養受灌頂又翻經堂壁上畫金剛智和尚及不空三藏影於翻經堂南有大弁正廣智不空和尚舍利塔金剛智不空二三藏曾於此院翻經也開成五年十二月廿九日夜夢見畫金剛界曼陀羅到本國大師披其曼陀羅極太歡喜擬禮拜大師大師云我不敢受汝禮拜我今拜汝云云慇懃歡喜畫曼陀羅來十一月三日雪下十三日雪下廿六日冬至節僧中拜賀云伏惟和尚久住世間廣和眾生臘下及沙彌對上座說一依書儀之制沙彌對僧右膝著地說賀節之詞喫粥時行餛錕東本作餛飩菓子十二月八日准勑諸寺行香設齋當寺李德裕宰相及勑使行香是大曆玄宗皇帝忌日也惣用官物設齋當寺內道場三教談論大德知玄法師表讚廿二日令永昌坊王惠始畫金剛界大曼茶羅四副廿五日更則入新年眾僧上堂喫粥餛餛東本作飩雜菓子眾僧喫粥間綱維典座直歲一年內寺中諸庄及交易并客斷斷恐新字諸色破用錢物帳眾前讀申開成六年辛酉正月一日僧俗拜年寺中三日有飯供僧四日國忌奉為先皇帝勑於薦福寺令行香請一千僧六日立春節賜胡餅寺粥時行胡餅俗家皆然又別勑除左金吾吾東本作五衛大將軍是國親今帝之阿舅元來貧窮去年行於坊寺擔蘿菊紫等賣今新承恩作金吾吾東本作五大將軍入內蒙除出來時廿對金甲引馬騎軍將五六十來把棒遏道步軍一百來衛駕步軍竝皆著錦來帽子錦袍其大將軍著衣冠靴皆繡鳥衛衛恐銜瑞草之文拜南郡郡恐郊字南郊天壇所在後除鳳翔府節度使七日今天子幸太清宮齋八日早朝出城幸南郡郡恐郊字下俲之壇壇在明德門前諸衛及左右軍廿萬眾相隨諸奇異事不可勝計九日五更時拜南郡郡下池本有壇字了早朝歸城幸在丹鳳樓改年號改開成六年為會昌元年及勑於左右街七寺開俗講左街四處此資聖寺令雲花寺賜紫大德海岸法師講花嚴經保壽寺令左街僧錄三教講論賜紫引駕大德體虛法師講法花經菩提寺令招福寺內供奉三教講論大德齊高法師講涅槃經景公寺令光影法師講右街三處會昌寺令內供奉三教講論賜紫引駕起居大德文漵法師講法花經城中俗講此法師為第一惠日寺崇福寺講法師未得其名又勑開講道教左街令勑新從釰南道道東本作追召太清宮內供奉矩令費於玄真觀講南花等經左街一處未得其名竝皆奉勑講從大和九年以來廢講今上新開正月十五日起首至二月十五日罷二月八日金剛界曼茶羅禎畫了又勑令章敬寺鏡霜法師於諸寺傳阿彌陀淨土念佛教廿三日起首至廿五日於此資聖寺傳念佛教又巡諸寺每寺三日每月巡輪不絕又大莊嚴寺開釋迦牟尼佛牙供養從三月八日至十五日薦福寺開佛牙供養藍田縣從八日至十五日設无礙茶飯十方僧俗盡來喫左街僧錄體虛法師為會主主東本作至主至屢誤諸寺赴集各設珍供百種樂食珍妙菓花眾香嚴備供養佛牙及供養樓廊下敷設不可勝計佛牙在樓中𨓍城中大德盡在樓上隨喜讚歎舉城赴來禮拜供養養東本無有人施百石粳米廿石粟米有人无礙供䭃頭足有人施无礙供雜用錢足有人供无礙薄餅足有人施諸寺大德老宿供足如是各各發願布施莊嚴佛牙會向佛牙樓散錢如雨求法僧等十日往彼隨喜登佛牙樓上親見佛牙頂戴禮拜兼入翻經院見義淨三藏影壁上書書恐畵字三藏摩頂松樹街西興福寺亦二月八日至十五日開佛牙供養崇聖寺亦開佛牙供養城中都有四佛牙一崇聖寺佛牙是那吒太太東本傍注天歟子從天上將來與終南山宣律師一莊嚴寺佛牙從天竺入入字有疑或人字腿肉裏將來護法迦毗羅神將護得來一法界和尚從于填國將來一從土蕃將來從古相傳如此今在城中四寺供養二月十三日受金剛界大法畢供養金剛界曼茶羅及受傳法灌頂以五瓶水灌於頂上至夜供十二天每事吉祥兼登慈恩寺塔十五日興唐寺奉為國開灌頂道場從十五日至四月八日有緣赴來結緣灌頂三月廿五日詣崇聖寺禮釋迦牟尼佛牙會有人多云終南山和尚隨毘沙門天太子得此佛牙那吒天子從天上將來與和尚今置此寺供養四月一日大興善寺翻經院為國開灌頂道場直到廿三日罷四日往青龍寺入東塔院委細訪見諸曼茶羅七日往大興善寺入灌頂道場隨喜及登大聖文殊閣九日開府迎碑讚揚開府功名德政之事也從大安國寺入望仙門左神筞軍裏建之題云仇公紀功德政之碑迎碑軍馬及諸嚴備之事不可計數今上在望仙樓上觀者十三日喚畫工王惠商量畫胎藏幀功錢十五日齋了睡見當寺老僧送卌疋絹來云有施主知噵和尚擬作胎藏像故付布施來云云房裏有俗人十人許相共隨喜云和尚令早作胎藏曼茶羅錢物滿滿无著處領得其物又夢有一僧將書來云從五臺山來住北臺頭陁付書慰問日本和尚便開封看書初注云生年未相謁先在五臺一見云云具問詞付送來白絹帶小刀子竝舊極好領得其物擎喜云云晚間博士王王東本無惠來畫幀功錢同量定了五十貫錢作五副幀二十八日始畫胎藏幀孟夏漸熱伏惟和尚道體萬福即此圓仁蒙惟免被拘抄寫事不得數就面展乃乃恐反見下文伏深一兩日後專到拜覲未間但增馳結謹遣弟子僧惟曉謹狀起居不宣謹狀會昌元年四月日日本國求法沙門仁狀上青龍寺真和尚座前識空絹參疋右物輕尠謹充遮勢之資圓仁數年行客緣身貧薄奉覲雖近無物供養前件微物謹表重志伏望領至莫嫌輕少不宣謹白會昌元年四月日求法僧圓仁上青龍寺真和尚法前興善寺新譯經念誦法等四月廿二日寫了和尚曰余所解金剛界大法盡付囑了其法門等盡寫了更有不足者別處尋覓與元政和尚金前後都計廿五兩自外不在數限錢壹拾貫文右雖輕少謹表重誠伏望檢領圓仁為法遠來喜遇和尚求學胎藏大法伏請慈悲特垂付授伏願弘傳佛法利益有情无任勤欽之誠謹奉狀謹白會昌元年四月廿八日日本國求法僧圓仁上青龍寺真和尚法前廿八日下手畫胎藏幀卅卅池本作二十九日黃昏昏東本無畫金剛界九會曼茶羅功錢商量定除畫絹外六十十下文作千文真和尚教化俗人助加絹卌六尺賜充畫絹五月一日遣行者丁雄萬謝昨日伏奉芳旨諸事欲成就歡躍無極深謝和尚教化賜絹卌六尺充畫功德慈緣殊深專在圓仁无任感荷夏熱夜來惟和尚道體萬福即此圓仁蒙惟免緣有小事不獲自詣陳謝悚愧伏深後日專到院中面謝未間但增馳仰无任感愧歡欣之誠謹遣丁雄萬奉狀伏申不宣謹狀會昌元年五月一日求法僧圓仁狀上青龍寺真和尚法前謹空五月一日勑開講兩街十寺講佛教兩觀講道教當寺內供奉講論大德嗣標法師當寺講金剛經青龍寺圓鏡法師於菩提寺講涅槃經自外不能具書三日始畫金剛界九會曼茶羅幀五副除畫絹外六千文是畫功也此日於青龍寺設供養便於勑置本命灌頂道場受灌頂拋花始受胎藏毘盧遮那經大法兼蘇悉地大法五月十四日喫苽美熟六月十一日今上降誕日於內裏設齋兩街供養大德及道士集談經四對論議二箇道士賜紫釋門大德惣不得著南天竺三藏寶月入內對君王從自懷中拔出表進請歸本國不先諮開府惡惡或急字發五日軍內收禁犯越官罪故寶月弟子子東國兩本無三人各決七棒通事僧決十棒不打三藏不放歸國八月七日為歸本國修狀進使資寺日本國求法僧圓仁弟子僧惟正惟曉行者丁雄萬右圓仁等去年八月廿三日從五臺山來到城中伏蒙開府仁造令權寄住資聖寺今擬劫歸本國不敢專擅謹具如前伏聽處分牒件狀如前謹牒會昌元年八月日日本國求法僧圓仁謹牒九月一日勑兩街諸寺開俗講七日聞日本僧惠萼弟子三人到五臺山其師主發願為求十方僧供却歸本國留弟子二人令住臺山廿三日大雪下一日一夜樹木摧折十一月一日冬至節彗星出現數日之後漸漸長大官家仰諸寺轉經十二月三日移住西院四日月共大伯星相近一處行八日國忌當寺官齋城中諸寺有浴彗星漸沒現會昌二年歲次壬戌正月一日家家立竹杆懸幡子新歲祈長命諸寺開俗講二月一日勑加蓋仇開府充觀軍容使便知天下軍事十七日寒食節前後一日都三日暇家家拜墓十九日清明節廿九日於玄法寺法全阿闍梨所始受胎藏大法又於大安國寺元簡簡東本誤作箇阿闍梨所重審決悉曇章三月三日李宰相聞奏僧尼條疏勑下發遣保外無名僧不許置童子沙彌八日薦福寺聞佛牙供養詣寺隨喜供養街西興福寺開佛牙會會東本無巡院轉帖興善青龍資聖等三寺外國僧三藏等右奉軍客處分前件外國僧竝仰安存不得發遣者事須轉帖各仰准此處分訖報者准狀轉帖者會昌二年三月五日帖押衙知巡何公貞十一日詣興福寺禮佛牙一宿十二日晚因臺山供主供主東本作求供義圓歸山付送百五十僧供日本國求法僧圓仁弟子僧惟正惟曉行者丁雄萬敬送清凉山佰伍拾僧供右圓仁等設供意者求法得遂過海無難平善得達廣利羣生群生東本作郡主劫劫生生常為大聖文殊眷屬利益十方法界含靈同霑此福謹疏會昌二年三月十二日日本國求法僧圓仁等謹疏廻鶻軍兵入唐侵境今在秦府國家抽六節度府兵馬遣廻鶻界首城中有廻鶻人數百准勑盡斬煞訖在諸州府亦同斯格巡院帖資聖寺日本國僧圓仁并弟子惟正惟曉行者丁雄萬等右奉使帖得狀令發遣保外客僧出寺其圓仁等未敢專擅發遣奉軍客處分不用發遣依前收管者准狀巡帖者帖寺仰准使帖處分者會昌二年三月十日帖押衙知巡何公貞見說廻鶻兵馬入秦府城住節度使逃走新除節度使在路不敢入玄法寺法全座主解三部大法施胎藏大軌儀三卷兼別尊法三卷胎藏手手池本作印契充遠國廣行送書謝展接近勤渴勤渴池本作覲謁難令夏契此句有疑伏惟座主道體萬福即此圓仁蒙恩依少故詣展不獲伏深反謝座主慈流施法門六卷充廣行不勝感愧弘傳遠國以答法恩但未有供養悚側尤甚一兩日後自到院中面謝未間但增馳結謹遣小師奉狀不宣謹狀會昌二年四月日會昌二年東本無日本國求法沙門圓仁狀全座主法前謹空四月廿三日天子在御樓冊尊號諸司軍兵馬排隊樓前百寮僧門道士班列宰相進尊號五月奉勑開俗講兩街各五座廿五日圓載留學傔從僧仁濟來便得載上人會昌元年十二月十八日書委曲云日本入唐大使相公到本國京城有亡薨亡東本似六字池本作六大使藤原常嗣承和七年薨長判官得伊豫介錄事得左少史高錄事大宰典淳和皇帝去年七月崩第二船漂落裸人國被破船人物皆損偶有卅來人得命圻圻恐折歟破大舶作小船得達本國云云又楚州新羅譯語劉慎言今年二月一日寄仁濟送書云送朝貢使梢工水手前年秋廻彼國玄濟闍梨附書狀并砂金廿四小兩見在弊所惠萼和尚附船到楚州已巡五臺山今春擬返故鄉慎言已排比人船訖其萼和尚去秋蹔住天台冬中得書云擬趁李隣德四郎船取明州歸國依萼和尚錢物衣服并弟子悉在楚州又人船已備不免奉邀從此發送載上人委曲云僧玄濟將金廿四小兩兼有人人書狀等付於陶十二部部恐郎歸唐此物見在劉慎言宅廿五日使牒勘問外國僧藝業巡院帖揚化團當團諸寺應有外國僧等右奉使帖勘從何國來及到城年月兼住寺并年幾許許東本無解何藝業具名申上者事須帖團仰速折狀通功待申上不得遲速速恐違者准狀帖團者會昌二年五月廿五日帖押衙知巡何何下池本有公貞二字資聖寺日本國僧圓仁年五十解講法花經弟子僧惟正年三十僧惟曉年卅一竝解法花經奉帖勘從何國來及到城年月兼住寺并年幾許年許東本無解何藝業等右圓仁等為抄寫闕本經論流傳本國去開成三年七月隨日本國朝貢使來到揚州去開成五年八月廿三日到城奉使牒權寄住資聖寺聽學謹具如前謹牒牒件狀如前謹帖會昌二年五月廿六日日本國僧圓仁等謹牒五月十六日起首於青龍寺天竺三藏寶月所重學悉曇親口受正音廿九日有勑停內供奉大德兩街各廿員六月十一日今今東本無上德陽日大內降誕降降恐衍齋兩街大德對道士御前論義道士二人得紫僧門不得著紫七月廿一日留學僧傔人仁濟歸天台去遣惟正相隨到楚州令令東本作全取本國書信八月十六日夜月蝕十月十三日惟正從楚州歸到上都得大國書二封楞嚴院狀一封高上人書一封刀子四抦其付陶中金廿四小兩楚州譯語劉慎言先已月月恐用字盡惣不得而空手來得譯語報云據圓載闍梨命先已用矣書凾封先已拆開十月九日勑下天下所有僧尼解燒練呪術禁氣背軍身上杖痕鳥文雜工功曾犯婬養妻不修戒行者竝勒還俗若僧尼有錢物及穀斗田地庄園收納官如惜錢財情願還俗玄亦任玄亦任恐亦任意之誤勒還俗充入兩稅傜伇勑文在別城中兩街功德使帖諸寺不放出僧尼長閇寺門僧眩玄奏自作劒輪自領兵打廻鶻國勑令彼僧試作釰輪不成又准宰相李紳聞奏因起此條疏其僧眩眩東本作玄當誑隸僧尼財物准勑條疏天下大同諸州府中書門下牒行京城內仇軍容仇軍容左傍東本有勅罪准勑斬煞訖左右街功德使帖諸寺勘十七字拒勑不欲條疏緣勑意不許且許請權停一百日內帖諸寺不放僧尼出寺左街功德使奏准勑條疏僧尼除年已衰老及戒行精確外愛惜資財自還俗俗下恐脫僧字尼共一千二百卅二人右街功德使奏准勑條疏僧尼除年已衰老及戒行精確外愛惜資財自願還俗僧尼共二千二百五五東本無下文有五十九人奉勑右街功德使奏准去年十月七日十六日勑條疏令還俗僧尼宜依其愛惜資財情願還俗者各委本貫收充兩稅戶向後諸道有如此色類竝准此處分所蓄奴婢僧許留奴一人尼許留婢二人餘各任本家收管如无家者官為貨賣同衣鉢餘外資財收貯待後勑處分其僧尼所留奴婢如有武藝及解諸藥諸術等竝不得留不得剃剃東本作削髮私度如有違犯綱維知事錄報官餘資產錢物等各委功德使自條疏聞奏會昌三年歲次癸亥正月一日十七日功德使帖諸寺僧尼入條疏內竝令還俗此資聖寺卅七人十八日早朝還俗訖左街還俗僧尼共一千二百卅二人右街還俗僧尼共二千二百五十九人廿七日軍容有帖喚當街諸寺外國僧廿八日早朝入軍裏青龍寺南天竺三藏寶月等五人興善寺北天竺三藏難陁一人慈恩寺師子國僧一人資聖寺日本國僧三人諸寺新羅僧等更有龜茲國僧不得其名也都計廿一人同集左神筞軍軍容衙院喫茶後見軍容軍容親慰安存當日各歸本寺廿九日楚州新羅人客來得楚州譯語劉慎言言東本無書一道順昌阿闍梨梨東國本作利書一道二月一日使牒云僧尼已還俗者輒不得入寺及停止又發遣保外僧尼不許住京入鎮內二月廿五日和蕃公主入城百司及三千兵馬出城外迎入通化門入內得對勑令安置南內院是大和公大和天子為和廻鶻國嫁與廻鶻王今緣彼國王法崩兵馬亂起公主逃歸本國隨公公下恐脫主字來廻鶻人竝不得入城廻鶻王子隨公主來公主在路自煞之四月中旬勑下今煞天下摩尼師剃髮令著袈裟作沙門形而煞之摩尼師即廻鶻所崇重也五月廿五日使帖勘諸寺外國僧來由巡院帖菩提團諸寺應有外國僧等右奉使帖仰勘從何處來及到城兼住寺年月并年幾解何藝業各具名分折申不得遲違者事須帖團仰速具分折狀過待憑申使者准狀帖團者五月廿五日行押衙知巡何日本國求法僧圓仁五十一解講法華經弟子僧惟正年卅一僧惟曉年卅二竝習法花經右圓仁等為求佛教隨朝貢使過海去開成五年八月廿三日奉使處分權寄住資聖寺謹具如前謹牒牒件狀如前謹牒會昌三年五月廿六日日本國求法圓仁謹牒
