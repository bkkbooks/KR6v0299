body:
  text: 開成四年四月十九日平明天晴北風吹舉矴南出未時風止搖櫓指西南行申時到邵村浦下矴繫住當於陶村之西南擬入於澳逆潮遄流不能進行廿日早朝新羅人乘小船來便聞張寶亮與新羅王子同心罰得新羅國便令其王子作新羅國王子既了南風稍切緣潮逆遄不得定住東西往復搖振殊甚廿一日雲霧午後南風切吹廿二日雲雨申時挾抄一人死却載艇移置嶋裏廿三日雲氣南風廿四日霧雨此泊舶之處結纜纜斷風吹浪高近日下八箇纜其三箇纜矴竝斷落所餘之纜甚少設逢暴風不能繫住憂怕無極廿四四或五誤日西風吹暮際騎馬人來於北岸從舶上差新羅譯語道玄令迎道玄却來云來者是押衙之判官在於當縣聞噵本國使船泊此日久所以來擬相看緣夜歸去不得相看明日專詣於舶上更令新羅人留於岸上傳語於道玄轉為官人令申來由便聞本國朝貢使駕新羅船五隻流著萊明明恐州字廬山之邊餘之四隻不知所去雖聞是事未詳是第幾之船又聞大唐天子為新羅王子賜王位差使擬遣新羅排比其船兼賜祿了廿五日風吹不定霧氣未晴午時昨日後岸歸去押衙之判官寄王教言贈與於官人酒魚等王教言亦自獻酒餅等來官人賜綿等此舶舶或泊字多有潛磯每當浪漂斷纜沈矴五六度矣未後搖櫓向乳山去出邵村浦從海裏行未及半途暗霧儵起四方俱昏不知何方之風不知向何方行拋矴停住風浪相競搖動辛苦通夜無息廿六日早朝雲霧微霽望見乳山近在西方風起東北懸帆而行巳時到乳山西浦泊舶停住山嶋相衛如垣周圍其乳山之體峻峰高穎頂上如鋒山根自嶺下而指六方於澳西邊亦有石山巖峰竝嶺高秀半天東之與北雖有山連而猶斜耳未時新羅人卅餘騎馬乘驢來云押衙潮落擬來相看所以先來候迎就中有一百姓云昨日從廬山來見本國朝貢船九隻俱到廬山人物無損其官人等惣上陸地作幕屋在從容候風云云不久之間押衙駕新羅船來下船登岸多有娘子朝貢使判官差新羅譯語道玄遣令通事由已後粟錄事下舶到押衙處相看兼作帖請食粮先在東海縣但過海之粮此舶過海逆風却歸流著此間事須不可在此喫過海粮仍請生料云云押衙取狀云更報州家取處分晚頭歸宅終日東北風吹廿七日陰雨北風廿八日天晴押衙來與官人相看廿九日北風吹令新羅譯語道玄作謀留在此間可穩便否道玄與新羅人商量其事却來云留住之事可穩便五月一日遣買過海粮於村勾當王訓之家兼問留住此村之事王訓等云如要住者我專勾當和尚更不用歸本國云云依事不應未能定意終日西風吹二二東本作廿非也今從池本日西風吹解纜出澳為風甚切行路近磯不能即出酉時風停任流到海口停留遣令汲水日沒之時於舶上祭天神地祇亦官私絹纈鏡等奉上於船上住吉大神丑時水手一人自先沈病將臨死未死之前纏裹其身載艇送弃山邊送人却來云弃著岸上病人未死乞飯水語云我病若癒尋村里去舶上之人莫不惆悵三日風吹不變從乳山西南海口懸帆進發風途稍平午時風止不久東風吹㢠帆却歸到乳山泊口停宿四日辰時從泊口西南四五許里行於望海村東浦桑嶋北邊結纜五日下舶登陸作五月節兼浴沐浣衣晚頭從舶上將狀來其狀偁順風難扇不遂利涉頭判官共眾議合合池本作全船潔齋從明日始三箇日延屈諸和尚轉經念佛祈願順風照察幸垂光儀者緣夜未即赴夜頭於陸岸宿六日早朝赴舶上去於舶上齋新羅譯語道玄向押衙宅去齋後更登陸岸著幕排比修法之事晚頭祭五方龍王戒明法師勾當其事七日雨下九日早朝轉經事畢十一日祭大唐天神地祇從此日至十三日天色或暗或霽風吹不定十四日州押衙來於舶上問舶上之人數旦歸村家邵村勾當王訓等來相看便聞本國相公等九隻船先從廬山過海遇逆風更流著於廬山以來之泊入夜雷鳴洪雨十五日朝雲色騷亂雲雨稍切州押衙來於船上請舶上人數官人具錄其數帖報州家晚頭押衙歸朝貢使賞祿絁綿等十六日天暗押衙使來請朝貢使報縣之帖請益僧作留住之狀付商人孫清送林大使宅舶上官人差射手二人水手二人與州押衙共遣請粮押衙稱無土物贈州縣而不交去前件人等自陸却來十七十八日風途或𠃵或兌人論不一准十九日夜比至丑時雷鳴電耀洪雨大風不可相當艫纜悉斷舶即流出乍驚下矴便得停住舳頭神殿葢葺葺東本作指今從池本之板為大風吹落不見所在人人戰怕不能自抑廿日西風吹便擬過海排比帆布運上岸人午時風變西南計不能出泊仍不進發入夜雷雨更甚廿一日巳時西風吹解纜發行風止不扇暫停待風南風微吹不能上帆歸泊結纜舶上卜部自先久疾晚頭下舶廿二日早朝聞卜部於岸上死終日暗雨東風吹廿三日雲天微晴入夜風雨競切廿四日西風切吹雨氣未晴仍未進發晚間官人共議風色終日不變明朝便發廿五日早朝解纜風止不得進發申時新羅船一隻懸白帆從海口渡去不久之頃㢠帆入來晚際任流向乳山泊去諸人皆疑若是朝貢使從盧山來歟馳艇遣問彼新羅船遄走緣夜此艇不得消息歸來廿六日擬發風逾不順晚頭西北兩方電光耀耀雲色騷暗入夜舶忽然振漂驚恠无極戌時泊西北岸上狐鳴其聲遠響久而不息不久之會雷電鬪鳴聞之耳塞電光之耀不堪瞻視大雨似流驚怕章難章難恐辛艱舶上諸人不能出入廿七日曉霹靂降來擗却桅子艫方之面斜戾折之其所折弃厚四寸有餘闊六寸許長三丈餘自外折弃之者五片或四尋或五尺已下段段狼藉採集一處繫著於船角之上兼祭幣帛到本國之日專建神社永充祭祀云云燒龜甲占其祟偁舶上卜部諸公葬於當處神前所以得神嗔怒作此禍災如能解除便可安穩仍於桑嶋解除又於舶上祭當處神其被折之桅子或云既是折弱更造替或云作桅子之材此處卒爾難可得若更作替計今年不能過海事須結纏所被折之處早可進發云云諸人據後說便擬進發風起西北少有動舶風吹便止人心參差上下不𪾼𪾼恐睦字嵐風微扇解纜強發信風无感暫行下矴入夜嵐風微吹懸帆漸行僅嶋口風止不能發下矴繫船廿八日辰時雲霧靄暗石神振鳴舉矴歸去雨下辛苦搖櫓進入桑嶋東南少海有嶋於此泊舶卅日天晴本國曆六月一日風起西北㢠轉不定自先至今日可住此村之事報請官人不許今日又請未被允許六月一日天色微晴綠留住之事暫請遊艇不失失東本作天今從池本下船二日天晴雖无信風人人苦欲歸鄉步叮強行終日難出晚際為上帆而㢠舶忽然流去將當磯碕下矴盡力僅得平善三日西風微吹或吹或不吹上帆下帆三數度矣或帆或櫓遙指赤山去從邵村浦乘潮而行垂浦口潮橫走舶忽當磯下棹指張不能制之底有潛石相共衝當岸磯底石相合衝觸舶將破裂人各合力指棹步矴共得曳出隨流出行海中停留暮際大風洪雨雷聲電光不可視聞舶上諸人振鋒𨨞大刀等竭音呼川以遮霹靂四日早朝上帆進行暫行風止下矴繫住五日遲明懸帆進行午後到赤山西邊潮逆暫停俄爾之頃又行漸入山南雲聚忽迎來逆風急吹張帆頓變下帆之會黑鳥飛來遶舶三㢠還居嶋上眾人驚恠皆謂是神靈不交入泊㢠舶却出去山稍遠繫居海中北方有雷聲掣雲鳴來舶上官人驚怕殊甚猶疑冥神不和之相同共發願兼解除祈祠船上霹靂神又祭船上住吉大神又為本國八幡等大神及海龍王并登州諸山嶋神等各發誓願雷鳴漸止風起東西下矴繫居此舶離陸日久不能過海又不得入澳經多日夜漂蕩海裏不任搖動心力疲勞六日𠃵風切吹擬入赤山泊風合合池本作向相順仍舉沈石排比帆布風止浪猛更沈鎮石未卜進入風波參差行途不與心合艱辛之至莫過此大矣七日午時𠃵風吹舉帆進行未申之際到赤山東邊泊船𠃵風大切其赤山純是巖石高秀處即文登縣清寧鄉赤山村山裏有寺名赤山法花院本張寶高初所建也長羽長池本作張有庄田以充粥飰其庄田一年得五百石米冬夏講說冬講法花經夏講八卷金光明經長年講之南北有巖岑水通院庭從西而東流東方望海遠開南西北方連峯作壁但坤隅斜下耳當今新羅通事押衙張詠及林太使王訓等專勾當八日暮際請益法師及惟正惟曉等登寺偶謁寺家諸僧等卅有餘相看啜㭟夜宿閑房九日齋前法相請益戒明法師及從僧等相尋登來共於食堂喫齋齋後粟田錄事新羅通事道玄等同共登來亦宿一夜十日齋後粟粟下池本有田字錄事歸船上去本國七箇僧留住山寺超七日西南風大切片時无息廿二日大風暴雨通夜不止廿三日早朝巡看山寺拔樹折枝崩巖落壘石從泊舶處水手走來云舶當麤磯悉已破損艇一雙并皆破散乍聞恠无極便差專使遣泊舶處令看虛實其舶為大風吹流著麁磯柂板破却遊艇艇東本無今從池本一雙并已摧裂舶當乎乎池本作平磯三四度鴻濤如山纜矴不繫與波波各本作彼恐誤流出自西岸而到東岸風吹逾切漂搖更劇下鏘為矴矴纜纔沈迫岸繫留船上諸人心迷不喫宛似半死兩日之後歸到舊泊補綴艇廿六日分頭令取矴及覓柂料之材自去四月起首雲霧暗塞風雨不止一兩日晴還更雲塞廿七日聞張大使灾灾恐文字見下文關船二隻到日且或赤字山浦廿八日大唐天子差入新羅慰問新即位王之使青州兵馬使吳子陳崔副使王判官等卅餘人登來寺裏相看夜頭張實高遣大唐賣物使崔兵馬司來寺問慰廿九日遲明共道玄闍梨入來客房商量留住之事便向船處歸去赤山浦東南涉少海有嶋與東岸接連是吳干將作劒處時人喚為莫耶嶋但莫耶是嶋之名干將是鍛工之名七月十日十一日海裏無風波浪猛騰徹底涌沸浪聲如雷舶船漂振驚恠不少十四日辰時辭山院到泊船處在岸頭共戒明法師及粟錄事和錄事辭別往真莊村天門院相看法空闍梨此師曾至本國歸來二十年夜宿其院十五日山院喫齋便喫新粟米飯十六日早朝從山院下在路聞人噵舶船昨日發去到泊船處覓船不見暫住岸頭赤山院眾僧共來慰問俱登赤山院喫飯便見州使四人先來在院運日本國朝貢使粮七十石米着今於當村緣朝貢使已發不得領過便報縣家去院裏老少深恠被拋却慰問慇懃廿一日申時本國相公已下九隻船來泊此赤山浦即遣惟正起居相公兼諮諸判官錄事等相公差近江權博士粟田家繼及射手左近衛丈部貞名等慰問請益僧兼令問第二舶逢危害之事廿二日不發廿三日早朝山頭望見泊舶處九隻船并不見便知夜頭同發西北風吹赤山東北隔海去百許里遙見山喚為青山三峯竝連遙不炳然此乃秦始皇於海上修橋之處始皇又於此山向東見蓬萊山瀛山胡山便於此死其時麻鞋今見在矣見舊老說便得知之三僧為向天台忘歸國之意留在赤山院每問行李向南去道路絕遠聞噵向北巡禮有五臺山去此二千餘里計南遠北近又聞有天台宗和尚法號志遠文鑒座主竝天台玄素座主之弟子今在五臺山修法花三昧傳天台教迹北臺在宋谷蘭若先修法花三昧得道近代有進禪師楚州龍興寺僧也持涅槃經一千部入臺山志遠禪師邊受法花三昧入道場求普賢在院行道得見大聖如今廿年來也依新羅僧聖林林池本作琳和尚口說記之此僧入五臺及長安遊行得廿年來此山院語話之次常聞臺山聖跡甚有奇特深喜近於聖境暫休向天台之議更發入五臺之意仍改先意便擬山院過冬到春遊行巡禮臺山廿八日申時縣使竇文至等兩人將縣帖來其狀偁縣帖青寧鄉得板頭竇文至狀報日本國船上拋却人三人右撿案內得前件板頭狀報其船今月十五日發訖拋却三人見在赤山新羅寺院其報如前者依撿前件人既船上拋却即合村保板頭當日狀報何得經今十五日然始狀報又不見拋劫人姓名兼有何行李衣物并勘赤山寺院綱維知事僧等有外國人在都不申報事須帖鄉專老人勘事由限帖到當日具分折狀上如勘到一事不同及妄有拒注并追上勘責如違限勘事不子細元勘事人必重科決者開成四年七月廿四日典王佐帖主簿副尉胡君直攝令戚宣員求法僧等便作狀報留却之由其狀如左日本國僧一人從小師二人行者一人留在山院事由右僧等為求佛法涉海遠來雖到唐境未遂宿願辭鄉本意欲巡聖國尋師學法緣朝貢使早歸不能相隨歸國遂住此山院已後便擬巡禮名山訪道修行但隨身物鐵鉢一口銅鐃二具銅瓶一口文書廿餘卷遮寒衣裳等更無別物今蒙縣司勘問具事由如前牒件狀如前謹牒開成四年七月廿日日本國僧圓仁狀帖從僧惟正僧惟曉行者丁雄萬奉帖青寧鄉赤山院狀上勘日本國僧人船上不歸事由等狀右日本國僧圓仁小師惟正惟曉行者計四人口云遠聞重花興流佛教故來投學聖教擬次尋名山聖跡巡禮諸方緣時熱且在山院避熱待時凉即便行遂不早早字或得字歟縣司狀狀下一字缺恐脫者字惟悉察其僧等緣身衣鉢更無別物如通狀後不子細法清等虛妄之過謹具狀上事由如前開成四年七月日赤山院主僧法清狀八月十三日聞相公已下九隻船在青山浦更有渤海交關船同泊彼浦從彼有人來報縣家去未詳虛實所以然者九隻船從此赤山浦發後西北風連日常吹于今猶有更有何所障不發去但應是人虛傳十五日寺家設餺飩餅食等作八月十五日之節斯節諸國未有唯新羅國獨有此節老僧等語云新羅國昔與渤海相戰之時以是日得勝矣仍作節樂而喜儛永代相續不息設百種飲食歌儛管絃以晝續夜三箇日便休今此山院追慕鄉國今日作節其渤海為新羅罰纔有一千人向北逃去向後却來依舊為國今喚渤海國之者是也十六日為惟正惟曉始讀因明論疏青州都督府管內有四箇州萊州登州淄淥州淥字衍合青州為四并山東道登州四縣牟平縣文登縣蓬萊縣黃縣黃下池本有綠字非也蓬萊縣在州下今此山院是文登縣清寧鄉赤山村內清寧鄉南極望海有莫耶嶋是吳干將作劒之處當在赤山東南隔以小海從赤山北向東轉去陸路得到九月大一日己夘問錄往臺山行李州名里數過八箇州到五臺山計二千九百九十來里從赤山村到文登縣百三十里過縣到登州五百里從登州行二百廿里到萊州從萊州行五百里到青州過青州行一百八十里到淄州從淄州到齊州一百八里過齊州到鄆州三百里從鄆州行過黃河到魏府一百八十里過魏府到鎮州五百來里從鎮州入山行五日約三百里應到五臺山依新羅僧諒賢口說記之三日午時縣使一人將縣帖來其帖文如左縣帖青寧鄉先得狀在赤山寺院日本國船上拋却僧三人行者一人右撿案內得狀偁前件僧等先具事由申上訖恐後州司要有追勘狀請帖海口所由及當村板頭竝赤山寺院綱維等須常知存亡請處分者奉判准狀帖所由者依撿前件人事須帖海口所由告報及綱維等須常知存亡如已後州司追勘稱有東西不知去處追必重科決仍限帖到當日告示畜畜恐審字取狀州狀上者開成四年八月十三日典王佐帖主簿副尉胡君直攝令戚宣員司功先在青寧鄉赤山寺院日本國船上拋却僧三人行者一人右件僧等先申州申使訖恐有東西去八月十四日帖赤山寺院竝村保板頭海口所由等須知存亡尋問本鄉里正稱村正譚亶拋却帖至今都無狀報其譚亶見在伏請處分牒件狀如前謹帖開成四年九月日典王佐牒青村正狀一日員一日池本作宣日本國僧圓仁等狀上奉帖勘問拋却在赤山院日本國僧三人行者一人東西存亡事由狀右僧等為慕佛法權住山院已得已得二字恐衍穩善欲擬便出遊禮諸處緣時臨寒未有東西在此山院過冬到春巡禮名山訪尋聖跡僧等情願狀報先了今蒙帖勘東西存亡謹具事由狀上如前牒件狀如前謹牒開成四年九月三日日本國僧圓仁等帖十二日午時雲雷雹雨五更之後龍相鬪鳴雹雨交下電光紛耀數尅不息到曉便止朝出見之氷雹流積三四寸許凝積如雪老僧等云古來相傳此山多有龍宮祠部牒上都章敬寺新羅僧法清右請唯唯恐准字格所在隨緣頭陁牒得前件僧狀偁本心入道志樂頭陁但是名山歸心禮謁經行林下所在尋師學迦葉之行門進修佛理請准准各本作唯准唯屢誤乹𠃵恐衍元和元年四月十二日勑三藏僧般若力奏弟子大念等請頭陀奉依釋教准勑修行所在頭陀勿虧聖典但為持念損心近加風疾發動無恆藥餌之間要須市易將息今欲往諸山巡禮及尋醫療疾恐所在關戌城門街鋪村坊佛堂山林蘭若州縣寺舍等不練練同揀下同行由請給公驗者付庫撿得報勑內名同者謹撿格僧尼有能行頭陀者到州縣寺舍任安置將理不得所由恐動者僧法清請頭陀撿勘同同恐問字者准狀牒故牒元和二年二月日令吏潘倫牒主事趙參員外郎周仲孫日本國求法僧等牒當寺僧圓仁從僧惟正惟曉行者丁雄萬請寺帖報州縣給與隨緣頭陀公驗牒僧等本意欽慕釋教遠投仁境歸心聖跡志樂巡禮見說臺山等諸處法教之根原大聖之化處西天高僧踰險尋訪漢地名德在茲得道矣僧等之仰彼芳猷偶屬良緣幸到聖國今欲往赴諸處以遂舊情恐在道路不練練揀同行由傳聞般若三藏為頭陁僧奏請公驗准勑修行起昔續今也