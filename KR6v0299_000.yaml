  text: 承和五年六月十三日午時第一第四兩舶諸使駕舶緣無順風停宿三箇日十七日夜半得嵐風上帆搖艫行巳時到志賀嶋東海為无信風五箇日停宿矣廿二日卯時得艮風進發更不覓澳投夜暗行廿三日巳時到有救嶋東北風吹征留執別比至酉時上帆渡海東北風吹入夜暗行兩舶火信相通廿四日望見第四舶在前去與第一舶相去卅里許遙西方去大使藤原常嗣始畫觀音菩薩請益留學法師等相共讀經誓祈亥時火信相通其貌如星至曉不見雖有艮巽風變而無漂遷之驚大竹蘆根烏賊貝等隨瀾而流下鈎取看或生或枯海色淺綠人咸謂近陸地矣申時大魚隨船遊行廿七日平鐵為波所衝悉脫落疲疲下恐脫烏若鷺字信宿不去或時西飛二三又更還居如斯數度海色白綠竟夜令人登桅子見山嶋稱不見廿八日早朝鷺鳥指西北雙飛風猶不變側帆指坤巳時至白水其色如黃泥人眾咸云若是揚州大江流水令人登桅子見申云從戊亥會直流南方其寬廿餘里望見前路水還淺綠暫行不久終如所申大使深恠海色還為淺綠新羅譯語金正南申云聞導導下文皆作導池本作道揚州掘港難過今既踰白水疑踰掘港歟未時海水亦白人咸驚恠令人上桅桅下池本有子字東本有令字見陸嶋猶稱不見風吹不變海淺波高衝鳴如雷以繩結鐵沈之僅至五丈經少時下䥫試海淺深唯五尋使等懼或云將下石停明日方征或云須半下帆馳艇知前途淺深方漸進行停留之說事似不當論定之際尅逮酉戌爰東風切扇濤波高猛船舶卒然趍昇海渚乍驚落帆柂柂池本作桅下同角摧折兩度東西之波互衝傾舶柂葉著海底舶艫將破仍截桅弃柂舶即隨濤漂蕩東波來船西傾西波來東側洗流船上不可勝計船上一眾憑歸佛神莫不誓祈人人失謀使頭以下至于水手裸身緊逼褌船將中絕遷走艫舳各覓全處結構之會為瀾衝咸皆差脫左右欄端結繩把牽競求活途淦水汎滿船即沈居沙土官私雜物隨淦浮沈廿九日曉潮涸淦亦隨竭令人見底底悉破裂沙埋槈𪲘槈𪲘如指船底之結搆振時誤作槈或桭袱歟𪲘池本作拽眾人設謀今舶已裂若再逢潮生恐增摧散歟仍倒桅子截落左右艫棚於舶四方建棹結纜槈𪲘𪲘池本作栧亥時望見西方遙有火光人人對之莫不忻悅通夜瞻望山嶋不見唯看火光七月二日早朝潮生追去數百町許西方見嶋其貌如兩舶雙居須臾進去即知陸地流行未幾遇兩潮洄洑橫流五十餘町舶沈居泥不前不却爰潮水強遄掘決舶邊之淤泥泥即逆沸舶卒傾覆殆將埋沈人人驚怕競依舶側各各帶褌處處結繩繫居待死不久之頃舶復左覆人隨右遷隨覆遷處稍逮數度又舶底第二布材折離流去人人銷神泣淚發願當戌亥隅遙見物隨濤浮流人人咸曰若是迎舶歟疑論之間逆風迎來終知是船也見小倉船一艘乘人先日所遣射手壬生開山大唐人六人趍至舶前爭錄事以下先問大使所着之處答云未知所着之處乍聞驚悲涕淚難耐即就其船遷國信物錄事一人知乘船事二人學問僧圓載等已下廿七人同遷乘之指陸發去午時到江口未時到揚州海陵縣白潮鎮桑田鄉東梁豐村日本國承和五年七月二日即大唐開成三年七月二日雖年號殊而月日共同留學僧等到守捉軍中季賓宅停宿聞大使以六月廿九日未時離船以後漂流之間風強濤猛怕船將沈捨矴擲物口稱觀音妙見意求活路猛風時止子時流着大江口南蘆原之邊七月一日曉潮落不得進行令人登桅頭看山閭南方遙有三山未識其名鄉里幽遠無人告談若待潮生恐時久日晚不能拯濟船上之仍以繩繫船曳東本作洩今依池本改之下傚之出海邊人數甚少不得搖動判官以下取纜引之未時泛艇從從東本作徒海邊行漸覓江口終到大江口逆潮遄流不可進行其江稍淺下水手等曳船而行覓人難得儻逢賣蘆人即問國鄉答云此是大唐揚州海陵縣淮南鎮大江口即召其商人兩人上船向淮南鎮從水路而到半途彼兩人未知鎮家更指江口却歸日晚於江口宿二日晚彼二人歸去近側有鹽官即差判官長岑宿禰高名准錄事高丘宿禰百興令向鎮家兼送文條條恐牒字即鹽官判官元行存乘小船來慰問使等筆上上池本作言國風大使贈土物亦更向淮南鎮去從江口北行十五里許既到鎮家到鎮家東本誤作倒鎮孚鎮軍等申云更可還向於掘港𨓍即將鎮軍兩人歸于江口垂到江口判官元行存在水路邊申云今日已晚夜頭停宿隨言留居勞問殊深兼加引前之人三日丑時潮生知路之船引前而赴掘港𨓍巳時到白湖湖上文及下文作潮口逆流極遄大唐人三人并本國水手等曳船截流到岸結纜暫待潮生於此聞第四舶漂着北海午時僅到海陵縣白潮鎮管內守捉軍中村爰先於海中相別錄事山代氏益等卅餘人迎出再得相見悲悅竝集流淚申情爰一眾俱居此間雇小船等運國信物并洗曝濕損官私之物雖經數日未有州縣慰勞人人各覓便宿辛苦不少請益法師與留學僧一處停宿從東梁豐村去十八里有延海村村裏有寺名國清寺大使等為憇漂勞於此宿住九日巳時海陵鎮大使劉勉來慰問使等贈酒餅兼設音聲相從官健親事親恐儭字儭事司儭施之事者八人其劉勉著紫朝服當村押官亦同著紫衣巡撿事畢却歸縣家十二日從東梁豐村取水路運隨身物置寺裏畢同日午時為催迎船差通事大宅年雄射手大宅宮繼等從水路令向縣家申時雷鳴留學僧等住東東下脫梁字豐村未到此間十三日大熱未時雷鳴自初漂着以來蚊蝄甚多其大如蠅入夜惱人辛苦無極申時留學僧來同居寺裏患赤痢十四日辰時為縣州縣州池本作州縣迎船不來大使一人判官二人錄事一人知乘船事一人史生一人射手水手等惣卅人從水路向縣家去登時開元寺僧元昱來筆言通情頗識文章問知國風兼贈土物彼僧贈桃菓等近寺邊有其院暫話即歸去暮際雷鳴洪雨驚悶尤甚十七日午時射手大宅宮繼與押官等十餘人從如皐鎮家將卅餘草船來即聞大使昨日到鎮家申時春知乘山錄事等與射手從東梁豐村來宿住寺裏十八日早朝公私財物運舫船巳時錄事以下水手已上從水路向州去水牛二頭以繫冊餘舫或編三艘為一船或編二隻為一船以纜續之前後之程難聞相喚甚征稍疾掘溝寬二丈餘直流無曲此即隋煬帝所掘矣雨下辛苦流行卅餘里申時到郭補村停宿入夜多蚊痛如針刺極以艱辛通夜打皷其國之風有防援人為護官官東本作宮物至夜打皷十九日寅時水牛前牽進發暗雲無雨卯時聽鷄聲始有吳竹林及生粟小角豆等巳時大使牒到來來案牒狀偁其漂損舶隨便撿挍於所由守捉司其守舶水手等依數令上向不得釋留者登時差准船師矢侯糸丸等還遺泊舶之處午時到臨河倉鋪竟夜進行廿日卯畢到赤岸村問土人答云從此間行百廿里里東本無有如皐鎮暫行有堰堰東本作塥掘開堅堰堰東本作堛發去進堰有如皐院專知官未詳所由船行太遲仍停水牛更編三船以為一番每番分水手七人令曳舫而去暫行人疲更亦長續繫牛曳去左右失謀疲上益疲多人難曳繫牛疾征爰人皆云一牛之力即當百人矣比至午時水路北岸楊柳相連未時到如皐㭟即茶字池本作巷店暫停掘溝北岸店家相連射手丈部貞名等從大使所來云從此行半里西頭有鎮家大使判官等居此未向縣家大使判官等聞賷信物來為更向州令裝束船舫又云今日州使來始充生料從先導導東本傍注有噵字新羅國使而與本國一處而今年朝貢使稱新羅國使而相勞疎略今大使等先來鎮家既定本國與新羅異隔遠邈即縣州承知承知池本作知承言上既畢乍聞忻然頗慰疲情申時鎮大使劉勉駕馬來泊舫之處馬子從者七八人許撿挍事訖即去錄事等下舫參詣大使所日晚不行於此停宿廿一日卯時大使以下共發去水路左右富貴家相連專無阻隟暫行未幾人家漸疎先是鎮家回國矣大使相送三四里許歸向本鎮從鎮家向縣二百廿里巳時放却水牛各分一船指棹進行絕無人家申終到延海鄉延海村停宿蚊蝄甚多辛苦罔極半夜發行鹽官船積鹽或三四船或四五船雙結續編不絕數十里相隨而而池本無行乍見難記甚為大奇廿二日平明諸船繫水牛牽去白鵝白鴨往往多有人宅相連巳時已後或行三十里方三四家有無不定入夜暗行子時到村未知其名諸船於此宿住廿三日卯時發行土人申云從此間去縣二十里暫行不久水路之側有人養水鳥追集一處不令外散一處所養數二千有餘如斯之類江曲有之矣竹林無處不有竹長四丈許為上指北流行自初乘船日多指西行時時或北或艮或西北辰時前途見塔即問土人答云此是西池寺其塔是土塔有九級七所官寺中是其一也進行不久到海陵縣東頭縣裏官人長官一人判官一人兵馬使等惣有七人未詳其色暫行到縣南江縣令等迎來西池寺南江橋前大使判官錄事等下船就陸到寺裏宿住縣司等奉錢唐代有奉錢之俗但請益留學僧猶在船上縣中人悉集競見留學僧肚裏不好廿四日辰時西池寺講起信論座主謙并先後三綱等進來船上慰問遠來兩僧筆書通情彼僧等暫住歸去比至巳時大使以下出寺駕船同共發去縣裏官人等以无慰懃差軍中等令相送申時到宜陵館此是侍供往還官客之人處依准判官藤原貞敏卒爾下痢諸船於此館前停宿兩僧下船看問病者登時歸船聞第四舶判官不忍湯水下船居白水郎宅未舉國信物舶悉破裂但公私之物無異損依无迎船不得運上廿五日寅時發去人人患痢行船不一准先行之船留為後番後行之人進在前路自海陵縣去宜陵館五十里餘餘東本作舒去州六十五里巳時到仙宮觀直行不休未時到禪智橋東側停留橋北頭有禪智寺延曆年中副使忌日之事於此寺修自橋西行三里有揚州府大使為通國政差押官等遣府遲來申時發去江中充滿大舫船積蘆船小船等不可勝計申畢行東郭水門酉時到城北江停留大使等登陸宿住未逢府司請益留學僧等未離船上入夜雨下辛苦尤劇廿六日晡時下船宿住於江南官店兩兩東本作尚恐非僧各居別房廿八日齋後雇少船向靈居寺半途有障不入寺裏還到官店不久之頃開元寺僧全操等九箇僧來慰問旅弊卅日開元寺僧貞順慰問筆書問知府寺名并法師名兼贈土物八月一日早朝大使到州衙見揚府都督李相公事畢歸來齋後請益留學兩僧出牒於使衙請向台州國清寺兼請被給水手丁勝小麻呂仕充求法馳仕暮際依大使宣為果海中誓願事向開元寺看看池本作着定閑院三綱老僧卅有餘共來慰問巡禮畢歸店館三日請令請益僧等向台州之狀使牒達揚府了為畫造妙見菩薩四王像令畫師向寺裏而有所由制不許外國人濫入寺家三綱等不令畫造件像仍使牒達相公未有報牒四日早朝有報牒大使贈土物於李相公彼相公不受還却之又始今日充生料每物不備齋後從揚府將覆問書來彼狀偁還學僧圓仁沙彌惟正惟曉水手丁雄滿丁勝小麻呂改名後再隨圓珍入唐即譯語人丁滿是也右請往台州國清寺尋師便住台州為復從台州却來赴上都去留學僧圓載沙彌仁好伴始滿右請往台州國清寺尋師便住台州為復從台州却來赴上都去者即答書云還學僧圓仁右請往台州國清寺尋師決疑若彼州無師更赴上都兼經過諸州留學問僧圓載右請往台州國清寺隨師學問若彼州全無人法或上都覓法經過諸州訪覓者又得使宣偁畫像之事為卜筮筮東本作莖池本作莁恐俱誤有忌停止既了須明年將發歸時奉畫供養者仍以戌時到開元寺大門誓禱其由七日馳書信諮開元寺三綱兼贈土物附還信送報禮書書東本作唐今從池本八日聞第四舶猶在泥上未到泊處國信物未運上其舶廣棚離脫淦水殆滿隨潮生潮落舶裏涸沈不足為渡海之器求法僧等未登陸地頭判官登陸居白水郎舍船中人五人身腫死大唐迎船十隻許來一日一度運國信物至波如高山風吹不能運遷辛苦尤甚聞噵昨日揚州帖可行迎舶之狀令發赴既了未詳子細九日巳時節度使李相公牒於開元寺許令畫造佛像未時勾當日本國使王友王友東本作主支或作王支或作王友今從下文及池本真來官店慰問僧等兼早令向台州之狀相談歸却請益法師便贈土物於使登時商人王客來筆書問國清寺消息頗開鬱抱亦與刀子等十日辰時請益留學兩僧隨身物等斤量之數定錄達使衙了即聞第二舶著𣴴州第二舶新羅譯語朴正長書送金正南房午時王大使來噵相公奏上既了須待勅來可發赴台州去大使更留學僧暫住揚府請益僧不待勅符且令向台州之狀牒送相公二三日後相公報牒偁不許且發待報符可定進止其間令僧住寺裏者船師佐伯金成患痢經數日十六日辰時兩僧與無常呪願但命未絕暮際勾當日本國使王友真共相公使使下池本有一字人到官店勘錄金成隨身物十七日申時聞第四舶判官到如皐鎮公私雜物亦悉運到鎮家今編小舶擬向揚府入夜比及丑時病者金成死亡十八日早朝押官等來撿挍此事據本國使判金成隨身物依數令受傔從井俅替未時押官等勾當買棺葬去廿一日撿挍舶之使准船師楊隻糸麿等趍來即聞水手長佐伯全繼在掘港鎮死去廿二日王大使將相公牒來案其狀偁兩僧及從等令住開元寺者廿三日晚頭開元寺牒將來送勾當王大使廿四日辰時第四舶判官已下乘小船來船數惣計卅艘已下齋後差使遣寺令撿挍客房未時兩僧并傔人等出官店詣開元寺既到寺裏從東塔北越二壁於第三廊中間房住登時三綱并寺和上及監僧等赴集上座僧志強寺主令徵都師修達監寺方起庫司令端慰問隨身物同運寺裏廿五日早朝有綱維請仍到寺庫喫粥比至午時三論留學常晈晈同曉下文作曉師來慰談寺家設供相共齋常晈師巡看歸館差惟正遣問諮真言請益付廻報慰兼第四舶船頭判官及吉備掾讚岐掾等便垂諮問即第四舶為高波所漂更登高瀨難可浮廻水手等乘小船往舶上未達中途潮波逆曳不至舶上不知所向但射手一人入潮溺流有白水郎拯之廿六日李相公隨軍游擊將軍沈弁來諮問兼語相公諱四字府吉甫云四字也翁諱云父諱吉甫宰相李德裕父吉甫府云二字難解暮際沈弁差使贈來蜜一埦請益法師為供寺僧喚寺庫司僧令端問寺僧數都有一百僧即沙金小二兩充設供䉼留學僧亦出二兩惣計小四兩以送寺衙綱維監寺僧等共集一處秤定大一兩二分半登時得寺家報偁須具金數更報官取處分可設空飯者沙金小四兩右求法僧等得免萬里再見生日蹔住寺裏結泉樹因謹獻件沙金以替香積供伏願加辨作作池本作供之勞用充寺裏眾僧空飯但期在明日矣八月廿六日本國天台法花宗還學傳燈法師留學傳燈滿位僧廿九日供寺裏僧百種惣集以為周足僧數百餘當寺僧常簡奉綱維請而作齋文其書在別卅日長安千福寺僧行端來筆言述慰兼問得長安都唐消息九月一日無異事從開元寺西涉河有無量義寺有老僧名文襲春秋七十新作維摩經記五卷今現在堂裏講其疏記多用肇生融天台等義比寺諸僧來集聽之聽眾都有卅八人共敬重彼文襲和尚二日監寺僧方起等於庫頭設空飯九日相公為大國使設大餞大使不出但判官已下盡赴集矣十一日聞副使小野篁不來留住本國但判官藤原豐竝為船頭來十三日聞相公奏狀之報符來於揚府未得子細齋後監軍院要籍薰廿一郎來語州裏多少揚州節度使領七七池本作六非也今脫舒州州揚州楚州盧州壽州徐州即滁州和州也揚州有七七池本作六非也今脫江都縣縣江陽縣天長縣六合縣高郵縣海陵縣揚子縣也今此開元寺江陽縣管內也揚府南北十一里東西七里周卅里從開元寺正北有揚府從揚州北行三千里有長安都從揚府南行一千四百五十里有台州或云三千來里人里語不定今此揚州淮南道台州江南西道也揚府裏僧尼寺卌九門州內有二萬軍惣管七七池本作六非也見上文州都有十二萬軍唐國有十道淮南道一十四州唐書作十二關內道廿四州唐書作廿七山南道卅一州唐書作卅三隴右道十九州劒南道四十二州唐書作廿八惣計三百十一州揚州去京二千五百里台州去京四千一百里台州是嶺南道十六日長判官云得相公牒偁請益法師可向台州之狀大使入京奏聞得報符時即許請益僧等發赴台州者未得牒案十九日惠照寺唐礿礿或初歟法師來相見諮談當寺僧等云是法花座主講慈恩疏廿日寫得相公牒狀偁日本國朝貢使數內僧圓仁等七人請往台州國清寺尋師右奉詔朝貢使來入京僧等發赴台州未入可允許須待本國表章到令發赴者委曲在牒文廿一日塔寺老僧宿神玩和尚來相看慰問廿三日揚府大節騎馬軍二百來步軍六百來惣計騎步合千人事當本國五月五日射的之節廿八日大使君贈昆布十把海松一裹廿九日大使君贈砂金大十兩以充求法䉼相公為入京使於水舘設餞又蒙大使宣偁請益法師早向台州之狀得相公牒偁大使入京之後聞奏得勅牒後方令向台州者仍更添己緘書送相公先了昨日得相公報偁此事別奏上前了許明後日令得報帖若蒙勅詔早令發赴者聞噵今天子為有人計計東本作許今從池本殺皇太子其事之由皇太子擬殺父王作天子仍父王殺己子云云十月三日晚頭請益留學兩僧往平橋舘為大使判官等入京作別相諮長判官云得兩僧情願之狀將到京都聞奏早令得符者四日齋後兩僧各別紙造情願狀贈判官所其狀如別入京官人大使一人長岑判官高名菅原判官善主高岳錄事百興大神錄事宗雄大宅通事年雄別請基基恐益字生伴須賀雄真言請益圓行等并雜職已下卅五人官船五艘又長判官寄付延曆年中入唐副使位記并祭文及綿十屯得判官狀偁延曆年中入唐副使石川朝臣道益明州身已亡今有勅敘四品位付此使送贈賜彼隴前須便問台州路次若到明州境即讀祭文以火燒捨位記之文者三論留學常晈晈同嶢下文作曉猶住廣陵館不得入京五日卯終大使等乘船發赴京都終日通夜雨下六日始寒七日有薄冰九日始令作惟晈晈上文及下文作曉同字等三衣五條絹二丈八尺五寸七條絹四丈七尺五寸大衣絹四丈廿五條惣計十一丈六尺縫手功作大衣廿五條用一貫錢作七條四百文作五條三百文惣計一貫七百文令開元寺僧貞順勾當此事十三日午時請益傔從惟晈留學傔從仁好同時剃髮十四日砂金大二兩於市頭令交易市頭秤定一大兩七錢七錢准當大二分半價九貫四百文更買白絹二疋價二貫令作七條五條二袈裟亦令僧貞順勾當此事齋後禪門宗僧等十三人來相看長安千福寺天台宗惠雲禪門宗學人僧弘鑒法端誓實行全常密法寂法真惠深全古從實仲詮曇幽筆書云竝閑閑無繫雲遊山水從此五峯下游楚泗今到此郡殊喜頂禮大奇大奇歡之甚也今欲往天台告辭便別珍重珍重爰筆書報云日本僧等昔有大因今遇和尚等定知必遊法性寂空大幸大幸若有到天台必將相見珍重珍重十九日為令惟正惟晈受戒牒報判官錄事大唐大和二年以來為諸州多有密與受戒下符諸州不許百姓剃髮為僧唯有五臺山戒壇一處洛陽終山瑠璃壇一處自此二外皆悉禁斷因茲請報所由取處分也廿二日早朝見彗星長一尋許在東南隅雲蔽不多見寺主僧令徵談云此星是劒光也先日昨日今夜三箇夜現矣比日有相公恠每日令七箇僧七日之之下恐脫間字轉念涅槃般若諸寺亦然又去年三月亦有此星極明長大天子驚恠不居殿上別在卑座衣著細布長齋放赦計今年合然乍聞忖之在本國之日所見與寺主語符合矣廿三日沈弁來云彗星出即國家大衰及兵亂東𣴴主主池本作至鯤鯨二魚死占為大恠血流成津此兵革眾起征天下不揚州合上都前元和九年三月廿三日夜彗星出東方到其十月應宰相反王相公已上計𭣦宰相及大官都廿人亂𭣦計萬人已上僧等雖事未定為後記之入夜至曉出房見此彗星在東南隅其尾指西光極分明遠而望之光長計合有十丈已上諸人僉云此是兵劒之光耳廿四日雇人令作惟正等坐具兩箇當寺僧貞順亦勾當此事坐具一條料絁二丈一尺表八尺四寸裏八尺四寸緣䉼四尺二寸兩箇坐具之䉼都計四丈二尺作手功作一箇用二百五十文惣計五百文卅日齋前零霰十一月二日買維摩關中疏四卷價四百五十文有勑斷銅不許天下賣買說六年一度例而有之恐天下百姓一向作銅器無銅鑄錢所以禁斷矣十一月七日開元寺僧貞順私以破釜賣與商人現有十斤其商人得䥫出去於寺門裏逢巡撿人被勘捉歸來巡撿五人來云近者相公斷䥫不令賣買何輒賣與貞順答云未知有斷賣與即勾當并貞順具狀請處分官中免却自知揚州管內不許賣買䥫矣齋後相公衙前之虞候三人持持恐特字來相見筆言通情相公始自月三日於當寺瑞像閣上刻造三尺白檀釋迦佛像其瑞像飛閣者於隋煬帝代栴檀釋迦像四軀從西天飛來閣上仍煬帝自書瑞像飛閣四字以懸樓前八日齋前相公入寺裏來禮佛之後於堂前砌上喚請益留學兩僧相見問安隱隱穩相通否前後左右相隨步軍計二百來虞候之人卌有餘門頭騎馬軍八十疋計竝皆著紫衣更有相隨文官等惣著水色各騎馬忽不得記相公看僧事畢即於寺裏蹲踞大椅上被擔而去又惣持捨百斛米充寺修理䉼十六日作啟謝相公到寺慰問兼贈少物水精念珠兩串銀裝刀子六柄班筆廿管螺子三口別作贈狀相同入啟函裏便付相公隨軍沈弁大夫交去十七日巳時沈弁歸來陳相公傳語以謝得啟又唯留取大螺子不截尻一口而截尻小螺子二口及餘餘池木作念珠刀筆付使退還更差虞候人贈來白絹二疋白綾三疋即作謝付㢠使奉送又大唐國今帝諱帛即云名先祖諱純淳詔誦括譽豫預隆基恆湛淵虎戒世民音同者盡諱今帝文宗諱昂今誤作帛註即字恐卭誤避昂字為卭憲宗純避之為淳順宗誦為詔誦詔今誤倒置德宗适為括括上今脫适字代宗豫預豫共避之為譽亦誤倒置玄宗隆基穆宗恆敬宗湛高祖淵太宗世民虎戒未考此國諱諸字於諸書狀中惣不著也是西明寺僧宗叡法師之所示也十八日相公入來寺裏禮閣上瑞像及撿挍新作之像少時隨軍大夫沈弁走來云相公屈和尚乍聞共使往登閣上相公及監軍并州郎中郎官判官等皆椅子上喫茶見僧等來皆起立作手立禮唱且坐即俱坐椅子啜茶相公一人隨來郎中以下判官以上惣八人相公著紫郎中及郎官三人著緋判官四人著綠𧘶枚恐衫字虞候及步騎軍并丈人等與前不異相公對僧等近坐問那國有寒否留學僧答云夏熱冬寒相公噵共此間一般相公問云有僧寺否答云多有又問有多少寺答三千七百來寺又問有尼寺否答云多有又問有道士否答云无道士相公又問那國京城方圓多少里數答云東西十五里南北十五里又問有坐夏否答有相公今度時有語話慰懃問申情既畢相揖下閣更到觀音院撿挍修法之事十九日為充廿四日天台大師忌日設齋以絹四疋綾三疋送於寺家留學僧絹二疋請益僧綾三疋絹二疋具狀送寺家畢具在別紙賣買得六貫餘錢廿四日堂頭設齋眾僧六十有餘幻羣法師作齋難久食儀式也也東本削之眾僧共入堂裏次第列坐有人行水施主僧等於堂前立眾僧之中有一僧打槌更有一僧作梵梵頌云云何於此經究竟到彼岸願佛開微密廣為眾生說音韻絕妙作梵之間有人分經梵音之後眾共念經各二枚許即打槌轉經畢次有一僧唱敬禮常住三寶眾僧皆下床而立即先梵音師作梵如來色無盡等一行文也作梵之間綱維令請益僧等入裏行香盡眾僧數矣行香儀式與本國一般其作齋晉人之法師矣矣恐先字眾起立到佛左邊向南而立行香畢先歎佛與本國呪願初歎佛之文不殊矣歎佛之後即披檀越先請設齋狀次讀齋歎之文讀齋文了唱念釋迦牟尼佛大眾同音稱佛名畢次即唱禮與本國噵為天龍八部諸善神王等頌一般乍立唱禮俱登床坐也讀齋文僧并監寺綱維及施主僧等十餘人出食堂至庫頭齋自外僧沙彌咸食堂齋亦於庫頭別為南岳天台等和尚備儲供養眾僧齋時有庫司僧二人弁備諸事唐國之風每設齋時飯食之外別留䉼錢當齋將竟隨錢多少僧僧恐依誤眾僧數等分與僧但贈作齋文人別增錢數若於眾僧各與卅文作齋文者與四百文竝呼噵儭錢計與本國噵布施一般齋後同於一處嗽口歸房凡寺恆例若有施主擬明朝煑粥供僧時節節字或衍即暮時交人巡報明朝有粥若有人設齋時晚際不告但當日早朝交人巡告堂頭有飯若有人到寺請轉經時亦令人噵上堂念經其揚府中有卌餘寺若此寺設齋時屈彼寺僧次來令得齋儭如斯輪轉隨有齋事編錄寺名次第屈餘寺僧次是乃定寺次第取其僧次一寺既爾餘寺亦然互取寺次互取僧次隨齋饒乏屈僧不定一寺一日設齋計合有堂堂恐當字寺僧次比寺僧次又有化俗法師與本國噵飛教化師同也說世間無常苦空之理化導男弟子女弟子呼噵化俗法師也講經論律記疏等名為座主和尚大德若衲衣收心呼為禪師亦為道者持律偏多名律大德講為律座主餘亦准爾也自去十月來霖雨數度相公帖七箇寺各令七僧念經乞晴七日為期及竟天晴唐國之風乞晴即閇路北頭乞雨即閇路南頭相傳云乞晴閇北頭者閇陰則陽通宜天晴也也池本無乞雨閇南頭者閇陽則陰通宜零雨也廿六日夜人咸不睡與本國正月庚申之夜同也廿七日冬至之節道俗各致禮賀住住池本作在俗者拜官賀冬至節見相公即噵運推移日南長至伏惟相公尊體萬福貴賤官品并百姓皆相見拜賀出家者相見拜賀口敘冬至之辭互相禮拜俗人入寺亦有是禮眾僧對外國僧即噵今日冬至節和尚萬福傳燈不絕早歸本國長為國師云云各相禮拜畢便噵嚴寒或僧來云冬至和尚萬福學光三學早歸本鄉常為國師云云有多種語此節惣竝與本國正月一日之節同也俗家寺家各儲希饍百味惣集隨前人所樂皆有賀節之辭道俗同以三日為期賀冬至節此寺家亦設三日供有種惣集廿八日零雪廿九日天晴揚州有卌餘寺就中過海來鑒真和上本住龍興寺影像現在法進僧都本住白塔臣善者在此白塔寺撰文選矣惠雲法師亦是白塔寺僧也每州有開元寺龍興寺只是揚州龍興寺耳申時長安講百論和尚可思來相見又第一舶判官藤原朝臣貞敏從先臥病辛苦殊發心擬畫作妙見菩薩四天王像仍以此日令大使傔人粟田家繼到此寺定畫佛處卅日早朝於迦毘羅神堂裏始畫妙見菩薩四天王像十二月二日本國留後官為令惟正等受戒更帖相公雖先帖送所由而勾勾下東本有等字恐衍當王友真路間失却仍今更帖送其狀如別五日圖畫事畢八日國忌之日從捨五十貫錢於此開元寺設齋供五百僧早朝寺眾僧集此當寺列坐東北西廂裏辰時相公及將軍入寺來從大門相公將軍雙立徐入來步陣兵前後左右咸衛州府諸司皆隨其後至講堂前塼砌下相公將軍東西別去相公東東東本無行下有人字恐衍行入東幕裏將軍西行入西幕下俄頃改鞋澡手出來殿前有二砌橋相公就東橋登將軍就西橋登曲各東西來會於堂中門就座禮佛畢即當於堂東西兩門各有數十僧列立各擎作蓮花并碧幡有一僧打磬唱一切恭敬敬禮常住三寶畢即相公將軍起立取香器州官皆隨後取香盞分配東西各行相公東向去持花幡僧等引前同聲作梵如來妙色身等二行頌也始一老宿隨軍亦隨衛在廊檐下去盡僧行香畢還從其途指堂廻來作梵不息將軍向西行香亦與東儀式同一時來會本處此頃東西梵音交響絕妙其唱禮一師不動獨立行打磬梵休即亦云敬禮常住三寶相公將軍共座本座擎行香時受香之香爐雙坐有一老宿圓乘和上讀呪願畢唱禮師唱為天龍八部等頌語旨在嚴皇靈每一行尾云敬禮常住三寶相公諸司共立禮佛三四遍唱了即各隨意相公等引軍至堂後大殿裏喫飯五百眾僧於廊下喫飯隨寺大小屈僧多少大寺卅中寺廿五小寺二十皆各座一處長列差每寺之勾當各令弁供處處勾當各自供養其設齋不遂一處一時施飯一時喫了即起散去各起起恐赴誤起赴屢誤本寺於是日相公出錢差勾當於兩寺令涌湯浴諸寺眾僧三日為期九日本國判官藤原朝臣貞敏於開元寺設齋出五貫六百錢作食供養新畫阿彌陀佛妙見菩薩四天王像并六十餘眾僧亦以斯日令寫龍興寺法花院壁南岳天台兩大師像十八日未時新羅譯語金正南為定諸使歸國之船向楚州發去申時勾當王友真來云大使尋以今月三日到京都了近日相隨大使入京勾當書帖奉達州衙又沙彌等受戒之事相公不許比年有勅亦亦東本削之不令受戒非勅許未可允許云云廿日買新曆夜頭下雪廿一日雪止天陰廿三日天晴第一舶匠運射手等五十餘人來寺齋兼令念經齋後無量義寺僧道悟來相見自噵解真言更有栖靈靈恐霞字寺文琛法師傳聞得真言法近者聞噵三論留學僧常曉住彼寺於琛法師房受真言法擬畫兩部曼荼羅廿九日暮際道俗共燒紙錢俗家後夜燒竹與爆聲噵萬歲街店之內百種飯食異常彌滿日本國此夜宅庭屋裏門前到處盡點燈也大唐不爾但點常燈不似本國也寺家後夜打鐘眾僧參集食堂禮佛禮佛之時眾皆下床地上敷座具禮佛了還上床座時有庫司典座僧在於眾前讀申歲內種種種種東本作種用途帳令眾聞知未及曉明燈前喫粥飯食了便散其房遲明各出自房觀禮眾僧相共禮謁寺家設供三日便休開成四年己未當本國承和六年己未正月一日甲寅是年日也官俗三日休暇當寺有三日齋早朝相公入寺禮佛即歸去三日始畫南岳天台兩大師像兩鋪各三副昔梁代有韓幹是人當梁朝為畫手之第一若畫禽獸像及乎著其眼則能飛走尋南岳大師顏影寫著於揚州龍興寺勅安置法花道場瑠璃殿南廊壁上乃令大使傔從粟田家繼寫取無一虧謬遂於開元寺令其家繼圖絹上容貌衣服之體也一依韓幹之樣又彼院同廊壁上畫寫誦法花經將數致異感和尚等影數及廿來不能具寫瑠璃殿東有普賢廻風之堂堂東本作雲今從池本昔有火起盡燒彼寺燒至法花院有誦經師靈祐於此普賢堂內誦法花經忽然大風起自院裏吹却其火不燒彼堂時人因號普賢廻風之堂又於東塔院安置鑒真和尚素影閣題云過海和尚素影更中門內東端建過海和尚碑銘其碑序記鑒真和上為佛法渡海之事偁和尚過海遇惡風初到虵海長數丈餘行一日即盡次至黑海海色如墨等者又聞勅符到州其符狀偁准朝貢使奏為日本國使帖於楚州雇船便以三月令渡海者未詳其旨六日相公隨軍沈弁來云相公傳語從今月初五日為國并得得池本作捨錢修開元寺栴檀瑞像閣寄孝感寺令講經募緣請本國和尚特到聽講兼催本國諸官等結緣捨錢者七日沈弁來傳相公語言州府諸官擬以明日會集孝感寺將屈本國和尚相來者者恐聽字誤講者兼有講經法師璠募緣文案彼狀偁修瑞像閣講金剛經所乞錢五十貫狀遇相公賜招募同緣同因寄孝感寺講經候緣者其狀如別沈弁申云相公施一千貫此講以二月為期每日進赴聽法人多數計以一萬貫得修此閣彼期彼期或波斯歟國出千貫錢婆婆上或脫占字占婆林邑也見唐書環王國下國人捨二百貫今國眾計少人數仍募五十貫者轉催感少八日新羅人王請來相看是本國弘仁十年流著出州國之唐人張覺濟等同船之人也問漂流之由申云為交易諸物離此過海忽遇惡風南流三月流著出州國其張覺濟兄弟二人臨將發時同共逃留出州從北出州就北海而發得好風十五箇日流著長門國頗解本國語出州之州恐羽字日本紀略弘仁十一年四月戊戌唐人李少貞等二十人漂著出羽國是或同時漂流客也九日圖寫南岳天台影畢十四日立春市人作鸎賣之人買翫之十五日夜東西街中人宅燃燈與本國年盡晦夜不殊矣寺裏燃燈供養佛兼奠祭師影俗人亦爾當寺佛殿前建燈樓砌下庭中及行廊側皆燃油其燈盞數不遑計知街裏男女不憚深夜入寺看事供燈之前隨分捨錢巡看已訖更到餘寺看禮捨錢諸寺堂裏并諸院皆競燃燈有來赴者必捨錢去无量義寺設匙燈竹燈匙燈竹燈池本作匙竹之燈計此千燈其匙竹之燈樹構作之貌如塔也結絡之樣極是精妙其高七八尺許并從此夜至十七日夜三夜為期十七日沈弁來助憂遲發便問殊蒙相公牒得往台州否沈弁書答云弁諮問相公前後三四度諮說本國和尚往台州擬一文牒不審得否相公所說揚州文牒出到浙西道及浙東道不得一事須得聞奏勑下即得餘不得又相公所管八州以相公牒便得往還其潤州台州別有相公各有管領彼此守職不相交恐恐東本作怒今從池本若非勑詔无以順行矣齋後當寺堂前敷張珍奇安置冊二賢聖素影異種珍綵不可記得賢聖容貌或閉目觀念或仰面遠視或向傍似有語話或伏面瞻地卌二像皆有卌二種容貌宴坐之別或結跏趺坐或半跏坐坐法不同卌二賢聖外別置普賢文殊像并共命鳥伽陵頻伽鳥像暮際點燈供養諸聖影入夜唱禮禮佛并作梵讚歎作梵法師一來八或擎金蓮玉幡列座聖前同聲梵讚通夜无休每一聖前點埦燈十八日曉供養藥粥齋時即供飯食百種盡味視聽男女不論晝夜會集多數兼於堂頭設齋供僧入夜更點燈供養兼以梵讚計二日二夜又大官軍中并寺裏僧竝以今日咸皆揀米不限日數從州運米分付諸寺隨眾多少斛數不定十斛廿斛耳寺庫領受更與眾僧或一斗或一斗五升眾僧得之揀擇好惡破者為惡不破為好設得一斗之米者分為二分其好纔得六升而而東本作惡非也今從池本好惡異袋還納官裏諸寺亦同此式各揀擇好惡皆返納官裏得二色來好者奉進天子以充御飰惡者留著納於官裏但分付人軍人中并僧不致百姓抑州揀粟米更難擇揚州擇米米色極黑擇却稻粒并破損粒唯取健好自餘諸州不如此也聞噵相公揀五石監軍門同之郎中二石郎官一石軍中師僧一斗五升或一斗又相公近者屈來洞州鶴林寺律大德光義蹔置惠照寺相公擬以此僧為當州僧正便令住此開元寺其僧正撿領揚州都督府諸寺之事并僧等凡此唐國有僧錄僧正監寺三種色僧錄統領天下諸寺整理佛法僧正唯在一都督管內監寺限在一寺自外方有三綱并庫司尋暮際僧正住當寺廿日暮際僧正來相看慰情廿一日齋後大使等去年十二月六日書將來案其狀偁十二月三日平善到上都安置東京禮賓院者其狀如別長判官傔從村清同月同日狀偁今月三日辰時到長樂驛勅使迎來傳陳詔問使到禮賓院兼朝拜異者略知事由廿五日就延光寺僧惠威覓得法花圓鏡三卷閏正月三日當寺慶僧正入寺屈諸寺老宿於庫頭空㭟空飯百種周足兼設音聲四日依金正南南東本作寄今從上文請為令修理所買船令都匠番匠船工鍛工等卅六人向楚州去又又東本作人今從池本於當寺請僧令乞雨以七人為一番以讀經五日日下或脫雨字下入夜雷鳴電光洪雨似夏月雷雨自後七箇日降雨至望始晴相公為修理開元寺瑞像閣設講募緣始自正月一日至于今月八日講畢以五百貫買木曳置寺庭且勾當令整削之本國朝貢第一舶使下水手射手六十餘人皆竝臥病辛苦十九日天台山禪林僧敬文來相見書云敬文住天台山禪林寺隨師在此山中出家廿一受學四分律南山鈔學天台法花經止觀去年十月初三日離寺至浙至西蘇州知日本國有使進獻有大和尚相從故此尋訪敬文又於童年時隨和尚行滿見㝡澄闍梨來取天台教門爾後計已卅年未得消息適聞知澄大德已靈變道門哀喪當須奈何先許滿和尚却來入天台山滿和尚已亡化經十六年敬文忽聞二大德在故此尋訪受請益僧書爰圓仁是前入唐澄和尚之弟子為尋天台遺迹來到此間間東本作聞恐非也緣勅未下暫住此寺不得進發請照之敬文書云㝡澄和尚貞元廿一年入天台後歸本國深喜得達所將天台教法彼土機緣多少彼國當時儲君云是南岳示生今後事宜不委今既是澄和尚弟子勑未下前何不且入天台待忽住此經久勑下來使即發還本國如何更得從容云云請益僧問未審彼天台國清寺幾僧幾座主在敬文答云國清寺常有一百五十僧久住夏節有三百已上人泊禪林寺常有四十人住夏節節東本作即七十餘人國清寺有維蠲座主每講止觀廣修座主下成業禪林寺即是廣修座主長講法花經止觀玄義冬夏不闕後學座主亦有數人云云多有語話如今任住當州惠照寺禪林院到暮歸去廿一日敬文又亦來筆言通情已後相續來語話就嵩山院持念和尚全雅借寫金剛界諸尊儀軌等數十卷此全和尚現有胎藏金剛兩部曼㭟羅兼解作壇法二月五日和尚全雅來房裏作如意輪壇六日州官准勑給祿案觀察使帖偁准閏正月二日勑給使下赴上都貳佰漆拾絹每人伍疋計壹仟參佰五拾疋准貞元廿一年二月六日勑每人各給絹五疋者舊例无有祿給僧之例今度祿時與僧等但不入京留置一判官已下水手已上每人各賜五疋更无多少八日得長判官閏正月十三日書札偁偁東本作使對見天子之日殊重面陳亦不蒙許仍深憂悵者第四舶射手一人水手二人緣強陵唐人先日捉縛將州著枷未被免未時出東廊水門不久之間第四舶監國信并通事緣買勑斷色相公交人來喚隨使入州去諸船到禪智寺東邊停住便入寺巡禮曉際第四舶通事知乘等被免趍來長官傔從白鳥清岑長岑留學等四人為買香藥等下船到市為所由勘追捨二百餘貫錢逃走但三人來廿一日早朝發去大使傔從傔從東國二本無今從池本粟田家繼先日為買物下船往市所由捉縛州裏留著今日被免來又第四舶射手被免放來到江陽縣㢠船堰夜宿廿二日辰時發射手身人部貞淨於市買物先日被捉閉縛州裏今日被放來又不失物不久之會第四舶射手水手手東本無二人被免却來史越智貞原先日往市買物所由報州請處分今日趍來暫行到常白堰常白橋下停留暮際且發入夜暗行亥時到路巾驛宿住廿三日早朝發辰時高郵縣暫駐北去楚州寶應縣堺五十五里南去江陽縣堺卅三里出揚州東廊水門從禪智寺東向北而行戌時過寶應縣管內行賀橋暫行即停丑時發行廿四日卯時到寶應縣白田市市橋南邊有法花院辰時到寶應縣停駐近側有安樂舘南去揚州高郵縣一百廿里北去州八十里午時到山陽縣去州六十五里申後到楚州城判官錄事等下船入驛舘拜見大使請益留學僧等暮際入館相見大使判官等大使宣云到京之日即奏請益僧往台州之事雇九箇船且令修之事禮賓使云未對見之前諸事不得奏聞再三催勸上奏但許雇船修理不許遣台州蒙勑報偁使者等歸國之日近自揚州至台州路程遙遠僧到彼求歸期計不得逢使等解纜之日何以可得還歸本國仍不許向台州但其留學僧一人許向台州五年之內宜終給食粮者對見之日復奏勑全全池本作又不許後復重奏遂不被許此愧悵者語話之後入開元寺住於廚庫西亭廿五日相見真言請益圓行法師語云大使在京再三上奏請益令住寺裏勑又不許後復上奏僅蒙勑許令住青龍寺於義真座主所十五日取胎藏法供百僧不受金剛界法廿六日早朝全雅來緣惣官不交住寺移住龍興寺相去五里從揚州有牒牒楚州并勾當王友真及日本國朝貢使案其狀偁留學圓載沙彌仁好傔從始滿朝貢使奏請往台州學問奉勑宜依所請件圓載等牒請往楚州別朝貢使却㢠到揚州便往台州奉相公判准狀者今別朝貢使訖擬遣台州同十將王友真勾當押領僧等雇一小船早送來州司待發給粮奉相公判准狀者州宜准狀者具在牒文王王下恐脫友字真催勸不許縱容日本國持節大使正三位行太政官左大弁守鎮西府都督參議參議是此間平章事大唐國雲麾將軍是二品撿挍大常卿是文官正三品官兼左金吾衛將軍是武官第一國親所除職也正三品員外置同正員廿七日留學僧為向揚州排比隨身物齋後本國使賜留學僧東絁卅五疋帖綿十疊長綿六十五屯砂金二十五大兩充學問䉼朝貢使賜勾當王友真酒飲惜別齋後本國相公喚留學僧賜砂金流淚慰別圓澄偁去月四日從長安發歸十三日至填州甘堂驛擬留楚州更不向揚州官人等從在京之日沈病辛苦然去月十三日入內裏廿五人錄事不得從會集諸蕃惣五國南照國第一立日本國第二自餘皆王子不著冠其形體屈醜著皮氈等又留學生道俗惣不許留此間圓載禪師獨有勅許往留台州自餘皆可歸本鄉又請益法師不許往台州左右盡謀遂不被許是以歎息者十四十五十六日此三箇日是寒之日此三日天下不出煙惣喫寒食十七日十八日為向楚州官私雜物等惣載船裏十八日齋後請益留學僧等出開元寺住平橋舘候船諸官人未駕船十九日早朝諸官人入州拜別相公申時駕船載人物物東本作惣惣物屢誤船惣十箇隻平橋舘東駐留廿日緣公事未備足不得進發午時先入京使內監國信春道宿禰永藏雜使山代吉永射手上教繼長州判官傔從白鳥村清岑岑上恐脫清字等十餘人乘一船未便聞大使等以今月十二日到楚州住緣上都不得賣買便差差東池兩本作着着差屢誤前件人等為買雜物來又聞大使以下惣臥病辛苦無極病後漸可第二舶判官藤原豐竝路間臥病不任辛苦死去自外諸人竝皆平善真言請益圓行法師入青龍寺但得廿日雇廿書手寫文疏等法相請益法師戒明不得入京更令弟僧義澄著冠成判官傔從令入京勾當軍將王友真相隨向楚州去不許永藏等賣即打鼓發去監國信傳大使宣云請益僧發赴台州之事大使到宣宣恐京字三四度奏請遂不被許大座主寄上天台山書一凾并衲袈裟及寺家未決修禪院未決等竝分付留學僧既了廿八日齋後留學僧并傔從二人與勾當王友真駕船向揚州發去惜別惆悵三月一日本國相公令本國畫工三人於開元寺畫妙見菩薩四天王像是海中漂沒之時所發願也二日晚頭功畢三日相公於開元寺設齋供六十餘僧捨錢七貫五百文以充齋儭二色齋後天台山禪林寺僧敬文文東本作久今從上文從揚州來寄送本國无行法師書札一封寄上圓澄座主書狀一封是敬文文同上從揚州來在路不逢圓載闍梨乍到擬入開元寺統看看東本作者者看屢誤門人不放入移住崔家禪院遣惟正慰問兼贈細㭟等夜頭本國相公為遂海中所發之願於開元寺堂裏點千盞燈供養妙見菩薩并四天王便令重誓去年漂沒之時更發願到陸之日准己身高畫妙見菩薩十軀藥師佛一軀觀世菩薩一軀著岸之後公事繁多兼在旅中諸事難備不能修造到本國之日必將畫造前件功德云云此州不作三月三日之節四日齋後敬文文同上禪師向揚州發去語云語云到揚州便發共圓載闍梨向天台山去兼先分付無行和尚信物轉與天台座主云云五日齋後前畫胎藏曼㭟羅一鋪五副了但未綵色耳又緣求法難遂可留住唐國之狀獻大使相公具狀在別相公報宣云如要留住是為佛道不敢違意要住即留但此國之政極峻官家知聞便導導池本作道違勑之罪有擾惱歟但能思量耳云云十七日運隨身物載第二船與長判官同船其九隻船分配官人各令船頭押領押領本國水手之外更雇新羅人諳海路者六十餘人每船或七或六或五人亦令新羅譯語正南商商下恐脫量字可留之方便未定得否十九日州刺史設酒餞屈相公相公不出但判官已下著緋之人入州受餞齋後請益僧出寺赴船廿二日早朝砂金大二兩大坂腰帶一送與新羅譯語劉慎言卯時朝貢使出館往船處參軍已上皆騎馬遏道人八人巳時解除上船祭住吉大神請益僧等駕第二船船頭長岑判官第一船節下第三船菅判官第四船藤判官第五船伴判官中丞差差東池兩本作着着差屢誤軍將令監送九隻船又有勑轉牒海州登州路次州縣支給第一船水手甑稻益緣在楚州館逢史生越智貞原傔人飛喪限月內不許駕船節下判令駕監送軍將船酉時動掉便發出河到大淮之南邊停宿廿三日未時剴慎言細㭟十斤松脯贈來與請益僧申時聞唐人噵第二船使以今月十四日發自海州東海縣未詳虛實此楚州北有大淮自西而東流所謂大淮橫涉到於東海夜頭請益僧送延曆寺消息一通分付大使傔近近池木作從江博士粟出家繼廿四日酉時打鼓進發出河入淮中停宿廿五日卯時發風吹正西乘淮東行未時到徐州管內漣水縣南於淮中停宿風色不變緣第一船新羅水手及稍功稍功即梢工也下船未來諸船為此拘留不得進發通夜信風不變廿六日早朝風變西南打鼓發行潮逆風橫暫行即停午後又發未時第一船第三船已下八箇船自淮入港到橋籠鎮前停住第二船不入港從淮直行當鎮西南於淮中停住去餘諸船五六來里風吹東南入夜稍正東從海口一船來便問何處來船人答云從海州來日本國第二船以今月廿四日出海州到東海縣昨見未發云云子時聞第一船打鼓發即第二船奉奉恐舉矴在前去廿七日卯時去淮口七十餘里逆潮暫停餘船隨後進來風吹西南眾人共言緣淮曲㢠見風有變近日風途只應是西風云云巳時行午時東北風吹未到海口廿許里擲矴停住暮際艮風雷雨廿八日天晴巳時為得順風祭住吉大神午後風變東南夜頭風變西南廿九日平明九箇船縣帆發行卯後從淮口出至海口指北直行送客軍將緣浪狼狼池作猛愈高不得相隨水手稻益駕便船向海州去望見東南兩方大海玄遠始自西北山嶋相連即是海州管內東極矣申時到海州管內東海縣東海山東邊入澳停住從澳近東有胡洪島南風切吹搖動无喻其東海山純是高石重巖臨海嶮峻松樹麗美甚可愛怜自此山頭有陸路到東海縣百里之程四月一日天晴雲氣趍騷未時節下已下登陸岸祀祠天神地祇不久之頃雨下艮風稍切波浪猛涌諸船踊騰小澳多船數有相觸驚怕殊多留學僧為送叡山在楚州分付音信書四通黑角如意一柄轉付記傳留學生長岑宿禰歸國既了官人祭祀之後共議渡海新羅水手申云自此北行一日於密州管管下池本有內字東岸有大大東本作人今從下文珠山今得南風更到彼山修理船即從彼山渡海甚可平善節下應之而諸官人不肯二日風變西南節下喚集諸船官人重議進發令申意謀第二船頭長岑宿禰申云其大珠山計當新羅正西若到彼進發災禍難量加以彼新羅與張寶亮興亂相戰得西風及乾坤風定著賊境案舊例自明州進發之船為吹著新羅境又從揚子江進發之船又著新羅今此度九箇船北行既遠知近賊況更向大珠山專入賊地所以自此渡海不用向大珠山去五箇之船同此議節下未入意敵論多端戌時從第一船遺書狀報判官已下其狀偁第二三五七九等船隨船首情願從此渡海右右東本作石恐非奉處分具如前者隨狀轉報既了夜頭風吹南北不定三日第一船昨夜處分之狀令長判官等五船頭署名第二船署史生名餘四船不列署名得金正南書偁第二三五七九等船船東本無從此過海宜遷駕第七八船者四日卯時請益僧及惟正惟曉丁雄滿為相隨相公往密州留住下第二船遷駕第八船西風不變第八船頭伴宿禰報相公請處分蒙相公判宜依僧等情願者第二船頭長岑宿禰詣相公船重聞渡海之事其意猶依先議相公宣云夜看風色風色不變明日早朝從此過海如有風變便向密州堺耳者五日平明信風不改第一船牒偁第一四六八等船為換作船調度先擬往密州界修理船從彼過海今信風吹因扶弱補脫從此過海轉報諸船者請益僧先在楚州與新羅譯語金正南共謀到密州界留住人家朝貢船發隱居山裏便向天台兼往長安節下不逆斯謀今諸船從此過海不隨節下往密州界之議加以信風連日不變所以第一船只隨從此過海之說解纜擬發仍所求得法門一簏兩部曼㭟羅壇樣等等東本作寺今從池本盛皮大箱一合寄付第八船頭伴宿禰兼付隨身物請益僧惟正惟曉水手丁雄滿四人下船留住岸上節下賜金廿大兩諸人臨別莫不惆悵比至辰時九箇船上上東本無今從池本帆進發任風指東北直行登岸望見白帆綿連行在海裏僧等四人留住山岸為齋時尋水入深澗不久之間有聞多人聲驚恠望見有一船到泊船處拾拾東本作合今從池本有餘人下矴停住從船處來問僧等在此之由僧等答云僧等本是新羅人先住楚州為往密州有相議之由暫駕朝使船隨相來朝貢使船今日過海所以下船留此云云船人等云吾等從密州來船裏載炭向楚州去本是新羅人人數十有餘和尚等今在此深山絕无人家亦當今无船往密州夜頭宿住否為復尋村里行如久在此不知風雨隱居何處僧等在此絕澗忽逢斯等不知所為所賷隨身物乃至食物惣與船人不留一物更恐謂有金物同心煞害便噵向村里去船人等語云云下東本有從云二字恐衍從此南行踰一重山廿餘里方到村里今交一人送去便將一人相從進行石巖峻嶮下谿登嶺未知人心好惡疑慮无極涉浦過泥申時到宿城村新羅人宅暫憇息使噵新羅僧從密州來此之意僧等答云新羅僧慶元惠溢教惠等乘便船來到此間一兩日宿住請勾當垂愍交住爰村老老池本作長王良書云和尚到此處自稱新羅人見其言語非新羅語亦非大唐語見噵日本國朝貢使船泊山東候風恐和尚是官客客下東本有從字恐衍從本國船上逃來是村不敢交官客住請示以實示報報東本削之莫作妄語只今此村有州牒兼押衙使下有三四人在此探候更恐見和尚楚捉入州云云思慮之會海州四縣都遊將下子巡軍中張亮張茂等三人帶弓箭來問從何處來僧等擬以實答還恐人稱有罪過楚捉即作方便設謀便書書字虫損不明殘畫似書故補之答之僧等實是本國船上來緣病暫下船夜宿不覺船發雇人到此請差使人送去云云爰軍中等的然事由僧僧恐依字僧依時誤將僧等往村長王良家任軍中請具錄留却之由與押衙僧等便作狀交報其狀偁日本國朝貢使九箇船泊東海山東嶋裏候風此僧緣腹病兼患脚氣以當月三日下船傔從僧二人行者一人相隨下船尋水登山裏日夜將理未及平損朝貢使船為有信風昨夜夜下恐脫發去二字早朝到船處覓之不見矣留却絕岸惆悵之際載炭船一隻來有十人在具問事由便教村里僧等強雇一人從山裏來到宿城村所將隨身物及及東本作帔衣服鉢盂錭鋺錭鋺恐銅鐃見下文文書澡瓶及錢七百餘笠子等如今擬往本國船處駕船歸國請差使人送爰子巡軍中等更加別狀遣報押衙都遊奕所入夜自亥時雷鳴洪雨大風切吹雷電之聲不可聽聞麤雨惡風不可相當比及丑時雷雨竝息風色有變早朝訪問多噵北風六日天晴縣家都使來請狀依昨樣作狀與之子巡將等差夫二人遣泊船處令看彼船發未但緣使者遲來不可得發去子巡將張亮云今差夫一人將和尚隨身衣服到第二舶處到山南即覓驢駄去在此无處借賃驢馬者晚頭縣都使來云余今日旦行明日在山南作䭦飩兼雇驢待和尚來須明日早朝但喫粥早來齋時已前到彼空飯語了即去少時押衙差州司衙官李順把狀走來其狀偁彼九隻船發未專到那嶋裏看定虛實星夜交人報來者子巡張亮據看船使說便作船已發竝不見之狀差人報示於押衙所七日卯時子巡軍中張亮等二人雇夫令荷隨身物將僧等去天暗雲氣從山裏行越兩重石山涉取鹽處泥深路遠巳時到縣家都使宅齋齋後騎驢一頭傔從等竝步行少時有一軍中迎來云押衙緣和尚等遲來殊差使人催來未時到興國寺寺人等云押衙在此不得待遲來只今發去寺主煎茶便雇驢三頭騎之發去驢一頭行廿里功錢五十文三頭計百五十文行廿里到心淨寺是即尼寺押衙在此便入寺相看具陳事由押衙官位姓名海州押衙兼左二將十將四縣都遊奕使勾當蕃客朝議郎試左金吾衛張實啜茶之後便向縣家去更雇驢一頭從尼寺到縣廿里晚頭到縣到押司錄事王岸家宿驢功與錢廿文一人行百里百廿文八日早朝喫粥之後押衙入縣少時歸來縣令通直郎守令李夷甫縣並並字有疑恐尉登仕郎前試太常寺奉禮郎攝並並字有疑恐尉崔君原主簿將仕郎守主簿李登縣尉文林郎尉花達捕賊官文林郎尉陸僚等相隨押衙來看共僧等語話主人與縣令等設酒食喫飯即歸押衙及僧等齋後出王錄事宅向舶處押衙與八箇軍中排比小船駕之同發縣令李夷甫以新麵二斗寄張押衙獻州刺史第二船在前路小海押衙噵此縣是東岸州在西岸良判官緣病來上舶船從此小海西岸有海龍王廟良判官只今於此廟裏安置今擬往彼良判官處令相看云云上帆直行從舶邊直過僧等且欲上舶押衙不肯未時到海龍王廟相看良岑判官粟粟下池本有田字錄事紀通事神參軍等具陳留任之由兼話辛苦之事判官等聞之或惆悵或歡來此間其和錄事病在舶上法相請益戒明法師并新羅譯語道玄等同在舶上乍到得相看押衙云三僧入州略看大夫便合穩便僧等三人相隨押衙入州去從神廟西行三許里許里池本作里許到州門前押衙及將等先入內報少時喚僧等且入至刺史前著椅子令座問拋却之由令押衙申刺史姓顏名措粗解佛教向僧等自說語話之後便歸神廟刺史顏大夫差一軍將令相送僧等三人及行者暫住海龍王廟從東海山宿城村至東海縣一百餘里惣是山路或駕或步一日得到從六日始東北風吹累日不改恐彼九隻船逢雷雨惡風之後不得過海歟憂悵在懷僧等為求佛法起謀數度未遂斯意臨歸國時苦設留却之謀事亦不應遂彼探覓也左右盡議不可得留官家嚴撿不免一介仍擬駕第二舶歸本國先在揚州楚州楚東本作楚揚州覓得法門并諸資物留在第八船臨留却所將隨身之物胡洪嶋至州之會竝皆與他空手手東本作年今從池本駕船但增歎息是皆為未遂求法耳九日風猶艮隅夜頭風受西方十日亦西起未時良岑判官出廟上船僧等相隨上舶相看戒明法師及道玄闍梨等粟粟下池本有田字錄事紀通事為有勾當事未上船十一日卯時粟粟下池本有田字錄事等駕舶便發上帆直行西南風吹擬到海縣西為風所扇直著淺濱下帆搖櫓逾至淺處下棹衡路跓終日辛苦僅到縣潮落舶居泥上不得搖動夜頭停住上舶語云今日從宿城村有狀報偁本國九隻船數內第三船流著密州大珠山申時押衙及縣令等兩人來宿城村覓本本池本作求和尚却歸船處但其一船流著萊州界任流到密州大珠山其八隻船海中相失不知所去云云亥時曳纜擬出亦不得浮去十二日平旦風東西不定舶未浮去又從縣有狀報良岑判官等偁朝貢使船內第三船流著當縣界先日便發者未見正狀風變不定十三日早朝潮生擬發緣風不定進退多端午後風起西南轉成西風未時潮生舶自浮流東行上帆進發從東海縣前指東發行上艇解除兼禮住吉大神始乃渡海風吹稍切入海不久水手一人從先臥病申終死去裹之以席推落海裏隨波流却海色稍清夜頭風切直指行十四日平明海還白濁風途不變望見四方山嶋不見比至午時風止海色淺綠未時南風吹側帆向丑戌時為得順風依灌頂經設五穀供祠五方龍王誦經及陁羅尼風變西南夜半風變正西隨風轉舳十五日平明海水紺色風起正西指日出處而行巳時風止未時東南風吹側帆北行水手一人病苦死去落却海裏申時令卜部占風不多宜但占前路雖新羅堺堺池本作界應无驚恠云云舶上官人為息逆風同共發願祈乞順風見日沒處當大櫂正中入夜祭五穀供誦般若灌頂等經祈神歸佛乞順風子時風轉西南不久變正西見月沒處當艫柂倉之後十六日平明雲霧雨氣四方不見論風不同或云西風或云西南風或云南風望見晨日當於舳舳東本作舶小櫂腋門便知向東北去側帆而行或疑是南風歟上天雖晴海上四方重霧塞滿不得通見今日始主水司以水倉水充舶上人官人已下每人日池本作日每人二升傔從已下水手已上日每人一升半午未之後見風色多依東南指子側行霧晴天雲於艮坎坤有凝雲塞請益僧違和不多好不喫飯漿入夜洪雨辛苦無極十七日早朝雨止雲霧重云不知向何方行海色淺綠不見白日行迷方隅或云向西北行或云向正北行或云前路見嶋進行數尅海波似淺下繩量之但有八尋欲下矴停不知去陸遠近有人云今見海淺不如沈石暫住且待霧霽方定進止眾咸隨之下矴繫留僅見霧下有白波擊激仍見黑物乃知是嶋髴未分明不久霧氣微霽嶋體分明未知何國境便下艇差射手二人水手五人遣令尋陸地問其處名霧氣稍晴北方山嶋相連自東南始至于西南綿連不絕或云是新羅國南邊令卜部占之稱大唐國後噵新羅事在兩盈未得定知持疑之際所遣水手射手等將唐人二人來便噵登州牟平縣唐陽陶村之南邊去縣百六十里去州三百里從此東有新羅國得好風兩三日得到云云船舶上官人賜酒及綿便作帖報州縣緣天未晴望見山頭未得顯然東風吹日暮霧彌暗十八日改食法日每人糒一升水一升東風不變又此州但有粟其粳米最貴云云請益僧為早到本國遂果近年所發諸願令卜部祈禱神等火珠一箇祭祭池本作奉施於住吉大神水精念珠一串施於海龍王剃刀一柄施於主舶之神以祈平歸本國
