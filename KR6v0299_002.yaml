開成五年三月草五日日本國求法僧圓仁狀上員外閣下謹空草七日遣惟正入本典院探公驗事本案報云已有處分給與公驗一頭給公驗一頭聞奏待後日朝衙尚書押名押印了使送到云云草八日立夏天氣陰沈登州留後官王李武來院相看便聞渤海王子先日來到擬歸本鄉待敕使來發去於當寺夏供院有齋普請赴赴池本作趨彼斷中衆僧五十來草九日修狀進尚書乞齋糧日本國求法僧圓仁請施給齋糧右圓仁等遠涉滄波投尋佛教庸身多幸遊到尚書貴境緣逼旅李齋飯飢乏語音不同無處乞索伏望尚書仁造施給糧食撫養貧僧然乃恩捨之福比於陳如鴻濟之德競乎薄拘不任欽欵之誠謹奉狀陳請伏增悚懼不宣謹狀開成五年三月草九日日本國求法僧圓仁狀上尚書閣下謹空遣弟子惟正令奉狀即蒙還報云明日有處分者卅日赴蕭處士請到宅斷中便聞節度使録求法僧等來由聞奏天子訖四月一日朝衙得公驗尚書賜給布三端㭟陸斤齋時當寺有齋今日尚書郎君生日因設長命齋二日早朝蕭判官宅喫粥便入州奉狀謝尚書施物兼辭尚書日本國求法僧圓仁伏蒙尚書仁造賜給布參端茶陸斤下情不勝感戴謹奉狀陳謝不宣謹狀開成五年四月二日日本國求法僧圓仁狀上尚書喚入衙前傳語所施輕少不足言謝勞和上來好去次入節度副使張員外院辭別員外喚入衙裏給茶餅食啜茶辭別員外到寺裏赴趙德濟請齋暮際幕府判官施給糧米二斗驢料小豆二斗黃昏入幕府判官宅謝施路糧辭別判官三日平明發幕府判官差行官一人送過城門幕府從初相見之時心極殷勤在寺之時每日有恩施慰慰東本作殷問不絶發行之時差人送路兼示道路今日尚書監軍諸神廟乞雨從寺裏過州城西北去城十里有堯山山上有堯王廟堯王昔遊此界行過之處遂建其廟矣相傳云每乞雨時了了池本作多感降雨出城向北行草里到益都縣界石羊村陳家餐主人心平齋後西北行十五里到臨淄縣界淄水驛西行草五里到金嶺驛東王家宿主人心性直好見客殷勤望西遙見長白山四日平明發西行十六里入小路望長白山去去池本無向西行五里到淄州淄川縣界張趙村入趙家餐主人極貧無飯可喫心裏無惡齋後向西北行卅里到長山縣界古縣村𮠔𮠔不明或廓字歟家宿主人鍛工本是沛州人心平有道心五日早發西北行十里到長山縣從縣西行十里到張李斷中主人殷勤齋後西行十五里到長白山東面日欲申時於仙人臺前不不或石字誤歟村史家喫茶問醴泉寺主人答從不村望西直行十五里到醴泉寺云云便向正西入山去錯差路行十餘里多有差路不知所向緣夜却不村史家宿竟夜狗吠恐懼不眠六日早朝主人施粥又差一人相送指路正西入谷行過高嶺向西下坂方得到醴泉寺果薗喫茶向南更行二里到醴泉寺斷中齋後巡禮寺院禮拜志公和上影在琉璃殿內安置戶柱楷砌皆用碧石構作寶幡奇彩盡世珍奇鋪列殿裏志公和上是十一面菩薩之化身其本緣鐫著碑上和上朱代金城人也降靈於此長白山滅度其後肉身不知所向但作影像舉國敬重堂西谷邊有醴泉井向前泉涌香氣甘味有喫之者除病增壽爾來名為醴泉寺和上滅後泉水涸盡但空井如今泉井之上建一小堂更作和上影影前堂內有石井深五尺餘今見無水也寺之南峯名為龍臺獨出羣岫地圖所載曾有龍舞其巔以此奏聞奉勑改名龍臺寺後因泉涌改名醴泉寺東西南方嵩峯連塞北方開豁無山阜矣寺舍破落不多淨喫聖迹陵夷無人修治寺莊園十五所于今不少僧途本有百來僧如今隨緣散去現住寺者三十向向池本作巳上也典座僧引向新羅院安置七日早朝堂頭喫粥便發典座等衆僧留明日當寺大齋因何早去云云緣欲早到臺山不住出寺門向北行十五里到醴泉寺莊斷中向正西行二十里到章丘縣從縣西行十五里過濟河渡口時人喚為濟口從口西北行半里王家宿主人心平八日早發正西行草五里到臨濟縣入尹家斷中便發有商人施五升米過市正西行三十里申時到臨邑縣界隻龍村張家晚來雨下主人心平九日朝來雨下不得發齋後雨晴便發正西行十五里到古縣是前臨邑縣城廓頽夷無一官舍先代寺舍破滅佛像露坐還為耕疇甚可憂歎向正西行十五里到源河渡口過河行十里到禹城縣界鸞塘村里甫家宿主人有道心十日平明發正西行四十里未時到禹城縣縣市粟米一斗卌五文粳米一斗百文小豆一斗十五文麵七八十文過城西行十里到仙公村趙家宿通夜雷電雹雨至曉雷雨止主人無道心十一日卯時發正西行卅里午時到黃河渡口時人喚為藥家口水色黃渥渥池本作泥駛流如箭河闊一町五段許向東流也黃河源出崑崙山有九曲六曲在土蕃國三曲在大唐國渡口南北兩岸各有渡口城南北各四町有餘東西各一町許此藥家口多有舟船貪載往還人每人出五文一頭驢十五錢河南屬齊州禹城縣河北屬德州南界過河北岸斷中四人每人喫四碗粉粥主人驚怪多喫冷物恐不消化矣正西行三十五里申時到德州平原縣界趙館村趙家宿主人無道心十二日早發正西行卌里到沛州夏津縣界形開村趙家斷中主人有道心施齋飯菜疏飽足齋後發西行卅里到夏津縣界孟家莊莊恐店字孫家宿主人有道心十三日發西行卅五里到王淹村王家斷中主人足道心施齋飯齋後西行卅五里申時到唐州城裏開元寺宿見説中丞申節度使於開元寺新開壇場牒報街衢令人知聞從諸州來受戒僧四百有餘昨日壇場罷新戒僧盡散去云云見未發者只有三十餘人也寺綱維具録日本國僧等來由報中丞十四日朝衙入州參見中丞中丞家裏設一十僧齋便赴中丞請於使宅裏齋齋後却到寺住晚際入戒壇院見新置壇場壘磚二層下階四方各二丈五尺上階四方各一丈五尺高下層二尺五寸上層二尺五寸壇色青碧時人云取琉璃色云云十五日於城內劉家斷中飯食如法齋後入善光寺見尼衆戒壇堂裏縣幡鋪席以繩界地不置壇平地鋪著以為戒壇明日起首可行道受戒晚衙入州辭中丞十六日平明發西行草里到清河縣界合章流村劉家斷中喫榆葉羹主人雖未解佛法自出齋飯與僧等斷中齋後發西北卌里到冀州南宮縣界趙固村趙家宿主人心直十七日早朝主人施粥飯正北行十五里西北行十五里到南宮縣入城裏張家斷中出城西北行五十里人家希到唐陽陽池本作楊非也縣入城內覺觀寺宿寺舍破落無有僧徒只有知寺僧一人見客不殷勤房床鋪設惣不勾當十八日平明發向正西行卅里到新河口入城南家斷中從西門出過新河橋正西行卅里平原遙遠人家希絶到趙州界寧晉縣東唐城寺宿寺極貧疏僧心庸賤十九日辰時發穿城內西北行十五里到秦丘村劉家斷中主人雖貧布施齋飯午時發西北行草五里熱氣如蒸到趙州南開元寺宿屋舍破落佛像尊嚴師僧心鄙怕見客僧草日平明喫粥西北行卌里到鎮州鸞城縣城外孫家斷中向西北行三十里到鎮州大廓縣界作護驛㔁家宿主人賊心笇人草一日早發正北行卅里到鎮州節度府入城西南金沙禪院不見斷中有二僧見客嗔慢撥遺數度強入院中修餐主人歸心自作餺飩與客僧齋後向正北行草里到使莊楊家宿此莊即鎮州前節度使王大尉之莊大尉墓堂安在於中主主恐王字節度使家人守墓見在有一軍將姓劉勾當墓堂精妙南行一里建碑堂築立高垣不交開者大尉薨後經今三世云云主人有道心於客殷勤草二日早朝主人施粥向正北行草里到南接村劉家斷中主人從來發心長設齋飯供養師僧不限多少入宅不久便供飯食婦人出來慰客數遍齋了喫茶向正北行草五里到鎮州界行唐縣入城內西禪院宿有草餘禪僧心極閙亂草三日早朝喫粥向西北行草五里到黃山八會寺斷中喫隸飯隸或黍字歟時人稱之為上房普通院長有飯粥不論僧俗來集便僧僧字恐衍宿有飯即與無飯不與不妨僧俗赴宿故曰普通院院中有兩僧一人心開一人心鬱有一黃毛狗見俗嗔咬不憚杖打見僧人不論主客振尾猥馴齋後向西北入山尋谷行時人喚之為國信山從上房行得草里到劉使普通院宿便遇五臺山金閣寺僧義深等往深州求油歸山五十頭驢馱油麻油去又見從天台國清寺僧巨堅等四人向五臺誥云天台國清寺日本國僧一人弟子沙彌一人行者一人今見在彼中住云云草四日天陰發從山谷西北行草五里見遇一羊客驅五百許羊行過一嶺到兩嶺普通院院主不在自修食院中曾未有粥飯緣近年蟲災今無糧食齋後乘山谷行西北三十里到果菀普通院宿雷鳴降雨草五日雨下普通院深山無粥飯喫少豆為飯從趙州已來直至此間三四年來有蝗蟲災五穀不熟糧食難得齋後雨停尋谷向西行三十里到解解上下恐有脫字普通院巡禮五臺山送供人僧尼女人共一百餘人同在院宿草六日天晴喫粥了向行山谷草里到淨水普通院修餐院中貧乏山風漸涼青松連嶺踰兩重嶺西行卅里到塘城普通院過院西行嶺高谷深翠峰吐雲溪水瀉緑流從塘城西行十五里申時到龍泉普通院宿後丘上龍堂裏出泉清冷院近此泉喚為龍泉普通院院有飯粥草七日發從山谷向西行草里到張花普通院共九僧斷中院有粥飯齋後行谷十里到㭟鋪普通院過院西行十里踰大復嶺嶺東溪水向東流嶺西溪水向西流過嶺漸下或向西行或向南行峯上松林谷裏樹木直而且長竹林麻園不足為喻山巖崎峻欲接天漢松翠碧與青天相映嶺西木葉未開張草未至四寸從㭟鋪行卅里薄暮到角詩普通院宿院無粥飯草八日至五月五日記事凡草八日入平谷西行三十二行再出第三卷初兩文相異以線示之卅里巳時到停點普通院未入院中向西北望見中臺伏地禮拜此即文殊師利境地五頂之圓高不見樹木狀如覆銅盆遙望之會不覺流淚樹木異花不同別處奇境境字有疑特深此即清涼山金色世界文殊師利現在利化便入停點普通院禮拜文殊師利菩薩像因見西亭壁上題云日本國內供奉翻經大德靈仙元和十五年九月十五日到此蘭若云云院中僧等見日本國僧來奇異示以壁上之題故記著之午時食堂裏齋齋後見有數十僧遊南臺去暮際雷鳴雨下自草三日申時入山至于今日入山谷行都經六日未盡山源得到五臺自去二月十九日離赤山院直至此間行二千三百餘里除却虛日在路行正得卌四日也慙愧在路並無病纍草九日停點院設百齋齋恐衍僧齋赴請同齋因台州國清寺僧巨堅歸本寺付書二封送圓載上人所齋後見數十僧巡禮南臺去一上時晴天忽陰風雲鬥暗零雨降雹晚際見其歸來被雹打破笠子而來五月一日天晴擬巡臺去所將驢一頭寄在停點院囑院主僧勾當草料從停點西行十七里向北過高嶺十五里行到竹林寺斷中齋後巡禮寺舍有般舟道場曾有法照和尚於此堂念佛有勑諡為大悟和上遷化來二年二下東本傍注有百歟二字池本作二百今案法照見宋僧二十一大曆年中在五臺山二年恐二十年誤今造影安置堂裏又畫佛陀波利儀鳳元年來到臺山見老人時之影花嚴院堂中有金剛界曼茶羅一鋪二日入貞元戒律院上樓禮國家功德七十二賢聖諸尊曼茶羅綵畫精精東本無妙次開萬聖戒壇以玉石作高三尺八角底築填香泥壇上敷一絲毯闊狹與壇齊棟梁椽椽恐柱粧畫微妙謁押壇老宿法諱靈覺生年一百歲七十二夏貌骨非凡是登壇大德見客殷勤見説去年六月中天竺那蘭陀寺僧三人來遊五臺見五色雲圓光攝身光歸天竺去竹林寺有六院律院庫院花嚴院法花院閣院佛殿院一寺都有四十來僧此寺不屬五臺五月五日寺中有七百五十僧齋諸寺同設並是齊州靈巖寺供主所設竹林寺齋禮佛式午時打鍾衆僧入堂大僧沙彌俗人童子女人依次列坐了表歎師打槌唱一切恭敬敬禮常住三寶一切普念次寺中後生僧二人手把金蓮打蠡鈸三四人同音作梵供主行香不論僧俗男女行香盡遍了表歎先讀施主設供書次表讚了便唱一切普念大僧同音唱摩訶般若波羅蜜次唱佛菩薩名大衆學詞同禮釋迦牟尼佛彌勒尊佛文殊師利菩薩大聖普賢菩薩一萬菩薩地藏菩薩一切菩薩摩訶薩為草八天釋梵王等敬禮常住三寶為聖化無窮敬禮常往三寶為今日供主衆善莊嚴敬禮常往三寶為師僧父母法界衆生敬禮常住三寶打槌唱云施食呪願上座僧呪願了行飯食上下老少道俗男女平等供養也衆僧等喫齋了行水湯口次打槌念佛表歎師打槌云為今日施主善莊嚴及法界衆生念摩訶般若波羅蜜多大衆同音念釋迦牟尼佛彌勒尊佛大聖文殊師利菩薩一萬菩薩一切菩薩摩訶薩如次學詞同念念佛了打槌隨意大衆散去暮際雷鳴雹雨閣院鋪嚴道場供養七十二賢聖院主僧常欽有書巡報諸院知同請日本僧便赴請入道場看禮念法事堂中傍壁次第安列七十二賢聖畫像寶幡寶珠盡世妙綵張施鋪列雜色氈毯敷洽地上花燈名香茶藥食供養賢聖黃昏之後大僧集會一僧登禮座先打蠡鈸次説法事之興由一一唱舉供主名及施物色為施主念佛菩薩次奉請七十二賢聖一一稱名每稱名竟皆唱唯願慈悲哀愍我等降臨道場受我供養之言立禮七十二遍方始下座更有法師登座表歎念佛勸請諸佛菩薩云一心奉請大師釋迦牟尼佛一心奉請當來下生彌勒尊佛十二上願藥師琉璃光佛大聖文殊師利菩薩大聖普賢菩薩一萬菩薩首皆云一心奉請次同音唱散花供養之文音曲數般次有尼法師又表歎等一如僧法師次僧法師與諸僧同音唱讚了便打蠡鈸同音念阿彌陀佛便休次尼衆贊贊恐替字僧亦如前如是相替替東本作贊讚歎佛直到半夜事畢俱出道場歸散其奉請及讚文寫取在別七日閣院有施主設七日僧齋齋時法用略同昨日但行香時道場供養音聲表歎師不唱一切恭敬等但立表嘆更有別僧打槌作餘法事飲食如法十四日以下凡三十行再出第三卷兩文相異以線示之十四日夜惟正惟曉共數十遠來沙彌於白玉壇受具足戒十六日早朝出竹林寺尋谷東行十里向東北行十里到大花嚴寺入庫院住齋後入涅槃院見賢座主彌高閣殿裏講摩訶止觀有四十餘僧列坐聽講便見天台座主志遠和上在講筵聽止觀堂內莊嚴精妙難名座主云講第四卷畢侍下講到志遠和上房禮拜和上慰問殷勤法堅座主從西京新來文鑒座主久住此山及聽講衆四十餘人並是天台宗同集相慰喜遇講𨓍志遠和上自説云日本最澄三藏貞元草年入天台求法台州刺史陸公自出紙及書手寫數百卷與澄三藏三藏得疏却歸本國云云便問日本天台興隆之事粗陳南嶽大師生日本之事大衆歡喜不少遠座主聽説南嶽師生日本弘法之事極喜大花嚴寺十五院僧皆以遠座主為其首座不受施利日唯一食六時禮懺不闕常修法花三昧一心三觀為其心腑寺內老僧宿盡致敬重喫茶之後入涅槃道場禮拜涅槃相於雙林樹下右脅而臥一丈六尺之容摩耶悶絶倒地之像四王八部龍神及諸聖衆或舉手悲哭之形或閉目觀念之貌盡經所説之事皆模為像也次入般若院禮拜文鑒座主天台宗曾講止觀數遍兼畫天台大師影長供養談話慰問甚殷勤更見大和尚影曾在此山修行巡五臺五十遍於中臺頂冬夏不下住三年也遂得大聖加被著得大高一尺長一尺五寸大一量草五斤小一量十斤現著影前和上曾作一萬五千具衣帔施與萬五千僧設七萬五千供令作影於高閣上安置供養此清涼山五月之夜極寒尋常著綿襖子嶺上谷裏樹木端長無一曲戾之木入大聖境地之時見極賤之人亦不敢作輕蔑之心若逢驢畜亦起疑心恐是文殊化現歟舉目所見皆起文殊所化之想聖靈之地使人自然對境起崇重之心也
