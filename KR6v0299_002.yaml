body:
  text: 開成四年四月十九日平明天晴北風吹舉矴南出未時風止搖櫓指西南行申時到邵村浦下矴繫住當於陶村之西南擬入於澳逆潮遄流不能進行草日早朝新羅人乘小船來便聞張寶亮與新羅王子同心罰得新羅國便令其王子作新羅國王子既了南風稍切緣潮逆遄不得定住東西往復搖振殊甚草一日雲霧午後南風切吹草二日雲雨申時挾抄一人死却載艇移置嶋裏草三日雲氣南風草四日霧雨此泊舶之處結纜纜斷風吹浪高近日下八箇纜其三箇纜矴並斷落所餘之纜甚少設逢暴風不能繫住憂怕無極草四四或五誤日西風吹暮際騎馬人來於北岸從舶上差新羅譯語道玄令迎道玄却來云來者是押衙之判官在於當縣聞噵本國使船泊此日久所以來擬相看緣夜歸去不得相看明日專詣於舶上更令新羅人留於岸上傳語於道玄轉為官人令申來由便聞本國朝貢使駕新羅船五隻流著萊明明恐州字廬山之邊餘之四隻不知所去雖聞是事未詳是第幾之船又聞大唐天子為新羅王子賜王位差使擬遣新羅排比其船兼賜祿了草五日風吹不定霧氣未晴午時昨日後岸歸去押衙之判官寄王教言贈與於官人酒魚等王教言亦自獻酒餅等來官人賜綿等此舶舶或泊字多有潛磯每當浪漂斷纜沈矴五六度矣未後搖櫓向乳山去出邵村浦從海裏行未及半途暗霧倏起四方俱昏不知何方之風不知向何方行拋矴停住風浪相競搖動辛苦通夜無息草六日早朝雲霧微霽望見乳山近在西方風起東北懸帆而行巳時到乳山西浦泊舶停住山嶋相衛如垣周圍其乳山之體峻峰高穎頂上如鋒山根自嶺下而指六方於澳西邊亦有石山巖峰並嶺高秀半天東之與北雖有山連而猶斜耳未時新羅人卅餘騎馬乘驢來云押衙潮落擬來相看所以先來候迎就中有一百姓云昨日從廬山來見本國朝貢船九隻俱到廬山人物無損其官人等惣上陸地作幕屋在從容候風云云不久之間押衙駕新羅船來下船登岸多有娘子朝貢使判官差新羅譯語道玄遣令通事由已後粟録事下舶到押衙處相看兼作帖請食糧先在東海縣但過海之糧此舶過海逆風却歸流著此間事須不可在此喫過海糧仍請生料云云押衙取狀云更報州家取處分晚頭歸宅終日東北風吹草七日陰雨北風草八日天晴押衙來與官人相看草九日北風吹令新羅譯語道玄作謀留在此間可穩便否道玄與新羅人商量其事却來云留住之事可穩便五月一日遣買過海糧於村勾當王訓之家兼問留住此村之事王訓等云如要住者我專勾當和尚更不用歸本國云云依事不應未能定意終日西風吹二二東本作草非也今從池本日西風吹解纜出澳為風甚切行路近磯不能即出酉時風停任流到海口停留遣令汲水日沒之時於舶上祭天神地祇亦官私絹纈鏡等奉上於船上住吉大神丑時水手一人自先沈病將臨死未死之前纏裹其身載艇送棄山邊送人却來云棄著岸上病人未死乞飯水語云我病若愈尋村里去舶上之人莫不惆悵三日風吹不變從乳山西南海口懸帆進發風途稍平午時風止不久東風吹迥帆却歸到乳山泊口停宿四日辰時從泊口西南四五許里行於望海村東浦桑嶋北邊結纜五日下舶登陸作五月節兼浴沐浣衣晚頭從舶上將狀來其狀稱順風難扇不遂利涉頭判官共衆議合合池本作全船潔齋從明日始三箇日延屈諸和尚轉經念佛祈願順風照察幸垂光儀者緣夜未即赴夜頭於陸岸宿六日早朝赴舶上去於舶上齋新羅譯語道玄向押衙宅去齋後更登陸岸著幕排比修法之事晚頭祭五方龍王戒明法師勾當其事七日雨下九日早朝轉經事畢十一日祭大唐天神地祇從此日至十三日天色或暗或霽風吹不定十四日州押衙來於舶上問舶上之人數旦歸村家邵村勾當王訓等來相看便聞本國相公等九隻船先從廬山過海遇逆風更流著於廬山以來之泊入夜雷鳴洪雨十五日朝雲色騷亂雲雨稍切州押衙來於船上請舶上人數官人具録其數帖報州家晚頭押衙歸朝貢使賞祿絁綿等十六日天暗押衙使來請朝貢使報縣之帖請益僧作留住之狀付商人孫清送林大使宅舶上官人差射手二人水手二人與州押衙共遣請糧押衙稱無土物贈州縣而不交去前件人等自陸却來十七十八日風途或𠃵或兌人論不一準十九日夜比至丑時雷鳴電耀洪雨大風不可相當艫纜悉斷舶即流出乍驚下矴便得停住舳頭神殿蓋葺葺東本作指今從池本之板為大風吹落不見所在人人戰怕不能自抑草日西風吹便擬過海排比帆布運上岸人午時風變西南計不能出泊仍不進發入夜雷雨更甚草一日巳時西風吹解纜發行風止不扇暫停待風南風微吹不能上帆歸泊結纜舶上卜部自先久疾晚頭下舶草二日早朝聞卜部於岸上死終日暗雨東風吹草三日雲天微晴入夜風雨競切草四日西風切吹雨氣未晴仍未進發晚間官人共議風色終日不變明朝便發草五日早朝解纜風止不得進發申時新羅船一隻懸白帆從海口渡去不久之頃迥帆入來晚際任流向乳山泊去諸人皆疑若是朝貢使從盧山來歟馳艇遣問彼新羅船遄走緣夜此艇不得消息歸來草六日擬發風逾不順晚頭西北兩方電光耀耀雲色騷暗入夜舶忽然振漂驚怪無極戌時泊西北岸上狐鳴其聲遠響久而不息不久之會雷電鬪鳴聞之耳塞電光之耀不堪瞻視大雨似流驚怕章難章難恐辛艱舶上諸人不能出入草七日曉霹靂降來劈却桅子艫方之面斜戾折之其所折棄厚四寸有餘闊六寸許長三丈餘自外折棄之者五片或四尋或五尺已下段段狼藉採集一處繫著於船角之上兼祭幣帛到本國之日專建神社永充祭祀云云燒龜甲占其祟稱舶上卜部諸公葬於當處神前所以得神嗔怒作此禍災如能解除便可安穩仍於桑嶋解除又於舶上祭當處神其被折之桅子或云既是折弱更造替或云作桅子之材此處卒爾難可得若更作替計今年不能過海事須結纏所被折之處早可進發云云諸人據後説便擬進發風起西北少有動舶風吹便止人心參差上下不𪾼𪾼恐睦字嵐風微扇解纜強發信風無感暫行下矴入夜嵐風微吹懸帆漸行僅嶋口風止不能發下矴繫船草八日辰時雲霧靄暗石神振鳴舉矴歸去雨下辛苦搖櫓進入桑嶋東南少海有嶋於此泊舶卅日天晴本國曆六月一日風起西北迥轉不定自先至今日可住此村之事報請官人不許今日又請未被允許六月一日天色微晴緑留住之事暫請遊艇不失失東本作天今從池本下船二日天晴雖無信風人人苦欲歸鄉步叮強行終日難出晚際為上帆而迥舶忽然流去將當磯崎下矴盡力僅得平善三日西風微吹或吹或不吹上帆下帆三數度矣或帆或櫓遙指赤山去從邵村浦乘潮而行垂浦口潮橫走舶忽當磯下棹指張不能制之底有潛石相共衝當岸磯底石相合衝觸舶將破裂人各合力指棹步矴共得曳出隨流出行海中停留暮際大風洪雨雷聲電光不可視聞舶上諸人振鋒𨨞大刀等竭音呼川以遮霹靂四日早朝上帆進行暫行風止下矴繫住五日遲明懸帆進行午後到赤山西邊潮逆暫停俄爾之頃又行漸入山南雲聚忽迎來逆風急吹張帆頓變下帆之會黑鳥飛來繞舶三迥還居嶋上衆人驚怪皆謂是神靈不交入泊迥舶却出去山稍遠繫居海中北方有雷聲掣雲鳴來舶上官人驚怕殊甚猶疑冥神不和之相同共發願兼解除祈祠船上霹靂神又祭船上住吉大神又為本國八幡等大神及海龍王并登州諸山嶋神等各發誓願雷鳴漸止風起東西下矴繫居此舶離陸日久不能過海又不得入澳經多日夜漂蕩海裏不任搖動心力疲勞六日𠃵風切吹擬入赤山泊風合合池本作向相順仍舉沈石排比帆布風止浪猛更沈鎮石未卜進入風波參差行途不與心合艱辛之至莫過此大矣七日午時𠃵風吹舉帆進行未申之際到赤山東邊泊船𠃵風大切其赤山純是巖石高秀處即文登縣清寧鄉赤山村山裏有寺名赤山法花院本張寶高初所建也長羽長池本作張有莊田以充粥飰其莊田一年得五百石米冬夏講説冬講法花經夏講八卷金光明經長年講之南北有巖岑水通院庭從西而東流東方望海遠開南西北方連峯作壁但坤隅斜下耳當今新羅通事押衙張詠及林太使王訓等專勾當八日暮際請益法師及惟正惟曉等登寺偶謁寺家諸僧等卅有餘相看啜㭟夜宿間房九日齋前法相請益戒明法師及從僧等相尋登來共於食堂喫齋齋後粟田録事新羅通事道玄等同共登來亦宿一夜十日齋後粟粟下池本有田字録事歸船上去本國七箇僧留住山寺超七日西南風大切片時無息草二日大風暴雨通夜不止草三日早朝巡看山寺拔樹折枝崩巖落壘石從泊舶處水手走來云舶當粗磯悉已破損艇一雙并皆破散乍聞怪無極便差專使遣泊舶處令看虛實其舶為大風吹流著麁磯柂板破却遊艇艇東本無今從池本一雙并已摧裂舶當乎乎池本作平磯三四度鴻濤如山纜矴不繫與波波各本作彼恐誤流出自西岸而到東岸風吹逾切漂搖更劇下鏘為矴矴纜才沈迫岸繫留船上諸人心迷不喫宛似半死兩日之後歸到舊泊補綴艇草六日分頭令取矴及覓柂料之材自去四月起首雲霧暗塞風雨不止一兩日晴還更雲塞草七日聞張大使災災恐文字見下文關船二隻到日且或赤字山浦草八日大唐天子差入新羅慰問新即位王之使青州兵馬使吳子陳崔副使王判官等卅餘人登來寺裏相看夜頭張實高遣大唐賣物使崔兵馬司來寺問慰草九日遲明共道玄闍梨入來客房商量留住之事便向船處歸去赤山浦東南涉少海有嶋與東岸接連是吳干將作劒處時人喚為莫耶嶋但莫耶是嶋之名干將是鍛工之名七月十日十一日海裏無風波浪猛騰徹底涌沸浪聲如雷舶船漂振驚怪不少十四日辰時辭山院到泊船處在岸頭共戒明法師及粟録事和録事辭別往真莊村天門院相看法空闍梨此師曾至本國歸來二十年夜宿其院十五日山院喫齋便喫新粟米飯十六日早朝從山院下在路聞人噵舶船昨日發去到泊船處覓船不見暫住岸頭赤山院衆僧共來慰問俱登赤山院喫飯便見州使四人先來在院運日本國朝貢使糧七十石米著今於當村緣朝貢使已發不得領過便報縣家去院裏老少深怪被拋却慰問殷勤草一日申時本國相公已下九隻船來泊此赤山浦即遣惟正起居相公兼咨諸判官録事等相公差近江權博士粟田家繼及射手左近衛丈部貞名等慰問請益僧兼令問第二舶逢危害之事草二日不發草三日早朝山頭望見泊舶處九隻船并不見便知夜頭同發西北風吹赤山東北隔海去百許里遙見山喚為青山三峯並連遙不炳然此乃秦始皇於海上修橋之處始皇又於此山向東見蓬萊山瀛山胡山便於此死其時麻鞋今見在矣見舊老説便得知之三僧為向天台忘歸國之意留在赤山院每問行李向南去道路絶遠聞噵向北巡禮有五臺山去此二千餘里計南遠北近又聞有天台宗和尚法號志遠文鑒座主並天台玄素座主之弟子今在五臺山修法花三昧傳天台教迹北臺在宋谷蘭若先修法花三昧得道近代有進禪師楚州龍興寺僧也持涅槃經一千部入臺山志遠禪師邊受法花三昧入道場求普賢在院行道得見大聖如今草年來也依新羅僧聖林林池本作琳和尚口説記之此僧入五臺及長安遊行得草年來此山院語話之次常聞臺山聖迹甚有奇特深喜近於聖境暫休向天台之議更發入五臺之意仍改先意便擬山院過冬到春遊行巡禮臺山草八日申時縣使竇文至等兩人將縣帖來其狀稱縣帖青寧鄉得板頭竇文至狀報日本國船上拋却人三人右撿案內得前件板頭狀報其船今月十五日發訖拋却三人見在赤山新羅寺院其報如前者依撿前件人既船上拋却即合村保板頭當日狀報何得經今十五日然始狀報又不見拋劫人姓名兼有何行李衣物并勘赤山寺院綱維知事僧等有外國人在都不申報事須帖鄉專老人勘事由限帖到當日具分折狀上如勘到一事不同及妄有拒注并追上勘責如違限勘事不子細元勘事人必重科決者開成四年七月草四日典王佐帖主簿副尉胡君直攝令戚宣員求法僧等便作狀報留却之由其狀如左日本國僧一人從小師二人行者一人留在山院事由右僧等為求佛法涉海遠來雖到唐境未遂宿願辭鄉本意欲巡聖國尋師學法緣朝貢使早歸不能相隨歸國遂住此山院已後便擬巡禮名山訪道修行但隨身物鐵鉢一口銅鐃二具銅瓶一口文書草餘卷遮寒衣裳等更無別物今蒙縣司勘問具事由如前牒件狀如前謹牒開成四年七月草日日本國僧圓仁狀帖從僧惟正僧惟曉行者丁雄萬奉帖青寧鄉赤山院狀上勘日本國僧人船上不歸事由等狀右日本國僧圓仁小師惟正惟曉行者計四人口云遠聞重花興流佛教故來投學聖教擬次尋名山聖迹巡禮諸方緣時熱且在山院避熱待時涼即便行遂不早早字或得字歟縣司狀狀下一字缺恐脫者字惟悉察其僧等緣身衣鉢更無別物如通狀後不子細法清等虛妄之過謹具狀上事由如前開成四年七月日赤山院主僧法清狀八月十三日聞相公已下九隻船在青山浦更有渤海交關船同泊彼浦從彼有人來報縣家去未詳虛實所以然者九隻船從此赤山浦發後西北風連日常吹于今猶有更有何所障不發去但應是人虛傳十五日寺家設餺飩餅食等作八月十五日之節斯節諸國未有唯新羅國獨有此節老僧等語云新羅國昔與渤海相戰之時以是日得勝矣仍作節樂而喜儛永代相續不息設百種飲食歌儛管絃以晝續夜三箇日便休今此山院追慕鄉國今日作節其渤海為新羅罰才有一千人向北逃去向後却來依舊為國今喚渤海國之者是也十六日為惟正惟曉始讀因明論疏青州都督府管內有四箇州萊州登州淄淥州淥字衍合青州為四并山東道登州四縣牟平縣文登縣蓬萊縣黃縣黃下池本有緑字非也蓬萊縣在州下今此山院是文登縣清寧鄉赤山村內清寧鄉南極望海有莫耶嶋是吳干將作劒之處當在赤山東南隔以小海從赤山北向東轉去陸路得到九月大一日己卯問録往臺山行李州名里數過八箇州到五臺山計二千九百九十來里從赤山村到文登縣百三十里過縣到登州五百里從登州行二百草里到萊州從萊州行五百里到青州過青州行一百八十里到淄州從淄州到齊州一百八里過齊州到鄆州三百里從鄆州行過黃河到魏府一百八十里過魏府到鎮州五百來里從鎮州入山行五日約三百里應到五臺山依新羅僧諒賢口説記之三日午時縣使一人將縣帖來其帖文如左縣帖青寧鄉先得狀在赤山寺院日本國船上拋却僧三人行者一人右撿案內得狀稱前件僧等先具事由申上訖恐後州司要有追勘狀請帖海口所由及當村板頭並赤山寺院綱維等須常知存亡請處分者奉判準狀帖所由者依撿前件人事須帖海口所由告報及綱維等須常知存亡如已後州司追勘稱有東西不知去處追必重科決仍限帖到當日告示畜畜恐審字取狀州狀上者開成四年八月十三日典王佐帖主簿副尉胡君直攝令戚宣員司功先在青寧鄉赤山寺院日本國船上拋却僧三人行者一人右件僧等先申州申使訖恐有東西去八月十四日帖赤山寺院並村保板頭海口所由等須知存亡尋問本鄉里正稱村正談亶拋却帖至今都無狀報其談亶見在伏請處分牒件狀如前謹帖開成四年九月日典王佐牒青村正狀一日員一日池本作宣日本國僧圓仁等狀上奉帖勘問拋却在赤山院日本國僧三人行者一人東西存亡事由狀右僧等為慕佛法權住山院已得已得二字恐衍穩善欲擬便出遊禮諸處緣時臨寒未有東西在此山院過冬到春巡禮名山訪尋聖迹僧等情願狀報先了今蒙帖勘東西存亡謹具事由狀上如前牒件狀如前謹牒開成四年九月三日日本國僧圓仁等帖十二日午時雲雷雹雨五更之後龍相鬪鳴雹雨交下電光紛耀數尅不息到曉便止朝出見之氷雹流積三四寸許凝積如雪老僧等云古來相傳此山多有龍宮祠部牒上都章敬寺新羅僧法清右請唯唯恐準字格所在隨緣頭陀牒得前件僧狀稱本心入道志樂頭陀但是名山歸心禮謁經行林下所在尋師學迦葉之行門進修佛理請準準各本作唯準唯屢誤乾𠃵恐衍元和元年四月十二日勑三藏僧般若力奏弟子大念等請頭陀奉依釋教準勑修行所在頭陀勿虧聖典但為持念損心近加風疾發動無恆藥餌之間要須市易將息今欲往諸山巡禮及尋醫療疾恐所在關戌城門街鋪村坊佛堂山林蘭若州縣寺舍等不練練同揀下同行由請給公驗者付庫撿得報勑內名同者謹撿格僧尼有能行頭陀者到州縣寺舍任安置將理不得所由恐動者僧法清請頭陀撿勘同同恐問字者準狀牒故牒元和二年二月日令吏潘倫牒主事趙參員外郎周仲孫日本國求法僧等牒當寺僧圓仁從僧惟正惟曉行者丁雄萬請寺帖報州縣給與隨緣頭陀公驗牒僧等本意欽慕釋教遠投仁境歸心聖迹志樂巡禮見説臺山等諸處法教之根原大聖之化處西天高僧踰險尋訪漢地名德在茲得道矣僧等之仰彼芳猷偶屬良緣幸到聖國今欲往赴諸處以遂舊情恐在道路不練練揀同行由傳聞般若三藏為頭陀僧奏請公驗準勑修行起昔續今也伏望當寺準當國格例帖報州縣請經公驗然則綱維弘絡絡或給字池本作法之芳聲遠振海外催勸之恩賴快揚佛日不任思誠之至具狀如前牒件狀如前謹牒開成四年九月草六日日本國延曆寺求法僧僧下池本有圓仁牒三字草三日據唐曆立冬自後寒風稍切草七日下雪自九月中旬已來寒風漸起山野無青草澗泉有凍氣草八日始當院收蔓菁蘿蔔院中上座等盡出揀葉如庫頭無柴時院中僧等不論老少盡出擔柴去十月一日始霜下五日泉氷十日夜半聞群鴈聲空飛南去十五日夜半月蝕院裏師盡出作聲打板五更之初月色漸明十一月一日赴新羅人王長文請到彼宅裏喫齋齋後共數僧等到寺院莊宿一宵十二日晚頭歸到山院九日冬至節衆僧相禮辰時堂前禮佛十六日山院起首講法花經限來年正月十五日為其期十方衆僧及有緣施主皆來會見就中聖琳和尚是講經法主更有論義二人僧頓證僧常寂男女道俗同集院裏白日聽講夜頭禮懺聽經及次第僧等其數卌來人也其講經禮懺皆據新羅風俗但黃昏寅朝二時禮懺且依唐風自餘并依新羅語音其集會道俗老少尊卑惣是新羅人但三僧及行者一人日本國人耳十七日齋前由當院講起且出寺往南山法空闍梨院赤山院綱維馳書請歸不許住南院更修狀請十五日暇綱維維下東本更有綱恐衍僅許草二日緣事不穩歸於本院赤山院講經儀式辰時打講經鍾打驚衆鍾訖良久之會大衆上堂方定衆鍾鍾池本作了講師上堂登高座間大衆同音稱嘆佛名音曲一依新羅不似唐音講師登座訖稱佛名便停時有下座一僧作梵一據唐風即云何於此經等一行偈矣至願佛開微密句大衆同音唱云戒香定香解脫香等頌梵唄訖講師唱經題目便開題分別三門釋題目訖維那師出來於高座前談申會興之由及施主別名所施物色申訖便以其狀轉與講師講師把麈尾一一申舉施主名獨自誓願誓願訖論義者論端舉問舉問之問講師舉麈尾聞問者語舉問了便傾麈尾即還舉之謝問便答帖問帖答與本國同但難儀式稍別側手三下後申解白前卒爾指申難聲如大瞋人盡音呼諍講師家家恐蒙難但答不返難論義了入文談經講訖大衆同音長音讚嘆讚嘆語中有迥向詞講師下座一僧唱處世界如虛空偈音勢頗似本國講師升禮盤一僧唱三禮了講師大衆同音出堂歸房更有覆講師一人在高座南下座便談講師昨所講文至如會義句講師牒文釋義了覆講亦讀讀盡昨所講文了講師即讀次文每日如斯新羅一日講儀式辰時打鍾長打擬了講師都講二人入堂大衆先入列坐講師讀師入堂之會大衆同音稱嘆佛名長引其講師登北座都講登南座了讚佛便止時有下座一僧作梵云何於此經等一行偈也作梵了南座唱經題目所謂唱經長引音多有屈曲唱經之會大衆三遍散花每散花時各有所頌唱經了更短音唱題目講師開經目三門分別述經大意釋經題目竟有維那師披讀申事興所由其狀中具載無常道理亡者功能亡逝日數知登州刺史姓烏名角時人喚烏使君有三諱字明綺給也明日即噵來日青州節度使姓壽時人喚壽尚書無諱字也新羅誦經儀式大唐喚作念經打鍾定衆了下座一僧起打槌唱一切恭敬敬禮常住三寶次一僧作梵如來妙色身等兩行偈音韻共唐一般作梵之會一人擎香杯歷行衆座之前急行行便休大衆同音誦摩訶般若題數十遍也有一師陳申誦經來由了大衆同音誦經或時行經本或時不行經本念經了導師獨唱歸依佛歸依法歸依僧次稱佛菩薩號導師唱云南無十二大願大衆云藥師琉璃光佛導師云南無藥師也大衆同音云琉璃光佛導師云南無大慈悲也大衆同音云觀世音菩薩餘皆如此禮佛了導師獨結願回向回向稍長回向之後導師云發心大衆同音亦云發心次導師唱發願已竟頂禮三寶次施主擎施物坐導師與呪願便散去草九日晚頭此新羅院佛堂經藏點燈供養別處不點燈每房竈裏燒竹葉及草從堗出煙黃昏初夜後夜寅朝禮佛後夜諸沙彌小師等巡到諸房拜年賀年之詞依唐風也開成五年庚申正月一日戊寅早朝禮佛了不相拜謁直歸自房喫粥之後堂前禮佛行道禮佛了便於堂前衆僧同禮拜更互參差不依次第正月十五日得當年曆日抄本寫著如左開成五年曆日干同支同納音本凡三百五十五日合在乙巳巳東本作乙今從池本乙巳恐己巳誤上取土修造大歲申大將軍在午大陰在午戈戈即歲之略下同德在中中恐申字殘恐申酉歟戈形在寅歲破在寅戈𭣦在未黃幡在辰豹尾在戌蠶宮在巽右件曆日具注勘過此日山院法花會畢集會男女昨日二百五十人今日二百來人結願已後與集會衆授菩薩戒齋後皆散去赤山法花院常住僧衆及沙彌等名僧曇表僧諒賢僧聖琳僧智真僧軌範禪門僧頓證寺主明信去年典座惠覺禪門修惠法清去年院主金政上座真空法行禪門忠信禪門善範沙彌道真去年直戈師教詠賢信惠住日本國六年融洛師俊小善懷亮智應尼三人老婆二人日本國求法僧圓仁牒當院請遊禮諸處尋師訪道牒圓仁幸接仁德住院穩善鴻洛洛恐濟誤高深難以酬謝感愧之誠在物難喻然以歲陰推遷春景漸暖今欲出行巡禮諸處訪尋佛教伏請處分牒件狀如前謹牒開成五年正月十九日日本國求法僧圓仁牒草日當院綱維更作一狀差惟正及院家使報當州軍事押衙張詠宅去求法僧別作一狀同送押衙其狀如左展奉羊羊恐年字開春景惟新伏惟押衙尊體動止萬福即此圓仁蒙推免先日伏蒙慈流及及或存問殊慰勤慕無任感慶恨恨東本作限以豫豫池本作懷或旅字歟情不獲披豁欣之誠何以為喻圓仁欽慕釋教淹留唐境今欲往赴諸方尋訪聖迹伏仰洪仁事幸垂恩