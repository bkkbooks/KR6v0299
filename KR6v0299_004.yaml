body:
  text: 會昌三年六月三日軍容辭官歸宅向前五六度進表請坐家勑不放重進表請五月有勑放歸家仍便般般同搬家具至三日軍容辭官歸宅勑除新中尉以內長官特進揚欽義任左神策護軍中尉左街街東本作衛非也功德使當日便上任十一日今上德陽日內裹設齊兩街大德及道士御前論義每街停止十二員大德功德使帖巡院令簡擇大德每街各七人依舊例入內大大東本無德對道士論義道士二人勑賜紫衣而大德惣不得著紫又德陽日前十五日內宮內諸司各赴諸寺設齊獻壽太子詹事韋宗卿撰涅槃經疏草卷進今上覽已焚燒經疏勑中書門下令就宅追索草本燒焚其勑文如左勑銀青光祿大夫守太子詹事上柱國花陰縣開國男食邑三百戶韋宗卿參列崇斑合遵儒業溺於邪說是扇妖風既開詃惑之端全戾典墳之旨簪纓之內頽靡何深況非聖之言尚宜禁斥外方之教安可流傳雖欲色容恐傷風俗宜從左官猶謂寬恩可任成都府尹馳驛發遣太子詹事韋宗卿進佛教涅槃經中撰成三德草卷奉勑大圓伊字鏡略草卷具已詳覽佛本西戎之人教張不生之說孔乃中士之聖經聞利益之言而韋宗卿素儒士林衣冠望族不能敷揚孔墨翻乃溺信浮屠妄撰胡書輒有輕進況中國黎庶久染此風誠宜共遏迷聾使其反朴而乃集妖妄轉惑愚人位列朝行豈宜不不東本無自愧其所進經內中已焚燒訖其草本委中書門下追索焚燒不得傳之於外會昌三年六月十三日下草三日仇軍容薨勑送孝衣草五日勑斬仇軍容孔目官鄭中丞張端公等四人及男女奴婢等盡煞破家草七日夜三更東市失火燒東市曹門已西十二行四千餘家官私錢物金銀絹藥等惣燒盡草八日三更內裏失火燒神濃濃池本作農寺草九日長樂門外失火燒草場向前有勑焚燒內裏佛經又埋佛菩薩天王像等向後二處失火其後又東市二夜數處失火日本國僧圓仁弟子僧惟正惟曉行者丁雄萬房內除四人外更無客僧及沙彌俗客等有奉寺家牒稱奉使司文文東本似久恐文字池本作之字帖切不得停止保外及沙彌俗客等如後有人糾告房裏隱藏情求重罪伏請處分牒件狀如前謹牒會昌三年七月二日日本國僧圓仁牒弟子僧惟曉從去年十二月一日病至今年七月都計八箇月病會昌三年當日本承和十年七月草四日夜二更盡身亡日本國僧圓仁弟僧惟曉右弟子惟曉久患疾病以昨夜二更盡身亡謹具狀報狀請處分牒件狀如前謹牒會昌三年七月草五日日本國僧圓仁牒日本國僧圓仁弟子僧惟曉身亡右弟子僧惟曉房內除緣身衣物外更無錢物匹段斛斗等如後有人糾告稱前件亡僧房內別有錢物等師主僧圓仁及同學僧惟正請蒙科罪謹具如前伏請處分牒件狀如前謹牒會昌三年七月草五日日本國僧圓仁謹牒日本國僧圓仁弟子亡僧惟曉右弟子僧惟曉身亡竝無錢買地伏乞三綱和尚慈悲賜與一墓地埋殯謹具如前伏請處分牒件狀如前謹牒會昌三年七月草五日日本國僧圓仁謹牒綱維判與一墓地草七日殯葬於春明門外鎮國寺東頭資聖寺瓦窯北角地草九日覆墓同院僧惠見僧宗信專勾當葬事淨土院僧懷安設送殯人供送殯僧思𮗿僧敬中僧懷約僧惠見僧宗信當寺內供奉三教講論大德知玄法師遣同學僧可從令送殯葬送殯出城人僧俗共計十餘人於墓殯前請七僧稱名十念呪願八月十三日為求歸國投左神策軍押衙李元佐是左軍中尉親事押衙也信敬佛法極有道心本是新羅人宅在永昌坊入北門西回第一曲傍墻南壁上當護國寺後墻西北角到宅相見許計會也十五日修惟曉三七日齊此夜月蝕草九日五七日齊九月十三日七七日齊每度請內供奉附附駙同馬拙琮除淮南節度使仍判天下鹽鐵使淮南節節下恐脫度字使僕射李紳勑追追或送字歟入京拜相河北道路府節度使劉從簡叛勑下諸州府抽兵馬都五萬軍打路府入界不得仍在界首相守供軍每日用草萬貫錢諸道般載不及遂從京城內庫般糧不絶路府留後院在京左街平康坊路府押衙疆孫在院知本道事勑令捉其人走脫不知去處諸處尋捉不獲唯捉得妻兒女等斬煞破家有人告報路府留後押衙疆孫剃頭今在城僧中隱藏仍勑令兩街功德使疏理城中等僧公案無名者盡勒還俗遞遞東本在俗上今改之下文有此句池本無遞字歸本貫諸道州府亦同斯例近住寺僧不委來由者盡捉京兆府投新裹頭僧於府中打煞三百餘人其走藏者不敢街裏行也回鶻國兵馬大敗本道便聞奏諸州府兵惣歸本道訖十一月三日惟曉百日齊十二月得楚州新羅譯語劉慎言書云天台山留學圓載闍梨稱進表遣弟子僧兩人令歸日本國其弟子等來到慎言處覓船慎言與排比一隻船差差東池兩本作著差著多誤人發送訖今年九月發去者會昌四年歲次甲子二月越州軍事押衙姓潘因使進藥將圓載闍梨書來書云緣衣糧罄盡遣弟子僧仁好等兩人往本國請衣糧去者潘押衙云載上人欲得入城來請得越州牒付余令進中書門下余近日專候方便入中書送牒宰相批破不許入奏例上人事不成也三月勑下朕欲駕幸東京仍曉示百寮如有朝臣諫者誅身滅族勑不許供養佛牙又勑下云代州五臺山及泗州普光王寺終南山五臺鳳翔府法門寺寺中有佛指節也竝不許置供及巡禮等如有人送一錢者脊杖二拾如有僧尼等在前件處受一錢者脊杖二拾諸道州縣應應池本作聽有送供人者當處捉獲脊杖二拾因此四處靈境絶人往來無人送供准勑勘責彼處僧人無公驗者并當處打煞具姓名聞奏恐路府留後押衙作僧潛在彼處也宰相李紳李德裕奏停三長月作道士教新定三元月正月上元六月中元十月下元唐國恆式三長月不許煞命今上則不然也為破路府勑召道士八十一人又於內裏令作九天道場於露處高疊八十張床鋪設精彩十二時行道祭天尊乾脯酒肉用祭火羅天四月一日起首直到七月十五日為終期其道場不在屋舍內於露庭中作法晴明即日炙炙東本不明或炎字池本缺雨下即霖身八十一人中多有著病者也今上偏信道教僧嫉佛法不喜見僧不欲聞三寶長生殿內道場自古已來安置佛像經教抽兩街諸寺解持念僧三七人番次差入每日持念日夜不絶今上便令焚燒經教毀折佛像起出僧衆各歸本寺於道場內安置天尊老君之像令道士轉道經修練道術國風每年至皇帝降誕日請兩街供奉講論大德及道士於內裏設齊行香請僧談經經下東本有對字釋教道教對論義今年只請道士不請僧也看其體色從今已後不要僧人入內道士奏云孔子說云李氏十八子昌運方盡便有黑衣天子理國臣等竊惟黑衣者是僧人也皇帝受其言因此憎嫌僧尼意云李字十八子為今上當第十八代恐李家運盡便有黑衣奪位歟功德使帖諸寺准勑不許僧尼街裏行犯鍾聲若有出者事須諸寺鍾聲未動已前各歸本訖又不許別寺宿若有僧尼街裏行犯鍾聲及向別寺宿經一夜者科違勑罪從前不許午後出寺今不許犯鍾聲二月駕幸右街金仙觀是女觀觀中有女道士甚有容天子召見入意勑賜絹一千匹遂宣中官令修造觀便通內特特東本作時造金仙樓其觀本來破落令修造嚴麗天子頻駕幸向後駕幸左街興唐觀是道士觀又賜千匹特令修造銅鑄聖容作聖容當莊嚴奇絶城中諸寺七月十五日供養諸寺作花蠟花鉼鉼池本作餅假花果樹等各競奇妙常例皆於佛殿前鋪設供養傾城巡寺隨喜甚是盛會今年諸寺鋪設供養勝於常年勑令諸寺佛殿供養花藥等盡般到興唐觀祭天尊十五日天子駕幸觀裏召百姓令看百姓罵云奪佛供養祭鬼神誰肯觀看天子怪百姓不來諸寺被奪供養物恓惶甚也打路府兵入他界不得但在界首頻有勑催怪無消息征兵多時都不聞征罰者何被兵衆驚懼捉界首牧牛兒耕田夫等送入京妄稱捉叛人來勑賜封刀於街衢而斬三段兩軍兵馬圍著煞之如此送來相續不絶兵馬尋常街裏被斬尸骸滿路血流濕土為泥看人滿於道路天子時時看來旗鎗交橫遼亂見說被送來者不是唐叛人但是界首牧牛耕種百姓枉被捉來國家兵馬元來不入他界恐王怪無事妄捉無罪人送入京也兩軍健兒每斬人了割其眼肉喫諸坊人皆云今年長安人喫人勑追追或送字歟下文作送池本作迎淮南節度使杜附馬入京宰相李紳情願作淮南使依敕依敕東本倒置便送節度杜附馬入京得對日日東本作曰拜相仍判鹽鐵度支百寮盡怪自古已來未曾有附馬拜相之例國風宰相賜與平章事李德裕奏云附馬拜相不合乘輿勑意從容未有詔旨附馬猶不得輿也打路府兵衆每日用二十万貫錢諸州般載不及又京城官庫物欲盡有勑分缺百司判錢隨官尊卑納錢多少用充打路府兵糧諸道州府官皆同此例又勑下令毀折天下山房蘭若普通佛堂義井根邑齊堂等未滿二百間不入寺額者其僧尼等盡勒還俗充入邑役具令分折聞奏且長安城裏坊內佛堂三百餘所佛像經樓等莊嚴如法盡是名工所作一箇佛堂院敵敵池本作適相通外州大寺准勑併除罄盡諸道天下佛堂院等不知其數天下尊勝石幢僧墓塔等有勑皆令毀折勑召國子監學士及天下進士及第身有學者令入道教未曾有一人入其道者也今年已來每雨少時功德使奉勑帖諸寺觀令轉經祈雨感得雨時道士偏蒙恩賞僧尼寂寥無事城中人㗛曰祈雨即惱亂師僧賞物即偏與道士八月中太后薨郭氏太和皇后和皇二字池本無緣太后有道心信佛法每條疏僧尼時皆有詞諫皇帝令進藥酒而藥煞矣又義陽殿皇后蕭氏是今上阿娘甚有容今上召納為妃而太太池本作皇后不奉命天子索弓射煞箭透入胸中而薨大原府兵馬三千人三年在回鶻界守捉今年打回鶻破歸至府未經數日未共親情相看節度使便差發遣打路府去軍健等再三辭訴云三年打回鶻辛苦疲乏近到家鄉未見親情父母等伏請差別兵馬者節度使不肯仍三千人一時恨迫迫不明池本作返城相戰節度使聞奏捉送京城敕使兵馬迎入具間其人說打回鶻功能不合煞之具録事由聞奏勑不依奏勑賜封刀令斬三段段東國本作假於東市北街堆頭斬之從路府捉來來下東本更有來字一字衍健兒等常於此處斬也九月路府大敗仍捉得彼處押衙大將等送到京城斬煞六七度也後斫叛主劉從簡頭來三鋒鎗頭穿之杆杆東本作杵高三丈餘上頭題名先繞兩市進入內裏天子坐銀臺門樓上看大㗛曰照儀已破今未除者准是天下寺舍兼條疏僧尼都未了卿等知否數十日後准勑進路府劉家資財錢物寶珮家具等每度七八乘金裝車載送到城中進納內庫仇軍容兒常侍知內省事喫酒醉顛觸誤龍顏對奏云天子雖斯斯東本作則尊貴是我阿爺冊立之也天子怒當時打煞勑令捉其妻女等流出於外削髮令守陵墓仍仰中官收納家中物錢𤉢牙滿屋珠玉金銀等盡皆滿庫錢帛匹段不知數每日卅乘車般入內庫一月之內般運不盡自餘寶珮奇異之物不可計數皇帝到內庫看拍手怪云朕庫不曾有此等物諸高班低頭不語道士趙歸真等奏云佛生西戎教說不生夫不生者只是死也化人令歸涅槃涅槃者死也盛談無常苦空殊是妖怪未涉無為長生之理太上老君聞生中國宗平太羅之天逍遙無為自然為化飛練仙丹服乃長生廣列神府利益無疆請於內禁築起仙臺練身登霞逍遙九天庶福聖壽永保長生之樂云云皇帝帝下東本有宜字依奏奏字東本無勑令兩軍於內裏築仙臺高百五十尺十月起首每日使左右神策軍健三千人般土築造皇帝意切欲得早成每日有勑催築兩軍都虞侯把棒檢校皇帝因行見問內長官曰把棒者何人長官奏曰護軍都虞侯勾當築臺皇帝宣曰不要儞把棒勾當須自擔土便交般土後時又駕築臺所皇帝自索弓無故射煞虞侯一人無道之極也從去年來兩街講說絶也自登位已後好出駕幸四時八節之外隔一二日便出每行送仰諸寺營辦床席氊毯花幕結樓鋪設碗疊臺盤椅子等一度行送每寺破除四五百貫錢不了敕令毀折天下小寺經佛般入大寺鍾送道士觀其被折寺僧尼粗行不依戒行者不論老少盡勒還俗遞歸本貫充入邑伇年老身有戒行者配大寺雖有戒行若是少年者盡勒還俗俗下池本有遞字歸本貫城中毀拆卅三處小寺條疏僧尼一准勑文也十一月出勑云緣照儀寇賊已破朕取來年正月更拜南郊仍仰百寮曉示諸職早令排比者百司准勑修理橋道街路不通人馬車牛城南郊壇特唐修造於壇四面花幕屈張張東本作帳義同樓閣城營一切取城中內裏之樣百司𢛌𢛌不已會昌五年歲次乙丑正月三日拜南郊儀仗威儀一似元年不許僧尼看又舊有條疏不許僧尼午後出寺又不許犯齊鍾及向別寺宿所以僧人不得看南郊也築仙臺欲成就勑令道士飛練仙丹道士長趙歸真奏云有一般仙藥此國全無但於土蕃國有此藥臣請自向土蕃採此藥兩軍中尉不肯仍奏云差別人去即得然趙歸真求仙之長不合自去敕依中尉奏不放去有勑問求仙用何藥具色目申奏者道士奏藥名目李子衣十斤桃毛十斤生雞膜十斤龜毛十斤兔角十斤等勑令於市藥行覓盡稱無因此通狀被打煩惱不徹遂於諸處求亦不可得寒食從前已來准式賜七日暇築臺夫每日三千官健寒食之節不蒙放出怨恨把把或抱字器伏三千人一時銜聲皇帝驚怕每人賜三匹絹放三日暇三月三日築臺成就進仙臺人君上臺兩軍中尉諸高班道士等隨皇帝上兩軍中尉語趙歸真曰今日進仙臺了不知公等求得仙否歸真低頭不語見說仙臺高百五十尺上頭周圓與七間殿基齊上起五峯樓中外之人盡得遙見孤山高聳般終南山盤石作四山崖龕窟盤道尅飾精妙便栽松柏奇異之樹可笑稱意便有敕令道士七人於臺上飛練求仙又敕下天下寺舍不許置莊園莊又令勘撿天下寺舍奴婢多少兼錢物斛斗匹段一一詣詣恐指字實具録令聞奏城中諸寺仰兩軍中尉勘撿諸州府寺舍委中書門下撿勘且城中寺舍奴婢三等收身有藝業者業者東本倒置軍裏收無業少壯者貨賣老弱者填宮奴婢憂哭父南子北今時是也功德使帖諸寺奴婢五人為一保保中走失一人者罰二千貫錢諸寺錢物兼貨賣奴婢贖贖東本作續恐非錢竝皆官收擬充百寮祿䉼又敕令天下諸寺僧尼年卌已下盡勒還俗遞歸本貫人主又上仙臺敕令音聲人推落左軍中尉音聲人不肯推之勑問朕交推如何不奉音聲人奏云中尉是國家重臣不敢推下天子怒打脊二十棒在臺上怪道士云朕兩度上臺卿等未有一人登仙者何意道士奏曰緣國中釋教與道教竝行里氣越著㝵於仙道所以登仙不得人君宣兩街功德使云卿知否朕若是何師盡不要也數日後勑下天下僧尼五十已下盡勒還俗遞歸本貫訖後有敕云天下僧尼五十已上無祠部牒者盡勒還俗遞歸本貫有祠部牒者委當州縣磨勘差殊者盡勒還俗遞歸本貫城中僧尼委功德使准此例牒疏牒疏與條疏同者中書門下准勑牒諸道訖城裏僧尼功德使牒疏甚嚴切且勘定無祠部牒僧尼之數具録開奏便帖諸寺合般家具其有祠部牒者惣索將入軍裏磨勘其祠部牒上微有點污處及生年與功德與功德使之義案入保牒差殊者盡入還俗之數不差殊者便收入軍案不出遂使諸寺僧尼同無告身也大家皆云不還告身者不留僧尼之謀樣收寺奴婢錢物者毀折寺舍之兆也皇帝宣云般士土東本作云池本作出宜作土字築臺搬土之義之坑極深令人恐畏不安朕欲得填之事須祭臺之日假噵設齊慶臺惣追兩街僧尼集左軍裏斬其頭用填坑者撿樞卜密奏云僧尼本是國家百姓若令還俗各自營生於國有利請不用追入請仰本司盡勒還俗遞歸本貫充入邑伇者皇帝點頭良久乃云依奏者諸寺僧尼亦聞斯事魂魄失守不知所向圓仁通狀狀東本作收非也請情願還俗却歸本國功德使收狀未有處分但頻有牒來安存功德使帖諸寺准勑條疏不許僧尼出寺事須差家人五六人守寺門輒不得放僧尼出寺如有違越者綱維三老及典直并守門人各決脊杖二十其出寺僧尼當時處死者左右神策軍者天子護軍也每年有十萬軍自古君王頻有臣叛之難仍置此軍已來無人敢奪國位勑賜印每中尉初上時准勑出兵馬迎印別行公事不屬南司今年四月初有勑索兩軍印中尉不肯納印有勑再三索勑意索護軍印付中書門下合掌相管兩軍事一切擬令取相處分也左軍中尉即許納印而右軍中尉不肯納印遂奏云迎印之日出兵馬迎之納迎迎恐印誤之日亦須動兵馬納之中尉意勑若許即因此便動兵馬起異事也便仰所司暗排比兵馬人君怕且縱不索見說功德使條疏僧尼還俗之事商議次第且令卅已下還俗訖次今令五十已上上東國本無還俗次令五十已上無祠部牒者還俗第三番令祠部牒磨勘差殊者還俗最後有祠部牒不差謬者盡令還俗即僧尼絶也斯之商議天下大同也緣准勑行故從四月一日起首年卌已下僧尼盡勒盡勒東本無還俗遞歸本貫每日三百僧還俗十五日年卌已下僧尼方盡從十六日起首五十已下僧尼還俗直到五月十日方盡也十一日起首五十已上無祠部牒者還俗前年已來牒疏僧尼即簡粗行不依本教者盡勒盡勒東本無還俗遞歸本貫今年不簡高行粗行不論驗僧僧東池兩本作增恐非也大德內供奉也但到次第便令還俗頻有敕問已還俗者多少未還俗者多少催進其數外國僧未入條疏之例功德使別聞奏取裁有勑云外國等若無祠部牒者亦勒還俗遞歸本國者西國北天竺三藏難陀在大興善寺南天竺三藏寶月兼弟子四人於中天成業竝解持念大法律行精細博解經論在青龍寺竝無唐國祠部牒新羅國僧亦無祠部牒者多日本國僧圓仁惟正亦無唐國祠部牒功德使准勑配入還俗例又帖諸寺牒云如有僧尼不伏還俗者科違勑罪當時決煞者聞此事裝束文書所寫經論持念教法曼茶羅等盡裝褁訖文書兼衣服都有四籠便買三頭驢待處分來心不憂還俗只憂所寫聖教不得隨身將行又勑切斷佛教恐在路諸州府撿勘得實科違勑之罪十三日使帖來當寺僧無祠部牒者卅九人數內有日本國僧兩人名名池本作右先還俗僧林宗信觀相議情願許相送到汴州州去京一千四百里見他殷重不阻其情也三綱三老等來相憂云違涉求法遇此王難應不免改服自古至今求法之人足足或定字歟有鄣難請安排也不因此難則無因歸國且喜將聖教得歸本國便合本願都維那僧法遇贈檀龕像一軀以宛歸國供養晚際辭一寺僧了便著俗衣十四日早朝入京兆府請公驗恐無公憑在路難為歟西國三藏等七人亦同在府請公驗府司判與兩道牒仰路次差人遞過然從會昌元年已來經功德使通狀請歸本國計百有餘度又曾屬數箇有力人用物計會又不得去今因僧尼還俗之難方得歸國一悲一喜左神策軍押衙銀青光祿大夫撿挍國子祭酒殿中監察侍御史上柱國李元佐因求歸國事投相識識東本作議傍注識來近二年情分最親客中之資有所闕者盡能相濟緣功德使無道心故咨歸國事不蒙縱許在府之間亦致飯食氈縟等殷勤相助十五日出府到萬年縣府家差人送到大理卿中散大夫賜紫金魚袋楊敬之曾任御史中丞令專使來問何日出城取何路去兼賜團茶一串在縣中修狀報謝內供奉談論大德去年歸鄉不得消息今潛來褁頭隱在楊卿宅裏令童子清凉將書來書中有潛別之言甚悲慘矣當寺講維摩百法座主雲栖講涅槃經座主靈莊先卌已下例還俗訖今褁頭著俗衣來縣中相看李侍御與外甥忨忨恐阮十三郎同來相問一頭勾當行李來去與買氈帽等又入寺撿挍文書籠馱等雲栖座主亦勾當籠馱相共排比恐不得隨身將去晚際出城縣司與差人遞送照應縣去去城八九十里李侍御栖座主同相送到春明門外喫㭟楊卿差人送書來云弟子書狀五通兼手書付送前路州縣舊識官人處但將此書通入的有所益者織方郎中賜緋魚袋楊魯士前曾相奉在寺之時殷勤相問亦曾數度到寺撿挍曾施絹褐衫褌等今交郎君將書來送路絹二匹蒙頂㭟二斤團㭟一串錢兩貫文付前路書狀兩封別有手札市施主楊差人送來絹一匹褐布一端錢一千文宛路上用自餘相送人不能具録竝於春明門外拜別云留斯斯恐期字下文有此語分矣楊卿使及李侍御不肯歸去相送到長樂坡頭去城五里一店裏一夜同宿語話李侍御送路物少吳綾十匹檀香木一檀龕像兩種種池本作和香一瓷瓶銀五股拔折羅一氈帽兩頂銀字金剛經一卷見內裏物也軟鞋一量錢二貫文數在別紙也惜別殷勤乃云弟子多生有幸得遇和上遠來求佛法數年供養心猶未足一生不欲離和上邊和上今遇王難却歸本國去弟子計今生應難得再見當來必在諸佛淨土還如今日與和上作弟子和上成佛時請莫忘弟子云云又云和上所著衲袈裟請留與弟子將歸宅裏終身燒香供養既有此言便以送之既既恐阮字十三郎亦同結緣至厚十六日早朝相別而發共唐僧十九人同行晚際到照應縣宿同行中有一僧生年草是長安城裏人父母兄弟姊妹今見在從少年入佛法在大薦福寺侍奉新羅僧為師匠因僧難因僧池本作僧因承接新羅僧名字得住寺官家隨其公驗遞向新羅國去在府之時百方作計申訴不免遞過親情啼哭街中相別遂被遞到照應縣同宿大家五更發其僧暗走脫而去同行盡不覺到縣明即知家丁三人中兩人分路覓去終日覓不見想知早到城裏家中隱藏縣司申府尋捉草二日過潼關是國城之咽喉也渭南縣花陰縣永寧縣皆有楊卿書狀竝通入訖六月一日到東都崔太傅宅送楊卿書太傅專使來傳語安存施絹一匹九日到鄭州刺史李舍人處有楊卿書任判官處亦有楊卿書將書入州見刺史及判官竝已安存存東本作在殷勤州長吏殿中監察侍御史賜紫金魚袋辛久昱在長安長供飯直情分甚殷勤去年得鄭州長吏赴任今在州相見悲喜交馳存問至厚便喚宅裏斷中歇息刺史施兩匹絹諸人皆云此處是兩京大路乞客浩汗浩池本作結恐非也行人事不辨若不是大官是尋常衣冠酢太來極是殷勤者即得一匹兩匹和上得兩匹是刺史殷重深也任判官施東本作夾纈一匹辛長史見來便交裁作褐衫齊後出州歸到宿處辛長史專使來施絹一匹襪肚一汗衫褐衫書一中云續到拜辭請暫時待者緣縣家已差人貧祥不及相待便發行十五里回頭望西見辛長史走馬趁來三對行官遏道走來遂於土店裏任任池本無喫㭟語話多時相別云此國佛法即無也佛法東流自古所言願和上努力早建建恐達字本國弘傳佛法弟子多幸頂謁多時今日已別今生中應難得相見和上成佛之時願不捨弟子十三日到汴州節度副使裴郎中處有楊郎中書狀竹兵馬使處有楊卿書并通送訖斐郎中存問殷勤便差行官一人專勾當般般恐船字發送兵馬使不在州不得相見斐郎中雇船直到陳留縣西泊上待縣牒未來緣官私雜載船不及相待前發去汴河路次每縣不免自雇船汴州已來傍河路次人心急惡不善能似所喫汴河水之急流渾濁也京牒不說程糧在路自持糧食草二日到西州州管在徐節度府泗州普光王寺是天下著名之處今者莊國國恐衍園錢物奴婢盡被官家收撿寺裏寂寥無人來往州司准勑欲擬毀折草三日渡淮到煦眙縣去楚州望東二百里本意擬從此到楚州覓船過海縣家剛剛池本作對遞向揚州去通狀申論縣令不與道理不免向揚州去從煦眙縣至揚州九驛無水路文書籠馱每驛貨驢之在路見斐舍人曾任海州刺史今春追入貶任台州長吏更有翰林博士貶下為外州司馬因相見云五月草九日離長安在城之時城中僧尼還俗已盡准勑每寺留三綱勘撿錢物待官家收寺錢物已後擬令還俗云云諸寺見下手毀折章敬青龍安國三寺通為內園云云草八日到揚州見城裏僧尼正裹頭遞歸本貫擬折寺金錢物莊園鐘等官家收撿近勑有牒來云天下銅佛鐵佛盡毀碎稱量斤兩委鹽鐵司收管訖具録聞奏者紅都縣差人遞到江陽縣用物請往楚州縣家便遞向楚州去經高郵寶應兩縣七月三日得到楚州先入新羅坊見惣管當州同十將薛新羅譯語劉慎言相接存問殷勤文書籠子船上著譯語宅便入山陽縣通狀具申本意日本國朝貢使皆從此間上船過海歸國圓仁等遞到此間歸國請從此間過海縣司不肯乃云當州未是極海之處是准勑遞過不敢停留事須遞到登州地極之處方可上船歸國者新羅譯語劉慎言自到縣用物計會木案即計與縣令肯乃云此間是文法之處兼在李紳相公管內准勑遞過之人兩日停留便是違勑之罪云云縣司不肯與道理薛大使劉譯語更入州計會又不肯兩日之間百計不成也須遞過定也山陽縣司不忍劉譯語苦囑左右謀計不得乃云和上欲得向南去即向南遞去欲得向北去即向北遞去若令停泊此間覓船即縣司力不及也言窮無可申論仍請往登州登州是唐國東北地極去楚州一千百餘里縣家出牒差人遞向登州去薛大使劉譯語意欲得鈎留在新羅坊裏置從此發送歸國緣縣不肯遂苦鈎留不得也五日曉際共家丁丁東池兩本作下據下文改之到劉譯語宅譯語以三百文與家丁私計會云和上等正熱之時遠涉道路見已困乏慎言欲得安置宅裏令兩三日歇息公等且歸本處八日早來家丁丁東本作下受囑歸家大使譯語竭力將發發東本作養非也見道從楚州至登州道路盡是山坂曠野草木高深蚊虻如雨終日踰山行野村柵迢遠希見人家人心麁惡行七八十里方有一二家令人恐畏若將文書籠子隨身行將謂是物被人驚損恐不得今又勑斷佛教切令禁斷向北州縣人心麁惡見將佛教像隨身行的應作障礙罪及違勑仍共譯譯東本作劉語商量從京將來聖教功德幀及僧服等都四籠子且寄著譯語宅裏分付譯語囑令撿挍苦囑云若到登州得停泊即將書請來未間在長意撿挍勿令漏失云云譯語仍領訖持地持或特字排比行李薛大使施三兩襪劉譯語九匹絹新羅刀子十枚襪五兩自餘資供不少淮南道楊楚州縣人心奸惡大難把捉見譯語有人報云同從日本國過來船兩隻到江南常州界著岸去此間三千餘里擬賣却船別雇唐船載物來是恐會昌三年送圓載闍梨弟子等船令却回歟今欲擬差人探去又日本國惠萼闍梨梨下恐脫弟字子會昌二年禮五臺山為求五臺供就李驎驎下文作鄰德船却歸本國去年年將供料到來今遇國難還俗見在楚州云云特問圓載上人消息無人知示八日發劉譯語有書狀付送登州已來路次鄉人所囑安存與作主人等事上船入淮九日齊時到漣水縣縣屬泗緣楚州譯語有書付送漣水鄉人所囑令安存兼計會留鈎之事仍到縣先入新羅坊坊人相見心不殷勤就惣管等苦覓識認每事難為隅隅恐遇字崔暈第十二郎曾為清海鎮兵馬使在登州赤山院時一度相見便書名留期云和上求法歸國之時事須將此名紙到漣水暈百計相送同往日本相斯斯恐期字之後其人又歸到新羅遇國難逃至漣水住今見便識情分不疏竭力謀停住之事苦覓識認管管上恐脫總字等俯仰計之仍作狀入縣見長官請停泊當縣新羅坊內覓船歸國長官相見哀恤喚祇承人處分令勾當㭟飯飲食且令將見長官問云新羅坊裏曾有相識否答曰緣開成四年日本國朝貢使從楚州發歸國時皆於楚州及當縣抽人的令有相識長官處分祇承人云領和上到新羅坊若人識認即分付取領狀來若無人認即却領和上來便共使同到坊內惣管等擬領別有專知官不肯所以不作領狀却到縣中長官判權於於東國兩本作在大善寺安置三日住歇崔十二郎供作主人得縣牒及遞送人向州發去崔十二郎雇船排比路糧垸疊菜蔬等一切周備便相別云弟子有心欲得留和上從此發送歸國緣衆人不肯及官家牒已了努努東本抹消之力不及不遂本心秋後自擬到登州界方冀相訪云云十五日到海州入縣通狀請暫停泊日本國朝貢使船此間著岸從此發歸本國圓仁等隨使來朝今歸本國節級級或度字遞到此間便是海岸伏乞暫停泊當州自覓舟船歸本國長官云近者新羅僧亦從京兆府遞來請於當州權泊使君不肯便遞過和上請停住事亦應難應難池本作難應然縣司不自由事須經使君通狀十六日入州刺史請從常常宜作當州歸國刺史不與道理仍判云准勑遞過州司不敢停留告知者十七日發從海州向北無水路雖傍海汙汙或行字歟而不見海終日過野便入山十八日到懷仁管海州人心孝順見客殷重等間相接縣司用心亦善草日發山野行草木高深希逢人終日上山入谷踏泥水辛苦無極草一日到莒縣管在密州縣司百姓心麁惡草六日到密州人心猛惡溫柔者稀八月二日到高密縣人心和軟六日到即墨縣營在萊州人心孝順能安存客十日到昌陽縣萊州管人心好十六日到登州見蕭端公新來赴任又有勑云天下金銅佛像當州縣司剝取其金稱量進上者從海州直到登州已來路境不可行得曠野路狹草木掩合寸步遇泥頻失前路若無知道人引即一步不可行也出野入山出山入野山山東本無坂峻峻下池本缺字溝谷幽深澗水深而寒冷涉者入骨覺痛入山行即一日百遍踰山百遍渡水入野行即樹稠草深微往難求此句下明往或經字求東本似水而抹消之右傍加索字但索字亦不明或尋字歟見草之動方知人行也蚊虻如雨打力不及草下淤泥至膝至腰路次州縣但似野中之一堆矣山村縣人喰物麁硬愛喫鹽㭟粟飯澀吞不入喫即胸痛山村風俗不曾煮羹喫長年唯喫冷菜上客殷重極者便與空餅冷菜以為上饌向北一置一千三百里盡是山野雖近海邊不曾見海到登州方始見海登州者大唐東北地極也枕乎北海臨海立州州城去海一二許里雖是邊北北池本作地條疏僧尼毀折寺舍禁經毀像收撿寺物共京城無異況乃就佛上剝金打碎銅鐵佛稱其斤兩痛當當字有疑東本似舀奈何天下銅鐵佛金佛有何限數准勑盡毀滅化塵物蓬萊縣牒送牟平縣向東南傍海岸川野難過山坂重重草一日到牟平縣得縣牒又向向東本作以東南海行草四日到文登縣踰山涉野羅破衣服罄盡入縣見縣令請往當縣東界勾當新羅所求乞以延唯命自覓舟却歸本國長官准狀牒送勾當新羅所去縣東南七十里管文登縣青寧鄉草七日到勾當新羅所勑平盧軍節度同十將兼登州諸軍事押衙張詠勾當文登縣界新羅人戶到宅相見便識歡喜存問殷勤去開成五年從此浦入五臺去時得此大使息力專勾當州縣文牒公驗事發送今却到此又殷勤安存便過縣牒具說心事大使取領停留許覓船發送歸國又相喜云前從此發去已後至今不得消息心裏將謂早歸本國不謂更到此間再得相見大奇大奇弟子與和上太有因緣余管內苦無異事請安心歇息不用憂煩未歸國之間每日齊糧余情願自供但飽喰即睡大使便作狀報州得文登縣牒稱日本國僧圓仁惟正等二人京兆府賜給長牒轉各一通准勑遞本國節仍仍上文作級恐度字誤被遞到此縣請到勾當新羅所求乞以延唯命候有過往日本國船即欲歸國者今見在浦者十日後得州牒云其僧等且委安存如有過往日本國船即任意東西者近有勑天下還俗僧尼緇服各仰本州縣盡收焚燒恐衣冠親播播東本似抹消之持勢隱在私家竊披緇服事須切加收撿盡皆焚燒訖聞奏如焚燒已後有僧尼將緇服不通出巡撿之時有此包者准勑處分者諸州縣准勑牒諸坊諸鄉收僧尼衣服將到州縣盡焚燒又有勑令天下寺舍奇異寶珮珠玉金銀仰本州縣收撿進上又有勑云天下寺舍僧尼所用銀器鍾磬釜鐺等委諸道鹽鐵使收入官庫且且宜作具録聞奏者有勑斷天下獨腳車條疏後有人將獨腳車行者當處決𭣦緣天子信道士教獨腳車攊破道中中池本作士非也心恐道士心不安歟有勑斷天下猪黑狗黑驢牛等此乃道士著黃恐多黑色厭黃令滅歟令近海州縣進活獺兒未知其由近有勑令諸道進年十五歲童男童女心膽亦是被道士誑惑也唐國僧尼本來貧天下僧尼盡令還俗乍作俗形無衣可著無物可喫艱窮至甚凍餓不徹便入鄉村劫奪人物觸處甚多州縣捉獲者皆是還俗僧因此更條疏已還俗僧尼勘責更更下恐脫甚字九月草二日大使家人高山就便船往楚州共大使商議作書付送楚州譯語劉慎言及薛大使請先所寄經論文書功德幀及衣服等大使宅公客不絶向大使請間靜處過冬本意擬住赤山院緣州縣准敕毀折盡無房舍可居大使處分於寺莊中一房安置飯食大使供也新羅人還俗僧李李東本作季恐非信惠弘弘東國兩本作私仁未歲到日本國太宰府住八年須井宮為筑前國太守之時哀恤斯人等張大使天長元年到日本國迥時付船却歸唐國今見居在寺莊解日本國語便為通事大使處分客中事一切委令勾當自發心供每日菜蔬周足大使頻有書狀送糧食安存殷勤十一月三日大使來到莊上相看安存存東本無乃云余以以東本作取今月七日上州見新刺史端公因此次具申送和上往日本國事兼請當州牒來春即排比船也見說七月已來土蕃大下侵唐境又回鶻國兵入唐界侵奪國地勑抽諸道兵馬三四年已來天下州縣准勑條疏僧尼還俗已盡又天下毀折佛堂蘭若寺舍已盡又天下焚燒經像僧服罄盡又天下剝佛身上金已畢天下打碎銅鐵佛稱斤兩收撿訖天下州縣收納寺家錢物莊園收家人奴婢已訖唯黃河已北鎮幽魏路等四節度元來敬重佛法不毀折寺舍此句東本作不折舍三字恐脫誤不條疏僧尼佛法之事一切不動之頻有勑使勘罰云天子自來毀折焚燒即可然矣臣等不能作此事也十一月十五日黃昏月蝕入夜月體揔沒渾不見三更初方漸出現近有勑天下邊州應有還俗僧尼竝仰所在知存亡且不令東西緣還俗僧張法滿京兆府准勑遞歸西蕃被遞送到鳳翔節度府緣節度使重奏勑旨且令鳳翔府收管不要遞入西蕃因此天下邊州還俗僧尼亦不令東西勾當使為發送求求下恐脫法字僧等請當州過所端公判云自求船況准勑遞過不合停滯住給者本曹曹東本作當官入入恐人字商量云有阻勑文不肯給公驗會昌六年歲次丙寅正月朔癸卯九日前遣楚州取文書功德幀幀東本無等使大使家人高山到來得楚州譯語劉慎言書云有勑焚燒佛教經論幡蓋及僧衣物銅瓶碗等焚燒淨書有違者便處極法自家經幡功德德下脫幀字等皆焚燒訖唯留和上文書等條疏甚切恐鎮柵察知不敢將出寄付又云近得的信李鄰鄰上文作驎德船迥兼云日本客相隨來同尋訪陶中等消息去次如有彼國信來即專附上云云高山云在楚州親見從船下來人云有二僧人專為請益僧就船來到今遇僧難褁頭在云云二月五日為取楚州劉慎言處寄著經論等差丁雄萬就閣方金船遣楚州大使勾當發送其船至三月十三日發訖九日得大使書云近得南來船上人報云日本國來人僧一人俗四人見到揚州將本國書信物等專來訪覓請益僧云云四月十五日聞天子崩來數月諸道州縣舉哀著孝訖身體爛壞而崩矣草七日新羅人王宗從揚州將日本國性性東本作悔非也海法師書來中具說來由五月一日王宗却歸揚州去便付書招喚性海師新天子姓李五月中大赦兼有勑天下每州造兩寺節度府許造三所寺每寺置五十僧去年還俗僧年五十已上者許依舊出家其中年登八十者國家賜五貫文還定三長月依舊斷屠五月草二日楚州宣勑訖六月十七日得楚州惣管同十薛詮書信付李國遇送來便知前遣南州丁雄萬續欲發來兼知五月一日歸南州人王宗五月下旬得楚州便入揚州訖李國遇說矣六月草九日丁雄萬來到兼得楚州主人劉慎言書先寄功德幀文書之中胎藏金剛兩部大曼㭟羅盛色者緣淮南勑牒嚴切劉慎言已焚訖其餘圖畫及文書等具得將來丁丁東本無雄萬不得向揚州而來七月草二日山陵訖見說會昌天子三月草三日崩十月二日性日性二字東本無海上人從揚州來到仍始得相見仍日本太政官牒及延曆寺牒寺牒東本無太宰府小野少二書養內記書及勑施黃金等然太政官牒延曆寺牒及小小東本無野少二書書東本無緣本函封揚州節度使平章李紳不敢自開全全東本作金恐非也封進上長安今上具覽訖勑付淮南節度使却令分付本主因此海上人得將來其勑文見在十二月二日巳時日蝕十分只留一分也會昌七年歲次丁卯正月中改為大中元年張大使從去年冬造船至今年二月功畢專擬載圓仁等發送歸國閏三月十日間入新羅告哀兼弔祭冊立等副使試太子通事舍人賜緋魚袋金簡中判官王朴等到常州牟平縣南界乳山浦上船過海有人諸諸上字脫訖字侫張同十將遣國章三字遣國事歟擬發送遠國人貪造舟不來迎接天使云云副使等受其讚言深怪牒舉國制不許差船送客過海等張大使不敢專拒仍從文登界過海歸國之事不成矣商量往明州趁本國神御井等船歸國緣自自或目字下無船往南將十七端布雇新羅人鄭客車載衣物傍海望密州界去閏三月月下恐脫十字二日出行主人張大使二十里相送始別十七日朝到密州諸城縣界大朱山駮馬浦遇新羅人陳忠船載炭欲往楚州商量船腳價絹五匹定五月五日上船候風九日發緣風變東南去大朱山不遠於琅琊臺與齊堂與嶋中間拋石住經四宿十三日夜發十四日黃昏到海州界東海山田灣浦泊船候風十八日發到中路風變無定飄流終日竟夜十九日飄到海中鐺腳嶋邊泊船艱苦草三日得東北風此此東本作北非也夜欲二更却到東海山過夜草四日早發三更到淮水海駐緣逆風猛浪不獲入淮路糧罄盡恓屑無極六月一日風波稍靜趁潮漸入五日得到楚州新羅坊惣管劉慎言專使迎接使迎東池兩本作使仰今改之兼令團頭一人般運衣籠等便於公廨院安置訪知明州本國人早已發去料前程趁彼船的不及仍囑劉大使謀請從此發送歸國九日得蘇州船上唐人江長新羅人金子白欽良暉金珍等書云五月十一日從蘇州松江口發往日本國過草一日到萊州界山諸人商量日本國僧人等今在登州赤山便擬往彼相取往日臨行次遇人說其僧僧東本誤作便等已往南州趁本國州趁本國船去今且在山相待事須回棹來云云書中又云春太郎神一郎等乘明州張支信船歸國也來時得消息已發也春太郎本擬雇此船歸國太郎往廣州後神一郎將錢金付張支信訖仍春太郎上明州船發去春太郎兒宗健兼有此物今在此船云云又金珍等付囑楚州惣管劉慎言云日本國僧人到彼中即發遣交來云云十日便船往山修書狀付送金珍等處報消息特令相待其後却擬向山渡海排比路糧楚州劉惣管每事勾當前惣管薜詮及登州張大使舍弟張從彥及娘皆送路十八日晚際乘楚州新羅坊王可昌船三更後後恐發字十九日立秋始喫同舟飯草六日到山南桝家店訪金珍船其船已往登州赤山浦訖見留書云專在赤山相待既如此不免向乳山趁逐彼船草七日修書付崔家船報楚州劉惣管訖更雇船主王可昌船望乳山去草八日發到由由恐田字橫嶋無風信經十五日發不得七月十三日遣丁雄萬兼雇一人從陸路令向赤山已來尋訪金珍等船十九日得風信發草日到乳山長淮浦得見金珍等船便載人物上船便發草一日到登州界泊船勾當新羅使同十將張詠來船上相看船上衆人於此米米東本作全糧擬從此渡海八月九日得張大使送路信物數在別十五日剃頭再披緇服草四日祭神九月二日午時從赤浦渡海出赤山莫琊口向正東行一日一夜至三日平明向東望見新羅國西面之山風變正北側帆向東南行一日一夜至四日曉向東見山嶋段段而接連問楫工等乃云是新羅國西熊州西界本是百濟國之地終日向東南行東西山嶋聯翩欲二更到高移島泊船屬武州西南界嶋之西北去百里許有黑山山體東西漸長見訖百濟第三王子逃入避難之地今有三四百家在山中住五日風變東南發不得到三更得西北風發六日卯時到武州南界黃茅嶋泥浦泊船亦名丘草嶋有四五人在山上差人取之其人走藏取不得處是新羅國第三宰相放馬處從高移島到此丘丘東本無草嶋山嶋相連向東南遙見耽羅嶋此丘草嶋去新羅陸地好風一日得到少時守嶋一人兼武州太守家投投或放字鷹人二人來船上語話云國家安泰今有唐勑使上下五百餘人在京城四月中日本國對馬百姓六人因釣魚漂到此處武州收將去早聞奏訖至今勑未下其人今在武州囚囚東國兩本作囚禁待送達本國其六人中一人病死矣六日七日無風信八日聞惡消息異常驚怕無風發不得船衆捨鏡等祭神求風僧等燒香為當嶋土地及大人小人神等念誦祈願平等得到本國即在彼處為此土地及大人少人神等轉金剛經百卷至五更雖無風而發去才出浦口西風忽至便上帆向東行似有神理相扶從山島裏行南北兩面山嶋重重而參差差東本無然日欲巳時到鴈嶋暫歇是新羅南界內家放馬之山近東有黃龍寺莊往往有人家二三所向西南望見耽羅嶋午後風信更好發船從山嶋裏行到新羅國東南出到大海望東南行十日平明向東遙見對馬嶋午時前路見本國山從東至西南相連而分明至初夜到肥前國松浦郡北界鹿嶋泊船十一日平旦筑前國丹判官家人大和武藏共嶋長來相見粗知國中事宜十五日到橘浦十七日到博太西南能舉嶋下泊船十八日到鴻臚館前十九日入館住十月六日借得官庫絹八十匹綿二百屯給船上肆拾肆人冬衣六日生料米十碩送來依國府從十月一日始充行十九日太政官符來太宰府圓仁五人速令入京唐人金珍等卌四人仰太宰府量加支給者官符在別草六日不獲入京之狀出於府衙十一月七日睿山上座仲曉師僧慈睿玄皎到來云特來迎接十四日得太政官十月十三日符有優給唐客金珍等事草五日小野少二入京便上道訖於大納言宅奉啓伴右中辨小野宰相宅皆有狀竝付小野少二訖草八日於大山寺始入唐時所祈金剛般若五阡卷皆先馳使奉送綵帛同日早朝一時發遣綵帛使訖便轉經同日為竈門大神轉一千卷草九日午前為住吉大神轉五佰卷午後為香椎名神轉五百卷十二月一日午前為筑前名神轉五百卷午後為松浦少二靈轉五百卷二日為香春名神轉一千卷三日為八幡菩薩轉一千卷觀音寺寺東本無講師每事相助轉經僧布施白綿二佰屯十四日午後南忠闍梨來池田長田氏藏本奧書文化二年二月十三日以比睿山飯室谷松禪院御本書寫畢慧日山津金教寺住持法印大僧都長海東寺觀智院藏本奧書明德二年十月日全部四帖感得了可喜可喜法印權大僧都賢寶生年五十九正應四年十月草六日於長樂寺坊拭老眼書寫畢任本寫之後人以證本可校合耳法印大和尚位遍照金剛兼胤七十二記之以寫畢比挍了不審事注而已二位僧正憲圓本也憲或寬字本書主東寺觀智院藏本東本據誤脫點池田長田氏藏本池本以之補池本原本借覽得以止得四明餘霞刊本據國書刊行會刊本國本之參照全篇對校本書第一卷之助氏第二卷和田英松氏第三卷黑板勝美氏第四卷藤田明氏助力得謹謝大正四年六月卅日高楠順次郎識圓仁與其入唐求法巡禮記梁容若圓仁日本稱為慈覺大師為天台宗名僧唐文宗時來華留學稽留十年宣宗大中初回國著有入唐求法巡禮記四卷為外人所記唐代重要史料今略考其生平並論引其遊唐日記為本篇一釋圓仁姓壬生氏日本桓武天皇延曆十三年唐德宗貞元十年西元七九四生於下野都賀郡幼喪父性聰敏風貌溫雅年九歲其兄授以經史同郡大慈寺有僧曰廣智乃唐鑑真和尚三傳弟子德行該博鞠為法嗣遂專修內典年十五登京都比睿山謁傳教大師最澄教以止觀大定妙慧嶄然出儕輩上有請教止觀者傳教輒令仁講授己居傍聽證率以為常弘仁四年歲二十逢官試得第次年正月受度持沙彌戒七年於東大寺受具足戒最澄圓寂後益勤學修鍊張講席於各地仁明帝承和三年八三六受詔入唐請益五年六月隨日本第十八次遣唐使藤原常嗣西渡時年四十五遊唐十年歸國大弘佛法受文德清和諸帝寵遇尊為傳燈大師補天台座主奏建總持院為天皇修供授弟子以三昧營常行堂大整顯祕之紀綱建文殊樓奠基以五台山携歸之土石日本天台宗創於最澄而隆興大成之者實為圓仁清和帝貞觀六年唐懿宗咸通五年西元八六四正月十四日寂於京都延曆寺得年七十一寂前一日授密印灌頂於高足常濟圓仁風神溫穆而堅毅內斂著述極多據赤堀氏所輯日本文學者年表經疏私記凡九十四種百五十三卷金剛頂蘇悉地二經疏七卷顯揚太戒論八卷皆奉敕刊行而入唐求法巡禮記名亦著論者稱其身渡滄溟足踏靈窟趁上智而餐其說問碩學而窮其源三密甚深之法分涇渭以實傳一乘圓通之教振膏肓而無遺八年七月敕供法華經千部於總持院贈諡號謂故天台座主圓仁慈襟不測惠翅高飛到五台而問津誠同刺頸開三密而弘教業是增華轉大梵輪正獅子吼朕昔以眇身頻接慈眼恨護持之俄隔思崇餝而何窮宜贈法印大和尚仍諡號慈覺大師云事詳慈覺大師傳三國佛法傳通起緣卷三元亨釋書卷三日本高僧傳卷六及華芳餘輝等書二日本仁明天皇元年派參議藤原常嗣為遣唐使次年七月二日四舶同發圓仁從行遇險破舟均折回四年七月再發遭逆風不果至五年六月十三日復於九州博多分登第一舶與第四舶是為三次首途仁所著入唐巡禮記起於此日六月二十二日放洋風濤甚烈飽歷艱險唐文宗開成三年八三八七月二日抵淮南道揚州府海陵縣今江蘇泰州大使由淮南節度使李德裕奏准入長安圓仁請巡禮天台留揚州待敕許其間曾就宗睿學悉曇梵文求得胎藏金剛兩部曼茶羅諸尊壇樣高僧真影及舍利二十一種經論章疏等一百二十八部一百九十八卷既而迎大使於楚州江蘇山陽縣而巡禮天台竟未蒙許可懊喪登使舶就歸途舟泊海州東海縣仁偕弟子惟正惟曉水夫丁雄萬託詞潛行登陸為海州官府查覺受刺史點檢適遣唐使之第二舶至海州沿岸乃復護送之登舟四月十八日抵登州牟平縣海岸巡禮記第一卷記事止此開成四年六月七日舟舶登州文登縣赤山浦赤山有新羅人張寶高所建法華院僧侶三十餘人日人居其七圓仁聞之心動復與大使告別登陸投法華院留院逾年請於平廬節度使兼登州諸軍事押衙張詠詠曾出使日本心儀圓仁之熱誠為之左右因得許巡禮五台乃於開成五年四月至登州北上經青州益都淄州山東淄川齊州歷城德州貝州河北清縣冀州趙州行唐西北向太行山五月十六日抵清涼山麓巡禮記謂嶺山谷裏樹木端長無一曲戾之木入大聖境地之時見極賤之人亦不敢作輕蔑之心若逢驢畜亦起疑心恐是文殊化現舉目所見皆起文殊所化之想聖靈之地使人起自然崇重之心也自攄精誠如此日記第二卷止於此圓仁四月二十八日望見中臺伏地遙禮不覺淚流復跋涉西北東各臺巡歷靈跡參謁玄鑒志遠等名師呈延曆寺疑義三十條請解釋鈔録天台宗祕籍得書三十四部三十七卷留山中五十餘日七月一日擷靈石及獅子腳迹土為紀念拜別靈山西向長安經欣州太原河中府絳州於龍門渡黃河穿朝邑櫟州開成五年八四八月二十三日遂抵夢魂縈繞之大唐首都請於左街功德使仇士良被命居資聖寺時長安名僧如林聯鑣競秀圓仁學兩部祕法於大興善寺翻經院元政和尚青龍寺東塔院義真和尚問金剛戒於青龍寺法潤受胎藏儀軌於玄法寺法全承止觀於醴泉寺宗穎大興善寺文悟闍梨大安國寺元簡闍梨皆有所啓迪復從南天竺寶月三藏重學悉曇口受正音得胎臟金剛兩部曼茶羅諸尊壇樣道具等二十一種搜獲經論章疏傳記四百二十三部五百五十九卷武宗會昌元年八四一八月仁留唐已三載三乘之理備詳不二之門頓得智逾衆人學兼內外乃上書功德使請歸國不許自武宗當國排佛虐僧之舉與日俱甚會昌三年五月二十五日牒諸寺徹查外國僧侶仁具牒說明巡禮記第三卷記事止此會昌三年七月二十四日弟子惟曉卒時痼疾已七月仁為籌殯葬益感愴作速歸計武宗之毀寺驅僧以會昌五年為極峯圓仁亦以此時被命還俗因得歸國機會五月十五日發長安信士楊敬之李元佐等餞之依依惜別曰吾國教法隨和尚東矣元佐求其衲衣頂戴以慰離緒圓仁蓄髮易俗人裝經鄭州汴州河南祥符泗州安微盱眙而下維揚復出楚州海州穿密州山東諸城萊州山東掖縣而抵文登縣之勾當新羅所留待便船雖承節度使張詠愛護而屢更艱苦終無歸航機緣荏苒三載至宣宗大中元年八四七九月始乘新羅人赴日本船東歸淨髮易緇衣發赤山浦九月十七日抵築前博多時日本承和十四年也太政官檄太宰府迎仁入京仁乃獻幣帛於太山寺住吉大神香椎名神等答謝天庥巡禮記絶筆於是年十二月十四日蓋自承和五年六月十三日起稿至此凡歷九年七月其在唐行踪所至以今行政區劃考之凡涉江蘇山東河北山西陝西河南安徽七省三入唐巡禮記四卷為圓仁遊唐日記地涉兩國時歷十年雖不無間斷而排比年月次序井然其書近年始大行圓仁手澤本原藏京都延曆寺今不傳慈覺大師傳著於師入滅後四十九年曾明著入唐事蹟一依本記北宋時入宋之成尋阿闍梨曾奉神宗皇帝命於熙寧五年西元一七二獻上此書首三卷見於其所著參天台五台山記卷四是此書夙入宋祕閣中日逢上人之立正安國論睿嶽記及元亨釋書徵故之作者均曾引用本書可證流傳已久今所存古鈔本有二一為京都東寺觀智院本一為池田長田氏藏本東寺觀智院本為日本正應四年元世祖至元二十八年兼胤法印書第四卷有跋云正應四年十二月二十六日於長樂寺坊拭老眼書寫畢任本寫之後人以證本可校合耳法印大和尚位遍照金剛兼胤七十二記之又第二卷第三卷末書有以寫本一校了兼胤第四卷復有細字跋云以寫本比校了不審事注而已其左旁注二位僧正覺寬本也兼胤法師事無可考長樂寺在京都圓山本為天台宗寺兼胤殆其主持其校訂參證用寬圓僧正本而所據原本則不可知睿嶽要記載建曆元年南宋嘉定四年法印寬圓重修元久二年焚毀之大講堂文殊堂總持院及文殊獅子等見於兼胤法印跋之寬圓僧正殆即此法印寬圓所傳録者兼胤法印鈔録之正應四年一二九一為圓仁寂後四百三十餘年所謂鎌倉古鈔日本人定為國寶大正十五年一九二六十二月由東京東洋文庫影印三百部行世附有東京帝大教授岡田正之博士所撰解說一卷共為五冊池田長田氏藏本卷末有文化二年清嘉慶十年長海大僧都跋文云文化二年二月十三日以比睿山飯室谷松禪院御本書寫畢慧日津金教寺住持法印大僧都長海津金寺為信濃北佐久郡之天台宗寺院是池田本乃長海大僧都借松禪院本鈔録者但今比睿山松禪院本已佚池田氏本時代雖晚而較東寺觀智院本誤脫實少其所本之松禪本或為古鈔在研究上亦可重視東寺觀智院本雖為古鈔其所據寫本似多誤脫以寬圓僧正本校正後仍不少訛脫復因衰齡鈔録字跡模糊閲讀困難意者圓仁手記或已不免誤脫今書中假借字極多如南詔之書為南照潞府之略作路府劉從諫之書為劉從簡是開成五年四月二十八日至五月十六日登五台山紀事第二卷終與第三卷重復而文字互有詳略殆原稿或經刪削匪録者傳為異文以輾轉傳寫錯簡復出往往有之如第二卷開成五年三月五日圓仁向登州節度使請公驗狀復見於同年二月十七日條第二卷開成五年三月十四日紀事前半後攙入十六日紀事其後復出現二月二十九日三月一日二日紀事其次復續以三月十四日紀事後半及十五十六日事是錯簡之最甚者池田長田氏本誤字較少由第二卷開成五年三月五日上登州節度使請公驗狀不復出之點觀之松禪院本與寬圓本及東寺觀智院本似出二源但錯簡有相同者殆當初手録原稿者之失撿歟巡禮行記直至近年始刊行始則國書刊行會收入續羣書類叢中繼則天台宗務廳文書課據池田本附録於四明餘霞中高楠順次郎輯大日本佛教全書收入遊方傳叢書第一以東寺觀智院本為本校以四明餘霞中所刊池田本及國書刊行會刊本參與校訂者有辻善之助和田英松黑版勝美藤田易諸氏皆博雅學者有大正四年六月三十日高楠順次郎跋岡田正之氏曾為箋釋未成書而卒四巡禮記歷時既久所涉範圍甚廣自兩國交通以及大唐風俗儀式官府制度地方組織政治措施宗教問題外交及國際戰爭多據親見親聞隨筆記録往返書簡牒文亦多全文録入為考當時公私書牘體式之一助所記事實雖不無訛傳誤聞而可以裨補史乘者實夥日本古代旅行中國之外交官留學僧侶學生人數雖多面留有重要記録者為唐時智澄大師之行曆鈔宋時成尋阿闍梨之參天台五台記明時瑞欣和尚之入唐記策彥和尚之初渡集及再渡集與圓仁之書並稱五大遊記而規模之大史蹟之多實以圓仁書為翹楚其所記事實多有可資考史裨補中土記録之不足者如卷四會昌五年四月條有云左右神策軍者天子護軍也每軍有十萬軍自古君王頗有臣叛之亂仍置此軍以來無人敢奪國位敕賜印每中尉初上時准敕出兵馬迎印別行公事不屬南司今年會昌五年四月初有敕索兩軍印中尉不肯納印有敕再三索敕意索護軍印付中書門下令掌相管軍事一切擬令取相處分也左軍中尉即許納印而右軍中尉不肯納印遂奏云迎印之日兵馬迎之納印之日亦須動兵馬納也中尉意敕答許即因此便動兵馬起異事也便仰所司暗排比兵馬人君怕且縱不索此述武宗與宦官所領神策軍之暗鬪武宗欲收官印以軍權付宰相而右軍中尉魚弘志陰謀拒命其事遂阻蓋雖武宗之英武亦有無可如何者時在仇士良死後二年宦官勢退之時新唐書仇士良傳記武宗明斷雖有士良援立之功內實嫌之陽示尊籠蓋不得已也會昌反佛教運動天下所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶拆招提蘭若四萬餘所收膏腴上田數千萬項收奴婢為兩稅戶十五萬人摩尼景祆各教亦牽連而消滅實為宗教史上一大事然唐人著作記其事者極少蓋以武宗於會昌五年實行徹底滅佛而六年三月即服道士藥暴卒宣宗嗣位立誅道士劉玄靖等而復興僧寺朝野從此皆諱言其事也舊唐書資治通鑑皆記其要領於會昌五年然其事實發端於武宗嗣位之初巡禮記所載特詳茲輯録其事如下會昌元年六月十一日今上降誕日於內裏設齊兩街供養大德及道士集談經四對議論二個道士賜紫釋門大德總不得著南天竺三藏寶月入內對君王從自懷中拔出表進請歸本國不先咨開府惡發五日軍內收禁犯越官罪故寶月弟子三人各決七棒通事僧決十棒不打三藏不放歸國三月三日李宰相聞奏僧尼條疏敕下發遣保外無名僧不許置童子沙彌十月九日敕下天下所有僧尼解燒練咒術禁氣背軍身上杖痕鳥文雜工場曾犯淫養妻不修戒行者並敕還俗若僧尼有錢物及穀斗田地莊園收納官如惜錢財情願還俗玄亦任敕還俗充入兩稅徭役敕文在別城中兩街功德使帖諸寺不放出僧尼長閉寺門僧昡玄奏自作劍輪自領兵打回鶻國敕令彼僧試作劍輪不成又准宰相李紳聞奏因起此條疏其僧昡玄當誑隸僧尼財物准敕條疏天下大同諸州府中書門下牒行京城內化軍容拒敕不欲條疏緣敕意不許且許請權停一百日內帖諸寺不放僧尼出寺左街功德使奏准敕條疏僧尼除年已衰老及戒行精確外愛惜資財自還俗僧尼共一千二百三十二人右街功德使奏准敕條疏僧尼除年已衰老及戒行精確外愛惜資財自還俗僧尼共二千二百五十九人奉敕右街功德使奏准去年十月七日十六日敕條疏令還俗僧尼宜依其愛惜資財情願還俗者各委本貫收充兩稅戶向後諸道有如此色類並准此處分所蓄奴婢僧許留一人尼許留婢二人餘各任本家收管如無家者官為貨賣同衣鉢餘外資財收貯待後敕處分其尼僧所留奴婢如有武藝及解諸藥諸術者並不得留不得剃髮私度如有違犯綱維知事録報官餘資産錢物等各委功德使自條疏聞奏會昌三年歲次癸亥正月一日二月一日使牒云僧尼已還俗者輒不得入寺及停止又發遣保外僧尼不許住京入鎮內以上猶屬因事因人而發雖事澄汰尚未根本廢佛及韋宗卿撰疏受斥而武宗滅佛之意已明巡禮記云會昌三年六月太子詹事韋宗卿撰涅槃經疏二十卷進今上覽已焚燒經疏敕中書門下令就宅追索草木燒焚其敕文如左勑銀青光祿大夫守太子詹事上柱國光陰縣開國男食邑三百戶韋宗卿參列崇班合遵儒業溺於邪說是扇妖風既開炫惑之端全戾典墳之旨簪纓之內頽靡何深況非聖之言尚且禁斥外方之教安可流傳雖欲包容恐傷風俗宜從左官猶謂寬恩可任成都府尹馳驛發遣太子詹事韋宗卿進佛教涅槃經中撰成三德二十卷奉敕大圓仰字鏡略草卷具已詳覽佛本西戎之人教張不生之說孔乃中土之聖經聞利益之言而韋宗卿素儒士林衣冠望族不能敷揚孔墨翻乃溺信浮屠妄撰胡書輒有輕進況中國黎庶久染此風誠宜共遏迷聾使其反朴而乃集妖妄轉惑愚人位列朝行豈宜不自愧其所進經內中已焚燒訖其草本委中書門下追索焚燒不得傳之於外會昌三年六月十三日下詔其滅佛歷程見於記録者如下會昌五年四月見說功德使條疏僧尼還俗之事商議次第且令三十以下還俗訖次令五十以下還俗次令五十以上無祠部牒者還俗第三番令祠部牒磨勘差殊者還俗最後有祠部牒不差謬者盡令還俗即僧尼絶也斯之商議天下大同也緣准敕行故從四月一日起首年三十以下僧尼盡敕還俗遞歸本貫每日三百僧還俗十五日年四十以下僧尼方盡十六日起首五十以下僧尼還俗直到五月十日方盡也十一日起首五十以上無祠部牒者還俗前年以來牒疏僧尼即簡粗行不依本教者盡敕還俗遞歸本貫今年不簡高行粗行不論驗僧大德內共奉也但到次第便令還俗頻有敕問已還俗者多少未還俗者多少催進其數外國僧未入條疏之例功德使別聞奏取裁有敕云外國僧若無祠部牒者亦敕還俗遞歸本國者西國北天竺難陀在大興善寺有天竺三藏寶月兼弟子四人於中天成業並解持念大法律行精細博解經論在青龍寺並無唐國祠部牒新羅國僧亦無祠部牒者多日本國僧圓仁惟正亦無唐祠部牒功德使准敕配入還俗例又帖諸寺牒云如有僧尼不伏還俗者科違敕罪當時決殺者八月記云近有敕天下還俗僧尼緇服各仰本州縣盡收焚燒恐衣冠親播恃勢隱在私家竊披緇服事須切加收檢盡皆焚燒訖聞奏如焚燒以後有僧尼將緇服不通出巡檢之時有此包者准敕處分者諸州縣准敕牒諸坊諸鄉收僧尼衣服將到州縣盡焚燒又有敕令天下寺舍奇異寶珮珠玉金銀仰本州縣收檢進上又有敕云天下寺舍僧尼所用銀器鐘磐釜鐺等委諸道鹽鐵使收入官庫録聞奏者政令雖嚴而河北以統治力弛緩似未普及十一月記云三四年以來天下州縣准敕條僧尼還俗已盡又天下毀拆佛堂蘭若堂舍已盡又天下焚毀經像僧服罄盡又天下剝佛身上金已畢天下打碎銅鐵佛稱斤兩收檢訖天下州縣收納寺家錢物莊園收家人奴婢已訖唯黃河以北鎮幽魏路等四節度元來敬重佛法不毀拆寺舍不條疏僧尼佛法之事一切不動之頻有敕使勘罰云天子自來毀拆焚燒即可然矣臣等不能作此事也閲此則武宗排佛滅佛之具體程序與範圍結果歷歷可知信可以補正史之疏僧侶於忍氣吞聲之餘亦日造為流言蜚語以誣枉君相動搖人心巡禮記中所録頗多如記武宗與道士之關係則云會昌四年二月駕幸右街金仙觀是女觀觀中有女道士甚有容天子召見如意敕賜絹乙千匹遂宣中官令修造觀便通內特造金仙樓其觀本來破落後修造嚴麗天子頻駕幸會昌五年八月有敕斷天下獨腳車條疏後有人將獨腳車行者當處決殺緣天子信道士教獨腳車攊破道中心恐道士心不安歟有敕斷天下豬黑狗黑驢牛等此乃道士著黃恐多黑色壓黃令減歟令近海州縣進活獺兒未知其由近有敕令諸道士進十五歲童男女心膽亦是被道士誑惑也記武宗之宮闈罪惡則云會昌四年八月中太后薨郭氏太和皇后緣太后有道心信佛法每條疏僧尼時皆有詞諫皇帝令進藥酒而藥殺矣又義陽殿皇后蕭氏是今上阿娘甚有容今上召納為妃而太后不奉命天子索弓射殺箭透入胸中而薨記武宗之馭下無狀則云會昌四年敕令兩軍於內裏築仙臺高百五十尺十月起首每日使左右神策軍健三千人搬土築造皇帝切欲得早成每日有敕催築兩軍都虞侯把棒檢校皇帝因行見問內長安曰把棒者何人長官奏曰護軍都虞侯勾當築臺皇帝宣曰不要你把棒勾當須自擔土便交搬土後時又駕築臺所皇帝自索弓無故射殺虞侯一人無道之極也於武宗之崩則記云會昌六年四月十五日聞天子崩來數月諸道州縣舉哀著孝訖身體爛壞而崩矣是年五月一日記宣帝之立則云新天子姓李語尤冷雋凡此記述恐為當時僧侶之計劃宣傳非出圓仁一人之誣枉蓋當時佛教勢力深入人心而武宗李德裕等欲以數人之力抗之故終於身敗名裂宣宗即位而政策一轉以李贊皇之智術勛業而一蹶不振蓋結怨過多赤口燒城排之者非止令狐綯崔鉉輩也附記案華籍涉及會昌毀佛事者舊唐書武宗紀會昌五年八月有廢佛敕李衛公會昌一品集卷二十有賀廢毀諸寺德音表別見杜牧樊川文集卷十杭州新造南亭子記及唐會要卷四十七宋趙麟德侯鯖録卷二可以參考要之巡禮記雖訛傳誤聞流言蜚語彌望而是而以時代之古範圍之大能適當勾稽參證鑑別解釋必有裨於治唐史者昔梁任公先生論史料致慨於我國四周民族率多蒙昧其著述匡補我史實者甚稀而以阿拉伯人阿布賽德哈散之印度中國紀程及意大利人馬可波羅之遊記為鳳毛麟角以巡禮記之性質與內容言之固有遠過於二書者五岡由正之博士為日本漢文學史頗推重圓仁之文學謂其文筆不遜於菅原道真三善清行謂其尺牘有歐蘇手簡風謂其記事為五大遊記冠冕復稱其善和歌選入續古今新古今新拾遺三和歌集然圓仁似究心內典不事辭華留唐十年客長安六載終未見其接迹文士究心風雅入唐新求聖教目録中記圓仁齎歸書有唐人詩文集多種而仁之作品則日華均無所傳以觀朝衡空海不可同日而語其歸國也唐僧栖白贈以詩云家山臨晚日海路信歸橈樹滅渾無岸風生只有潮歲窮程未盡天末國仍遙已入閩王夢香花境外邀見全唐詩仁當時飽歷世變悲喜交集感慨萬端而答詩亦無聞巡禮記為文拖沓曼衍重以訛奪使人難於卒讀其書雖傳而久未刊行入宋祕府而一無反響未必不以此也其中偶有可觀者如卷三記五台風景云中台者四台中心也遍台水湧地軟草長者一寸餘茸茸稠密覆地而生踏之即覆舉腳還起步步水濕其冷如冰處處小窪皆水滿中矣遍台沙石間錯石塔無數細軟之草間莓苔而蔓生雖地水濕而無滷泥緣莓苔軟草布根稠密故遂不令遊人汙其鞋腳奇花異色滿山四開從容至頂四面皆花猶如鋪錦秀氣芬馥薰人衣裳人云今此五月猶寒花開未盛六七月間花開更繁云看其花色人間未有也又記山中平等供養僧俗之緣起則云入此山五台山者自然起得平等之心山中設齊不論僧俗男女大小平等供養不看其尊卑大小於彼皆生文殊之想昔者大華嚴寺設大齊凡俗男女乞丐寒窮者盡來受供施主悁嫌云遠涉山坂到此設供意者只為供養山中衆僧然此塵俗乞索兒等盡來受食若供養此等乞丐只令本處設齊何用遠來到此山僧勸令皆與飯食於乞丐中有一孕女懷妊在座備受自分飯食訖更索胎中孩子之分施主罵之不與其孕女再三云我胎中兒雖未産生而亦是人數何不與飯食施主曰爾愚癡也肚裏兒雖是一數而不出來索得飯食時與誰吃乎女人對曰我肚裏兒不得飯即我亦不合得吃便起出食堂才出堂門變作文殊師利放光照耀滿堂赫奕皓玉之貌騎金毛獅子萬佛圍處騰空而去一會之衆數千之人一時走出茫然不覺倒地舉聲懺謝悲泣雨淚一時稱唱大聖文殊師利迄於聲竭喉涸終不蒙回顧髣佛而不見矣大會之衆餐飯不味各自發願從今以後送供設齊不論男女大小尊卑貧富皆須平等供養山中風法因此置平等之式此等記述或景物奇特或故事詼詭無須刻劃已成逸品與其謂仁之文足傳無寧謂其沈潛藏乘頂禮名山其胸中丘壑有不可及者耳六日本遣唐留學生學問僧皆受中國朝野之優厚禮遇體恤愛護無微不至名僧大德以民胞物與之精神弘有教無類之古訓請業請益者無不得其所欲以去故最澄空海等感念師門至於沒齒憧憬中土如在天上圓仁早歲成名聲華藉甚年逾不惑桃李滿門九死一生蹈海東來求法熱誠無殊昔人乃謁天台而見阻留海州而被放匿跡島濱因緣權貴始得遂瞻禮五台遊學長安之宿願旋遭會昌滅佛之厄至於蓄髮易服中懷鬱結目睹流言蜚語君民睽離政令怪誕莫可究詰未出國門而毀佛之政已聞反汗朝令夕改威信盡失蓋自圓仁等歸而日本之遣唐使遂不復至而唐亦自此衰矣周公修德而越裳氏來文化領導豈易言哉
